// ひらがな→カタカナに変換して表記ゆれを吸収
function normalize(str) {
  return str.replace(/[\u3041-\u3096]/g, c =>
    String.fromCharCode(c.charCodeAt(0) + 0x60)
  ).toLowerCase();
}

function isExcluded(meal, disliked) {
  const target = normalize([meal.name, meal.carb, meal.protein, meal.veggie].join(" "));
  return disliked.some(kw => normalize(kw) !== "" && target.includes(normalize(kw)));
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// --- 嫌いな食べ物タグ管理 ---
let dislikedList = [];

function addDisliked() {
  const input = document.getElementById("dislikedInput");
  const raw = input.value.trim();
  if (!raw) return;
  // 読点・スペース・カンマで分割
  const keywords = raw.split(/[、,\s　]+/).map(k => k.trim()).filter(k => k);
  keywords.forEach(kw => {
    if (!dislikedList.includes(kw)) dislikedList.push(kw);
  });
  input.value = "";
  renderTags();
}

function removeDisliked(kw) {
  dislikedList = dislikedList.filter(k => k !== kw);
  renderTags();
}

function renderTags() {
  const el = document.getElementById("tagList");
  el.innerHTML = dislikedList.map(kw =>
    `<span class="tag">${kw}<button onclick="removeDisliked('${kw}')" title="削除">×</button></span>`
  ).join("");
}

// Enterキーでも追加できるように
document.getElementById("dislikedInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addDisliked();
});

// --- 献立生成 ---
function balanceMessage(meals) {
  const withVeggie = meals.filter(m => m.veggie !== "—").length;
  const withProtein = meals.filter(m => m.protein).length;
  const score = withVeggie + withProtein;
  if (score >= 5) return { icon: "🌟", text: "◎ 優秀！一日を通じて栄養バランスが非常に良好です。" };
  if (score >= 3) return { icon: "✅", text: "○ 良好。全体的にバランスの取れた食事ができています。" };
  return { icon: "⚠️", text: "△ 野菜・たんぱく質をもう少し意識して摂りましょう。" };
}

function generate() {
  const result = document.getElementById("result");
  result.style.display = "block";
  result.innerHTML = "";

  const mealTypes = Object.keys(MEALS);
  const colors = ["#c0824a", "#8aab68", "#6a9abf"];
  const icons  = ["☀️", "🌤️", "🌙"];
  const labels = ["朝食", "昼食", "夕食"];

  const selected = [];

  mealTypes.forEach((type, i) => {
    const options = MEALS[type].filter(m => !isExcluded(m, dislikedList));
    const card = document.createElement("div");
    card.className = "meal-card";
    // アニメーション遅延
    card.style.animationDelay = `${i * 0.1}s`;
    card.style.borderLeftColor = colors[i];

    if (options.length === 0) {
      card.classList.add("warn");
      card.innerHTML = `
        <div class="meal-type">${icons[i]} ${labels[i]}</div>
        <div class="warn-msg">⚠️ 条件に合うメニューがありませんでした。<br>除外食材を減らして再度お試しください。</div>
      `;
    } else {
      const meal = pickRandom(options);
      selected.push(meal);
      card.innerHTML = `
        <div class="meal-type" style="color:${colors[i]}">${icons[i]} ${labels[i]}</div>
        <div class="meal-name">${meal.name}</div>
        <div class="nutrients">
          <div class="nutrient">
            <div class="nutrient-label">🌾 炭水化物</div>
            <div class="nutrient-value">${meal.carb}</div>
          </div>
          <div class="nutrient">
            <div class="nutrient-label">🥩 たんぱく質</div>
            <div class="nutrient-value">${meal.protein}</div>
          </div>
          <div class="nutrient">
            <div class="nutrient-label">🥦 野菜</div>
            <div class="nutrient-value">${meal.veggie}</div>
          </div>
        </div>
        <div class="comment">💬 ${meal.comment}</div>
      `;
    }
    result.appendChild(card);
  });

  if (selected.length > 0) {
    const bal = balanceMessage(selected);
    const balCard = document.createElement("div");
    balCard.className = "balance-card";
    balCard.style.animationDelay = "0.35s";
    balCard.innerHTML = `
      <div class="balance-icon">${bal.icon}</div>
      <div class="balance-text"><strong>栄養バランス評価</strong><br>${bal.text}</div>
    `;
    result.appendChild(balCard);
  }

  const note = document.createElement("div");
  note.className = "water-note";
  note.textContent = "💧 水分補給もお忘れなく！1日2Lを目安に。";
  result.appendChild(note);

  // スクロール
  result.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>

<script>
const SUPABASE_URL = 'https://fadtttgkzyryzjakvrva.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_JVfGO7BS_IhZnHhLRQZlDw_CdCbwIx6';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toggleAuthModal() {
  const modal = document.getElementById('auth-modal');
  modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
}

sb.auth.onAuthStateChange((event, session) => {
  const toggleBtn = document.getElementById('auth-toggle-btn');
  const userInfo = document.getElementById('user-info');
  if (session) {
    toggleBtn.style.display = 'none';
    userInfo.style.display = 'flex';
    document.getElementById('user-email-display').textContent = session.user.email;
    document.getElementById('auth-modal').style.display = 'none';
  } else {
    toggleBtn.style.display = 'block';
    userInfo.style.display = 'none';
  }
});

async function signUp() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('password-input').value;
  const { error } = await sb.auth.signUp({ email, password });
  document.getElementById('auth-message').textContent =
    error ? error.message : '確認メールを送信しました。メールを確認してください。';
}

async function signIn() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('password-input').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  document.getElementById('auth-message').textContent = error ? error.message : '';
}

    provider: 'google',
    options: {
      redirectTo: 'https://enube1115.github.io/enube-web-page/meal_planner.html'
    }
  });
  if (error) document.getElementById('auth-message').textContent = error.message;
}

async function signOut() {
  await sb.auth.signOut();
}
