<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CAR CHASE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 400, H = 600;
C.width = W; C.height = H;

const RL = 52, RR = W - 52;          // road left/right x
const LW = (RR - RL) / 3;            // lane width

let roadY = 0;
let state = 'menu';                   // menu | play | over
let score = 0, timer = 0, lives = 3, spawnT = 0;
let highScore = +localStorage.getItem('cc_hs') || 0;

const P = { x:W/2, y:H-100, vx:0, vy:0, inv:0 };
let cops = [], sparks = [];

// ── Input ─────────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e => {
  K[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'].includes(e.key)) e.preventDefault();
  if ((e.key === 'Enter' || e.key === ' ') && state !== 'play') start();
});
window.addEventListener('keyup', e => K[e.key] = false);
C.addEventListener('click', () => { if (state !== 'play') start(); });

function start() {
  score=0; timer=0; lives=3; spawnT=0;
  cops=[]; sparks=[];
  Object.assign(P, {x:W/2, y:H-100, vx:0, vy:0, inv:0});
  state='play';
}

// ── Draw helpers ──────────────────────────────────────────────
function glow(c, b) { ctx.shadowColor=c; ctx.shadowBlur=b; }
function noG()      { ctx.shadowBlur=0; }

function rr(x, y, w, h, r=5) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// ── Road ──────────────────────────────────────────────────────
function drawRoad() {
  ctx.fillStyle='#07071a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#0c0c22'; ctx.fillRect(0,0,RL,H); ctx.fillRect(RR,0,W-RR,H);
  ctx.fillStyle='#0b0b1e'; ctx.fillRect(RL,0,RR-RL,H);

  // Road edge glow
  glow('#00ffaa',10); ctx.strokeStyle='#00ffaa'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(RL,0); ctx.lineTo(RL,H);
  ctx.moveTo(RR,0); ctx.lineTo(RR,H); ctx.stroke();

  // Lane dashes
  ctx.setLineDash([28,44]); ctx.lineDashOffset = -(roadY % 72);
  glow('#223355',3); ctx.strokeStyle='#1e3050'; ctx.lineWidth=1.5;
  for (let i=1; i<3; i++) {
    const x = RL + i*LW;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.setLineDash([]); noG();
}

// ── Player car ────────────────────────────────────────────────
function drawPlayerCar() {
  if (P.inv > 0 && Math.floor(P.inv*12)%2 === 0) return; // blink when invincible
  const w=24, h=42;
  ctx.save(); ctx.translate(P.x, P.y);
  glow('#00ffff',20); ctx.fillStyle='#00ddcc'; rr(-w/2,-h/2,w,h,6); ctx.fill();
  ctx.fillStyle='rgba(0,20,50,0.8)'; rr(-w/2+3,-h/2+10,w-6,h/3,3); ctx.fill();
  glow('#ffffff',14); ctx.fillStyle='#ffffdd';
  ctx.fillRect(-w/2+2,-h/2+1,6,4); ctx.fillRect(w/2-8,-h/2+1,6,4);
  glow('#ff0033',12); ctx.fillStyle='#ff0033';
  ctx.fillRect(-w/2+2,h/2-5,6,4); ctx.fillRect(w/2-8,h/2-5,6,4);
  noG(); ctx.restore();
}

// ── Police car ────────────────────────────────────────────────
function drawCop(c) {
  const red = Math.sin(c.siren * 6) > 0;
  ctx.save(); ctx.translate(c.x, c.y);
  glow('#cc2200',14); ctx.fillStyle='#881100'; rr(-11,-20,22,40,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(-11,-4,22,8);
  glow(red?'#ff2200':'#0055ff',22); ctx.fillStyle=red?'#ff2200':'#0055ff'; rr(-7,-28,14,8,3); ctx.fill();
  ctx.fillStyle='rgba(0,20,50,0.9)'; rr(-8,-10,16,14,3); ctx.fill();
  noG(); ctx.restore();
}

// ── Particles ─────────────────────────────────────────────────
function burst(x, y, col, n=12) {
  for (let i=0; i<n; i++) {
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    sparks.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, r:2+Math.random()*3, c:col, d:0.035+Math.random()*0.03});
  }
}

function drawSparks() {
  for (const s of sparks) {
    ctx.save(); glow(s.c,8); ctx.globalAlpha=s.life;
    ctx.fillStyle=s.c; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*s.life,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; noG(); ctx.restore();
  }
}

// ── HUD ───────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,36);
  ctx.textBaseline='middle';

  glow('#00ffff',8); ctx.fillStyle='#00ffff';
  ctx.font='bold 15px "Courier New"'; ctx.textAlign='left';
  ctx.fillText('SCORE '+String(score).padStart(6,'0'), 8, 18);

  ctx.textAlign='right';
  ctx.fillText(Math.floor(timer)+'s', W-8, 18);

  ctx.font='18px serif'; ctx.textAlign='center';
  for (let i=0; i<3; i++) {
    glow(i<lives?'#ff2244':'#333', 6);
    ctx.fillStyle = i<lives ? '#ff2244' : '#333344';
    ctx.fillText('♥', W/2-18+i*18, 18);
  }
  noG();
}

// ── Title screen ──────────────────────────────────────────────
function drawMenu() {
  ctx.fillStyle='#07071a'; ctx.fillRect(0,0,W,H);
  ctx.setLineDash([28,44]); ctx.lineDashOffset = -(roadY % 72);
  ctx.strokeStyle='#112233'; ctx.lineWidth=1.5;
  for (let i=1; i<3; i++) { const x=RL+i*LW; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  ctx.setLineDash([]);

  ctx.textAlign='center'; ctx.textBaseline='middle';
  glow('#00ffff',35); ctx.fillStyle='#00ffff'; ctx.font='bold 60px "Courier New"'; ctx.fillText('CAR',   W/2, H*0.26);
  glow('#ff2244',35); ctx.fillStyle='#ff2244'; ctx.font='bold 60px "Courier New"'; ctx.fillText('CHASE', W/2, H*0.26+70);
  ctx.fillStyle='#aab0cc'; ctx.font='14px "Courier New"'; ctx.fillText('パトカーから逃げろ！', W/2, H*0.26+112);

  if (highScore > 0) {
    glow('#ffdd00',8); ctx.fillStyle='#ffdd00'; ctx.font='15px "Courier New"';
    ctx.fillText('BEST  '+highScore, W/2, H*0.55);
  }
  if (Math.floor(Date.now()/500)%2) {
    glow('#fff',8); ctx.fillStyle='#fff'; ctx.font='15px "Courier New"';
    ctx.fillText('ENTER / クリックでスタート', W/2, H*0.65);
  }
  ctx.fillStyle='#334455'; ctx.font='12px "Courier New"';
  ctx.fillText('← → ↑ ↓ で操作', W/2, H*0.73);
  noG();
}

// ── Game over screen ──────────────────────────────────────────
function drawOver() {
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  glow('#ff2244',28); ctx.fillStyle='#ff2244'; ctx.font='bold 46px "Courier New"'; ctx.fillText('GAME OVER', W/2, H*0.37);
  glow('#ffdd00',14); ctx.fillStyle='#ffdd00'; ctx.font='22px "Courier New"';
  ctx.fillText('SCORE '+String(score).padStart(6,'0'), W/2, H*0.49);
  ctx.fillText('TIME  '+Math.floor(timer)+'s', W/2, H*0.56);

  if (score >= highScore && score > 0) {
    glow('#00ff88',12); ctx.fillStyle='#00ff88'; ctx.font='15px "Courier New"';
    ctx.fillText('★ NEW HIGH SCORE! ★', W/2, H*0.64);
  } else if (highScore > 0) {
    ctx.fillStyle='#446677'; ctx.font='14px "Courier New"';
    ctx.fillText('BEST '+highScore, W/2, H*0.64);
  }
  if (Math.floor(Date.now()/500)%2) {
    glow('#fff',8); ctx.fillStyle='#fff'; ctx.font='14px "Courier New"';
    ctx.fillText('ENTER / クリックでリトライ', W/2, H*0.74);
  }
  noG();
}

// ── Update ────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'play') return;
  timer += dt;
  score = Math.floor(timer * 10);

  // Player movement
  const SPD=5.5, ACC=0.5, FRIC=0.80;
  if (K['ArrowLeft'])  P.vx -= ACC;
  if (K['ArrowRight']) P.vx += ACC;
  if (K['ArrowUp'])    P.vy -= ACC;
  if (K['ArrowDown'])  P.vy += ACC;
  P.vx = Math.max(-SPD, Math.min(SPD, P.vx)) * FRIC;
  P.vy = Math.max(-SPD, Math.min(SPD, P.vy)) * FRIC;
  P.x += P.vx; P.y += P.vy;
  P.x = Math.max(RL+12, Math.min(RR-12, P.x));
  P.y = Math.max(20,    Math.min(H-20,  P.y));
  if (P.inv > 0) P.inv -= dt;

  const rspd = 3 + timer * 0.015;
  roadY += rspd;

  // Spawn police cars
  spawnT -= dt;
  if (spawnT <= 0) {
    spawnT = Math.max(0.4, 2.2 - timer * 0.007);
    const lane = Math.floor(Math.random() * 3);
    cops.push({
      x: RL + (lane + 0.5) * LW,
      y: -60,
      spd: 2 + Math.random()*2 + timer*0.02,
      siren: Math.random() * 10,
    });
  }

  // Move cops and check collision
  for (let i = cops.length-1; i >= 0; i--) {
    const c = cops[i];
    c.siren += dt;
    const dx = P.x - c.x, dy = P.y - c.y;
    const dist = Math.hypot(dx, dy) || 1;
    c.x += (dx/dist) * Math.min(dist, 2.2);
    c.y += c.spd + rspd * 0.2;

    if (c.y > H+80) { cops.splice(i,1); continue; }

    if (P.inv <= 0 && Math.abs(P.x-c.x) < 18 && Math.abs(P.y-c.y) < 30) {
      burst(c.x, c.y, '#ff3300', 10);
      cops.splice(i, 1);
      lives--;
      burst(P.x, P.y, '#ff6600', 18);
      P.inv = 2.5;
      if (lives <= 0) {
        if (score > highScore) { highScore = score; localStorage.setItem('cc_hs', score); }
        state = 'over';
      }
    }
  }

  // Update sparks
  for (let i = sparks.length-1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.1;
    s.life -= s.d;
    if (s.life <= 0) sparks.splice(i, 1);
  }
}

// ── Main loop ─────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  if (state !== 'play') roadY += 3;
  update(dt);

  ctx.clearRect(0, 0, W, H);
  if (state === 'menu') {
    drawMenu();
  } else {
    drawRoad();
    cops.forEach(drawCop);
    drawPlayerCar();
    drawSparks();
    drawHUD();
    if (state === 'over') drawOver();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
