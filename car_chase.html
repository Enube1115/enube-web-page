<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CAR CHASE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
#c { display:block; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C=document.getElementById('c'), ctx=C.getContext('2d');
const W=400, H=600;
C.width=W; C.height=H;

// ── Responsive scaling ────────────────────────────────────────
function resize(){
  const s=Math.min(window.innerWidth/W, window.innerHeight/H);
  C.style.width =(W*s)+'px';
  C.style.height=(H*s)+'px';
}
resize();
window.addEventListener('resize', resize);

const RL=52, RR=W-52, RW=RR-RL, LW=RW/3;

// ── Progressive difficulty ────────────────────────────────────
// All values derived from timer — no manual difficulty selection
function spdMult()      { return Math.min(2.0, 0.72 + timer*0.008); }
function scoreMult()    { return 1.0 + timer*0.005; }
function spawnInterval(){ return Math.max(0.5, 3.2 - timer*0.015); }

const PHASES=[
  {t:0,   label:'ROOKIE',    col:'#00ff88'},
  {t:30,  label:'WANTED',    col:'#ffdd00'},
  {t:60,  label:'DANGEROUS', col:'#ff8800'},
  {t:100, label:'OUTLAW',    col:'#ff4400'},
  {t:150, label:'FUGITIVE',  col:'#ff0044'},
];
function phase(){ return [...PHASES].reverse().find(p=>timer>=p.t)||PHASES[0]; }

// ── State ─────────────────────────────────────────────────────
let state='menu', roadY=0;
let score=0, bonus=0, timer=0, lives=3, spawnT=0;
let highScore=+localStorage.getItem('cc_hs4')||0;
const P={x:W/2, y:H-100, vx:0, vy:0, inv:0};
let cops=[], sparks=[], missiles=[], civs=[], obs=[];
let ammo=8, mCool=0, civT=3, obsT=2;
let constrActive=false, constrTimer=14;

// ── Weather ───────────────────────────────────────────────────
let wx='clear', wxTimer=20;
let wxAlert='', wxAlertT=0;
const WXPOOL=['clear','clear','rain','fog'];
const rainDrops=Array.from({length:90},()=>({
  x:Math.random()*W, y:Math.random()*H,
  s:8+Math.random()*7, l:7+Math.random()*9
}));

// ── Input ─────────────────────────────────────────────────────
const K={};
let kbUsed=false;
window.addEventListener('keydown',e=>{
  K[e.key]=true; kbUsed=true;
  if([' ','Enter','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Escape'].includes(e.key))
    e.preventDefault();
  if(e.key===' '&&state==='play') fire();
  if(e.key==='Escape'){
    if(state==='play')  state='pause';
    else if(state==='pause') state='play';
  }
  if(e.key==='Enter'){
    if(state==='menu')  start();
    if(state==='pause') state='play';
    if(state==='over')  state='menu';
  }
});
window.addEventListener('keyup',e=>K[e.key]=false);

// ── Touch ─────────────────────────────────────────────────────
const T={left:false,right:false,up:false,down:false};
const AT=new Map();

function cxy(t){
  const r=C.getBoundingClientRect();
  return {x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height)};
}
function getZone(x,y){
  if(y<H*0.28) return 'up';
  if(y>H*0.72){
    if(x<W*0.35) return 'down';
    if(x>W*0.65) return 'fire';
    return 'down';
  }
  if(x<W*0.30) return 'left';
  if(x>W*0.70) return 'right';
  return 'none';
}
function syncT(){
  T.left=T.right=T.up=T.down=false;
  for(const z of AT.values()){
    if(z==='left')  T.left =true;
    if(z==='right') T.right=true;
    if(z==='up')    T.up   =true;
    if(z==='down')  T.down =true;
  }
}

C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state==='pause'){ state='play'; return; }
  if(state==='over'){  state='menu'; return; }
  if(state==='menu'){  start(); return; }
  for(const t of e.changedTouches){
    const p=cxy(t);
    const z=getZone(p.x,p.y);
    AT.set(t.identifier,z);
    if(z==='fire') fire();
  }
  syncT();
},{passive:false});

C.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const p=cxy(t);
    AT.set(t.identifier,getZone(p.x,p.y));
  }
  syncT();
},{passive:false});

C.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches) AT.delete(t.identifier);
  syncT();
},{passive:false});

C.addEventListener('click',e=>{
  if(state==='menu')  start();
  if(state==='over')  state='menu';
  if(state==='pause') state='play';
});

// ── Game control ──────────────────────────────────────────────
function start(){
  score=0; bonus=0; timer=0; lives=3; spawnT=0;
  ammo=8; mCool=0; civT=3; obsT=2; constrTimer=14; constrActive=false;
  cops=[]; sparks=[]; missiles=[]; civs=[]; obs=[];
  wx='clear'; wxTimer=20; wxAlert=''; wxAlertT=0;
  Object.assign(P,{x:W/2,y:H-100,vx:0,vy:0,inv:0});
  state='play';
}

function fire(){
  if(ammo<=0||mCool>0) return;
  missiles.push({x:P.x, y:P.y-26});
  ammo--; mCool=0.3;
  burst(P.x,P.y-30,'#00ffff',5);
}

function loseLife(){
  if(state!=='play') return;
  lives--;
  burst(P.x,P.y,'#ff6600',18);
  P.inv=2.5;
  if(lives<=0){
    if(score>highScore){ highScore=score; localStorage.setItem('cc_hs4',score); }
    state='over';
  }
}

// ── Draw helpers ──────────────────────────────────────────────
function glow(c,b){ ctx.shadowColor=c; ctx.shadowBlur=b; }
function noG(){ ctx.shadowBlur=0; }
function rr(x,y,w,h,r=5){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// ── Road ──────────────────────────────────────────────────────
function drawRoad(){
  ctx.fillStyle='#07071a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#0c0c22'; ctx.fillRect(0,0,RL,H); ctx.fillRect(RR,0,W-RR,H);
  ctx.fillStyle='#0b0b1e'; ctx.fillRect(RL,0,RW,H);

  if(constrActive){
    ctx.save();
    ctx.fillStyle='rgba(255,140,0,0.06)'; ctx.fillRect(RL,0,RW,H);
    ctx.strokeStyle='rgba(255,130,0,0.16)'; ctx.lineWidth=10;
    const off=(roadY*0.9)%56;
    for(let y=-off-56;y<H+56;y+=56){
      ctx.beginPath(); ctx.moveTo(RL,y); ctx.lineTo(RR,y+42); ctx.stroke();
    }
    ctx.restore();
  }

  glow('#00ffaa',10); ctx.strokeStyle='#00ffaa'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(RL,0); ctx.lineTo(RL,H);
  ctx.moveTo(RR,0); ctx.lineTo(RR,H); ctx.stroke();

  ctx.setLineDash([28,44]); ctx.lineDashOffset=-(roadY%72);
  glow('#223355',3); ctx.strokeStyle='#1e3050'; ctx.lineWidth=1.5;
  for(let i=1;i<3;i++){
    const x=RL+i*LW;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.setLineDash([]); noG();
}

// ── Fog (drawn early so it obscures game objects) ─────────────
function drawFog(){
  if(wx!=='fog') return;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,  'rgba(160,190,210,0.60)');
  g.addColorStop(0.5,'rgba(160,190,210,0.22)');
  g.addColorStop(1,  'rgba(160,190,210,0.04)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// ── Rain (drawn late so it appears over everything) ───────────
function drawRain(){
  if(wx!=='rain') return;
  ctx.save(); ctx.strokeStyle='rgba(150,200,255,0.48)'; ctx.lineWidth=1;
  for(const d of rainDrops){
    ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-2,d.y+d.l); ctx.stroke();
  }
  ctx.restore();
}

// ── Cars ──────────────────────────────────────────────────────
function drawPlayerCar(){
  if(P.inv>0&&Math.floor(P.inv*12)%2===0) return;
  ctx.save(); ctx.translate(P.x,P.y);
  glow('#00ffff',20); ctx.fillStyle='#00ddcc'; rr(-12,-21,24,42,6); ctx.fill();
  ctx.fillStyle='rgba(0,20,50,0.8)'; rr(-9,-11,18,14,3); ctx.fill();
  glow('#fff',14); ctx.fillStyle='#ffffdd';
  ctx.fillRect(-10,-20,6,4); ctx.fillRect(4,-20,6,4);
  glow('#f03',12); ctx.fillStyle='#f03';
  ctx.fillRect(-10,17,6,4); ctx.fillRect(4,17,6,4);
  noG(); ctx.restore();
}

function drawCop(c){
  const red=Math.sin(c.siren*6)>0;
  ctx.save(); ctx.translate(c.x,c.y);
  glow('#c20',14); ctx.fillStyle='#811'; rr(-11,-20,22,40,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(-11,-4,22,8);
  glow(red?'#f22':'#05f',22); ctx.fillStyle=red?'#f22':'#05f'; rr(-7,-27,14,8,3); ctx.fill();
  ctx.fillStyle='rgba(0,20,50,0.9)'; rr(-8,-10,16,13,3); ctx.fill();
  noG(); ctx.restore();
}

function drawCiv(v){
  ctx.save(); ctx.translate(v.x,v.y);
  glow('#88a',6); ctx.fillStyle='#556677'; rr(-10,-18,20,36,5); ctx.fill();
  ctx.fillStyle='rgba(200,220,255,0.55)'; rr(-7,-8,14,12,3); ctx.fill();
  ctx.fillStyle='#ffee88'; ctx.fillRect(-8,14,6,4); ctx.fillRect(2,14,6,4);
  noG(); ctx.restore();
}

function drawObs(o){
  ctx.save(); ctx.translate(o.x,o.y);
  glow('#f80',12); ctx.fillStyle='#f60';
  ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(-10,14); ctx.lineTo(10,14);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-5,4); ctx.lineTo(5,4); ctx.stroke();
  noG(); ctx.restore();
}

function drawMissile(m){
  ctx.save(); ctx.translate(m.x,m.y);
  glow('#0ff',18); ctx.fillStyle='#0ff'; ctx.fillRect(-3,-10,6,18);
  ctx.fillStyle='#fff'; ctx.fillRect(-2,-13,4,5);
  ctx.globalAlpha=0.4; ctx.fillStyle='#ff8800'; ctx.fillRect(-2,8,4,6);
  ctx.globalAlpha=1; noG(); ctx.restore();
}

function burst(x,y,col,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:2+Math.random()*3,c:col,d:0.035+Math.random()*0.03});
  }
}
function drawSparks(){
  for(const s of sparks){
    ctx.save(); glow(s.c,8); ctx.globalAlpha=s.life;
    ctx.fillStyle=s.c; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*s.life,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; noG(); ctx.restore();
  }
}

// ── HUD ───────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,38);
  ctx.textBaseline='middle';

  glow('#0ff',8); ctx.fillStyle='#0ff';
  ctx.font='bold 14px "Courier New"'; ctx.textAlign='left';
  ctx.fillText('SCORE '+String(score).padStart(6,'0'), 8, 19);

  ctx.textAlign='right';
  ctx.fillText(Math.floor(timer)+'s', W-8, 19);

  ctx.font='17px serif';
  for(let i=0;i<lives;i++){
    glow('#f24',6); ctx.fillStyle='#f24';
    ctx.fillText('♥', W/2-((lives-1)*9)+i*18, 19);
  }

  ctx.font='11px "Courier New"';
  glow(ammo>0?'#0ff':'#335',ammo>0?6:3);
  ctx.fillStyle=ammo>0?'#00ffff':'#336677';
  ctx.textAlign='left';
  ctx.fillText('🚀 ×'+Math.max(0,ammo), 8, 52);

  const ph=phase();
  glow(ph.col,4); ctx.fillStyle=ph.col;
  ctx.textAlign='right';
  ctx.fillText(ph.label, W-8, 52);

  if(constrActive){
    glow('#f80',6); ctx.fillStyle='#ffaa00';
    ctx.textAlign='center';
    ctx.fillText('🚧 CONSTRUCTION', W/2, 52);
  }

  if(wx!=='clear'){
    const wc=wx==='rain'?'#aaccff':'#99aacc';
    const wt=wx==='rain'?'☔ RAIN — SLIP!':'🌫 FOG — LOW VIS';
    glow(wc,6); ctx.fillStyle=wc;
    ctx.textAlign='center';
    ctx.fillText(wt, W/2, H-14);
  }

  if(wxAlertT>0){
    ctx.save();
    ctx.globalAlpha=Math.min(1, wxAlertT*2);
    const ac=wx==='rain'?'#88aaff':wx==='fog'?'#aabbcc':'#ffffaa';
    ctx.fillStyle='rgba(0,0,0,0.7)';
    rr(W/2-120,H/2-24,240,48,8); ctx.fill();
    glow(ac,14); ctx.fillStyle=ac;
    ctx.font='bold 18px "Courier New"';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(wxAlert, W/2, H/2);
    ctx.restore();
  }

  noG();
}

// ── Touch zone hints (hidden when keyboard is used) ───────────
function drawTouchHints(){
  if(kbUsed) return;
  ctx.save();
  ctx.globalAlpha=0.07;
  ctx.fillStyle='#00ffff';
  ctx.fillRect(0,0,W,H*0.28);
  ctx.fillRect(0,H*0.28,W*0.30,H*0.44);
  ctx.fillRect(W*0.70,H*0.28,W*0.30,H*0.44);
  ctx.fillRect(0,H*0.72,W*0.35,H*0.28);
  ctx.fillRect(W*0.65,H*0.72,W*0.35,H*0.28);
  ctx.globalAlpha=0.30;
  ctx.fillStyle='#00ffff'; ctx.font='10px "Courier New"';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('▲ 加速',  W/2,      H*0.14);
  ctx.fillText('◀',       W*0.15,   H*0.5);
  ctx.fillText('▶',       W*0.85,   H*0.5);
  ctx.fillText('▼',       W*0.175,  H*0.86);
  ctx.fillText('🚀',      W*0.825,  H*0.86);
  ctx.restore();
}

// ── Menu ──────────────────────────────────────────────────────
function drawMenu(){
  ctx.fillStyle='#07071a'; ctx.fillRect(0,0,W,H);
  ctx.setLineDash([28,44]); ctx.lineDashOffset=-(roadY%72);
  ctx.strokeStyle='#112233'; ctx.lineWidth=1.5;
  for(let i=1;i<3;i++){
    const x=RL+i*LW;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.textAlign='center'; ctx.textBaseline='middle';
  glow('#0ff',35); ctx.fillStyle='#0ff';
  ctx.font='bold 58px "Courier New"'; ctx.fillText('CAR',   W/2, H*0.21);
  glow('#f24',35); ctx.fillStyle='#f24';
  ctx.font='bold 58px "Courier New"'; ctx.fillText('CHASE', W/2, H*0.21+64);
  ctx.fillStyle='#aab0cc'; ctx.font='13px "Courier New"';
  ctx.fillText('パトカーから逃げろ！', W/2, H*0.21+106);

  // Phase progression preview
  ctx.fillStyle='#445566'; ctx.font='11px "Courier New"';
  ctx.fillText('── 時間とともに難しくなる ──', W/2, H*0.54);
  for(let i=0;i<PHASES.length;i++){
    const ph=PHASES[i];
    const nx=W/2+(i-2)*68;
    glow(ph.col,5); ctx.fillStyle=ph.col;
    ctx.font='bold 10px "Courier New"';
    ctx.fillText(ph.label, nx, H*0.60);
    if(ph.t>0){
      ctx.fillStyle='#445'; ctx.font='9px "Courier New"';
      ctx.fillText(ph.t+'s~', nx, H*0.60+13);
    }
  }

  // Blink start prompt
  if(Math.floor(Date.now()/500)%2){
    glow('#fff',10); ctx.fillStyle='#fff';
    ctx.font='bold 15px "Courier New"';
    ctx.fillText('ENTER / タップでスタート', W/2, H*0.72);
  }

  if(highScore>0){
    glow('#fd0',8); ctx.fillStyle='#fd0';
    ctx.font='14px "Courier New"';
    ctx.fillText('BEST  '+highScore, W/2, H*0.80);
  }

  ctx.fillStyle='#334455'; ctx.font='11px "Courier New"';
  ctx.fillText('← → ↑ ↓ 移動   SPACE: ミサイル   ESC: 一時停止', W/2, H*0.88);
  ctx.fillText('タッチ操作対応', W/2, H*0.93);
  noG();
}

// ── Pause screen ──────────────────────────────────────────────
function drawPause(){
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  glow('#fff',14); ctx.fillStyle='#fff';
  ctx.font='bold 40px "Courier New"'; ctx.fillText('PAUSED', W/2, H*0.44);
  ctx.font='13px "Courier New"'; ctx.fillStyle='#778899';
  ctx.fillText('ESC / Enter / タップで再開', W/2, H*0.56);
  noG();
}

// ── Game over ─────────────────────────────────────────────────
function drawOver(){
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  glow('#f24',28); ctx.fillStyle='#f24';
  ctx.font='bold 44px "Courier New"'; ctx.fillText('GAME OVER', W/2, H*0.36);
  glow('#fd0',14); ctx.fillStyle='#fd0'; ctx.font='21px "Courier New"';
  ctx.fillText('SCORE '+String(score).padStart(6,'0'), W/2, H*0.48);
  ctx.fillText('TIME  '+Math.floor(timer)+'s',         W/2, H*0.55);
  if(score>highScore&&score>0){
    glow('#0f8',12); ctx.fillStyle='#0f8';
    ctx.font='14px "Courier New"'; ctx.fillText('★ NEW HIGH SCORE! ★', W/2, H*0.63);
  } else if(highScore>0){
    ctx.fillStyle='#446677'; ctx.font='13px "Courier New"';
    ctx.fillText('BEST '+highScore, W/2, H*0.63);
  }
  if(Math.floor(Date.now()/500)%2){
    glow('#fff',8); ctx.fillStyle='#fff'; ctx.font='13px "Courier New"';
    ctx.fillText('ENTER / タップでメニューへ', W/2, H*0.73);
  }
  noG();
}

// ── Update ────────────────────────────────────────────────────
function update(dt){
  if(state!=='play') return;
  timer+=dt;
  score=Math.floor(timer*10*scoreMult())+bonus;

  // Weather cycle
  wxTimer-=dt;
  if(wxTimer<=0){
    const prev=wx;
    wx=WXPOOL[Math.floor(Math.random()*WXPOOL.length)];
    wxTimer=15+Math.random()*18;
    if(wx!==prev){
      const msgs={clear:'☀ 晴れ！ CLEAR', rain:'☔ RAIN — スリップ注意！', fog:'🌫 FOG — 前方不注意！'};
      wxAlert=msgs[wx]||''; wxAlertT=2.5;
    }
  }
  if(wxAlertT>0) wxAlertT-=dt;
  if(wx==='rain') for(const d of rainDrops){ d.y+=d.s; if(d.y>H){ d.y=-d.l; d.x=Math.random()*W; } }

  // Player movement
  const FRIC=wx==='rain'?0.72:0.82;
  const SPD=5.5, ACC=0.5;
  if(K['ArrowLeft'] ||T.left)  P.vx-=ACC;
  if(K['ArrowRight']||T.right) P.vx+=ACC;
  if(K['ArrowUp']   ||T.up)    P.vy-=ACC;
  if(K['ArrowDown'] ||T.down)  P.vy+=ACC;
  P.vx=Math.max(-SPD,Math.min(SPD,P.vx))*FRIC;
  P.vy=Math.max(-SPD,Math.min(SPD,P.vy))*FRIC;
  P.x+=P.vx; P.y+=P.vy;
  P.x=Math.max(RL+12, Math.min(RR-12, P.x));
  P.y=Math.max(20,    Math.min(H-20,  P.y));
  if(P.inv>0)  P.inv-=dt;
  if(mCool>0)  mCool-=dt;

  const rspd=3+timer*0.012;
  roadY+=rspd;

  // Construction zone cycle (not during rain, grace period 15s)
  if(timer>15 && wx!=='rain') constrTimer-=dt;
  if(constrTimer<=0){
    constrActive=!constrActive;
    constrTimer=constrActive ? 8+Math.random()*7 : 14+Math.random()*10;
    if(constrActive){
      const blocked=[0,1,2].sort(()=>Math.random()-0.5).slice(0,2);
      for(let i=0;i<4;i++){
        const lane=blocked[i%2];
        obs.push({x: RL+(lane+0.3+Math.random()*0.4)*LW, y:-50-i*130});
      }
    }
  }

  // Spawn cops (cap at 5 on screen)
  spawnT-=dt;
  if(spawnT<=0 && cops.length<5){
    spawnT=spawnInterval();
    const lane=Math.floor(Math.random()*3);
    cops.push({
      x: RL+(lane+0.5)*LW, y:-65,
      vx:0,
      spd:(2+Math.random()*2+timer*0.02)*spdMult(),
      siren:Math.random()*10,
    });
  } else if(cops.length>=5){
    spawnT=Math.max(spawnT,0.5);
  }

  // Move cops — phase-based AI: track from far, commit when close
  for(let i=cops.length-1;i>=0;i--){
    const c=cops[i];
    c.siren+=dt;
    const dx=P.x-c.x;
    const dy=P.y-c.y; // positive = player is below cop

    if(dy>150){
      // Tracking phase: weak spring; player (max 5.5) outruns cop (max 2.4)
      c.vx=c.vx*0.88 + dx*0.030*spdMult();
      c.vx=Math.max(-2.4, Math.min(2.4, c.vx));
    } else {
      // Commit phase: cop locks heading — dodge now to survive
      c.vx*=0.96;
    }
    c.x+=c.vx;
    c.y+=c.spd+rspd*0.2;
    if(c.y>H+80){ cops.splice(i,1); continue; }
    if(P.inv<=0&&Math.abs(P.x-c.x)<18&&Math.abs(P.y-c.y)<28){
      burst(c.x,c.y,'#f30',10); cops.splice(i,1); loseLife();
    }
  }

  // Civilian cars (cap at 3 on screen)
  civT-=dt;
  if(civT<=0){
    civT=4+Math.random()*4;
    if(civs.length<3)
      civs.push({x:RL+(Math.floor(Math.random()*3)+0.5)*LW, y:-55, spd:1.5+Math.random()*0.8});
  }
  for(let i=civs.length-1;i>=0;i--){
    const v=civs[i];
    v.y+=v.spd+rspd*0.65;
    if(v.y>H+60){ civs.splice(i,1); continue; }
    if(P.inv<=0&&Math.abs(P.x-v.x)<16&&Math.abs(P.y-v.y)<25){
      burst(v.x,v.y,'#aaceff',8); civs.splice(i,1); loseLife(); continue;
    }
    let removed=false;
    for(let j=cops.length-1;j>=0;j--){
      if(Math.abs(cops[j].x-v.x)<15&&Math.abs(cops[j].y-v.y)<24){
        burst(v.x,v.y,'#ff8',6); civs.splice(i,1); removed=true; break;
      }
    }
    if(removed) continue;
  }

  // Obstacles (cones, cap at 6 on screen)
  obsT-=dt;
  if(obsT<=0){
    obsT=3+Math.random()*3;
    if(obs.length<6)
      obs.push({x:RL+(Math.floor(Math.random()*3)+0.5)*LW, y:-50});
  }
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];
    o.y+=rspd*0.8;
    if(o.y>H+50){ obs.splice(i,1); continue; }
    if(P.inv<=0&&Math.abs(P.x-o.x)<13&&Math.abs(P.y-o.y)<16){
      burst(o.x,o.y,'#f80',8); obs.splice(i,1); loseLife();
    }
  }

  // Missiles
  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];
    m.y-=12;
    if(m.y<-20){ missiles.splice(i,1); continue; }
    let hit=false;
    for(let j=cops.length-1;j>=0;j--){
      if(Math.abs(m.x-cops[j].x)<15&&Math.abs(m.y-cops[j].y)<26){
        burst(cops[j].x,cops[j].y,'#ff0',14);
        burst(cops[j].x,cops[j].y,'#f40',8);
        cops.splice(j,1); bonus+=100; hit=true; break;
      }
    }
    if(!hit){
      for(let j=obs.length-1;j>=0;j--){
        if(Math.abs(m.x-obs[j].x)<12&&Math.abs(m.y-obs[j].y)<14){
          burst(obs[j].x,obs[j].y,'#f80',6); obs.splice(j,1); hit=true; break;
        }
      }
    }
    if(hit) missiles.splice(i,1);
  }

  // Sparks
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.1; s.life-=s.d;
    if(s.life<=0) sparks.splice(i,1);
  }
}

// ── Main loop ─────────────────────────────────────────────────
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000, 0.05); last=ts;
  if(state==='menu'||state==='over') roadY+=3;
  update(dt);

  ctx.clearRect(0,0,W,H);
  if(state==='menu'){
    drawMenu();
  } else {
    drawRoad();
    drawFog();
    obs.forEach(drawObs);
    civs.forEach(drawCiv);
    cops.forEach(drawCop);
    missiles.forEach(drawMissile);
    drawPlayerCar();
    drawSparks();
    drawRain();
    drawTouchHints();
    drawHUD();
    if(state==='pause') drawPause();
    if(state==='over')  drawOver();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{ last=ts; requestAnimationFrame(loop); });
</script>
