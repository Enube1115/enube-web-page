<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SNAKE // CYBERPUNK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-green:  #00ff88;
    --neon-pink:   #ff00aa;
    --neon-cyan:   #00eeff;
    --neon-yellow: #ffe600;
    --neon-purple: #bf00ff;
    --bg:          #000000;
    --panel-bg:    rgba(0,0,0,0.85);
    --border:      rgba(0,255,136,0.4);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: var(--neon-green);
  }

  #game-wrapper {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: 12px;
    width: min(100vw, 100vh);
    max-width: 600px;
    padding: 8px;
  }

  /* ── HUD ─────────────────────────────── */
  #hud {
    width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: rgba(0,255,136,0.04);
    border-radius: 4px;
    letter-spacing: 2px;
    font-size: clamp(11px, 2.5vw, 14px);
  }
  #hud span { color: var(--neon-cyan); }
  #hud .val { color: var(--neon-yellow); font-weight: bold; font-family: 'Orbitron', monospace; }
  #difficulty-badge {
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 11px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
  }
  .badge-easy   { color: #000; background: var(--neon-green);  box-shadow: 0 0 8px var(--neon-green); }
  .badge-normal { color: #000; background: var(--neon-yellow); box-shadow: 0 0 8px var(--neon-yellow); }
  .badge-hard   { color: #fff; background: var(--neon-pink);   box-shadow: 0 0 8px var(--neon-pink); }

  /* ── Canvas ──────────────────────────── */
  #canvas-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 0 20px rgba(0,255,136,0.15),
      inset 0 0 40px rgba(0,0,0,0.8);
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }

  /* ── Overlay (start / gameover) ──────── */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(4px);
    padding: 24px;
    transition: opacity 0.3s;
    z-index: 10;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 6vw, 40px);
    font-weight: 900;
    letter-spacing: 6px;
    text-align: center;
    color: var(--neon-green);
    text-shadow:
      0 0 10px var(--neon-green),
      0 0 30px var(--neon-green),
      0 0 60px rgba(0,255,136,0.5);
    animation: flicker 4s infinite;
  }
  .overlay h2 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px, 4vw, 26px);
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink), 0 0 30px var(--neon-pink);
    text-align: center;
  }
  .overlay p {
    font-size: clamp(11px, 2.8vw, 14px);
    color: rgba(0,255,136,0.7);
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.8;
  }

  .score-display {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .score-display .big {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 8vw, 56px);
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow), 0 0 40px rgba(255,230,0,0.4);
  }
  .score-display .label {
    font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.4);
  }

  /* Difficulty selector */
  .diff-selector {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .diff-btn {
    padding: 8px 20px;
    border: 1px solid currentColor;
    background: transparent;
    font-family: 'Orbitron', monospace;
    font-size: clamp(11px, 3vw, 13px);
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
  }
  .diff-btn:hover, .diff-btn.active { transform: scale(1.05); }
  .diff-btn[data-d="easy"]   { color: var(--neon-green);  }
  .diff-btn[data-d="normal"] { color: var(--neon-yellow); }
  .diff-btn[data-d="hard"]   { color: var(--neon-pink);   }
  .diff-btn[data-d="easy"].active   { background: rgba(0,255,136,0.15);  box-shadow: 0 0 12px var(--neon-green); }
  .diff-btn[data-d="normal"].active { background: rgba(255,230,0,0.12); box-shadow: 0 0 12px var(--neon-yellow); }
  .diff-btn[data-d="hard"].active   { background: rgba(255,0,170,0.15);  box-shadow: 0 0 12px var(--neon-pink); }

  /* Start / Restart button */
  .start-btn {
    padding: 12px 36px;
    border: 2px solid var(--neon-cyan);
    background: transparent;
    font-family: 'Orbitron', monospace;
    font-size: clamp(13px, 3.5vw, 16px);
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--neon-cyan);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    box-shadow: 0 0 10px rgba(0,238,255,0.3);
  }
  .start-btn:hover {
    background: rgba(0,238,255,0.15);
    box-shadow: 0 0 25px rgba(0,238,255,0.6), inset 0 0 15px rgba(0,238,255,0.1);
    transform: scale(1.03);
  }
  .start-btn:active { transform: scale(0.97); }

  /* Scanline overlay */
  #canvas-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Grid lines on canvas bg */
  #canvas-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 1;
  }

  canvas { position: relative; z-index: 2; }
  .overlay { z-index: 10; }

  /* Flicker animation */
  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
    20%,24%,55% { opacity: 0.6; }
  }

  /* High score row */
  .hs-row {
    display: flex; align-items: center; gap: 10px;
    font-size: clamp(11px, 2.5vw, 13px);
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }
  .hs-row .hs-val {
    color: var(--neon-purple);
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    text-shadow: 0 0 8px var(--neon-purple);
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--neon-green);
    border-style: solid;
    opacity: 0.6;
  }
  .corner.tl { top: 4px; left: 4px;  border-width: 2px 0 0 2px; }
  .corner.tr { top: 4px; right: 4px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 4px; left: 4px;  border-width: 0 0 2px 2px; }
  .corner.br { bottom: 4px; right: 4px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
<div id="game-wrapper">
  <!-- HUD -->
  <div id="hud">
    <div><span>SCORE </span><span class="val" id="score-disp">0</span></div>
    <div id="difficulty-badge" class="badge-normal">NORMAL</div>
    <div><span>BEST </span><span class="val" id="hi-disp">0</span></div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <canvas id="c"></canvas>

    <!-- Start overlay -->
    <div class="overlay" id="start-overlay">
      <h1>NEON SNAKE</h1>
      <p>CYBERPUNK // v1.0</p>
      <div class="diff-selector">
        <button class="diff-btn" data-d="easy">EASY</button>
        <button class="diff-btn active" data-d="normal">NORMAL</button>
        <button class="diff-btn" data-d="hard">HARD</button>
      </div>
      <button class="start-btn" id="start-btn">[ START ]</button>
      <p>↑↓←→ / WASD &nbsp;|&nbsp; SWIPE on mobile</p>
    </div>

    <!-- Game Over overlay -->
    <div class="overlay hidden" id="gameover-overlay">
      <h2>GAME OVER</h2>
      <div class="score-display">
        <span class="label">SCORE</span>
        <span class="big" id="go-score">0</span>
      </div>
      <div class="hs-row">
        <span>BEST</span>
        <span class="hs-val" id="go-best">0</span>
      </div>
      <div class="diff-selector">
        <button class="diff-btn" data-d="easy">EASY</button>
        <button class="diff-btn active" data-d="normal">NORMAL</button>
        <button class="diff-btn" data-d="hard">HARD</button>
      </div>
      <button class="start-btn" id="restart-btn">[ RETRY ]</button>
    </div>
  </div>
</div>

<script>
(() => {
  'use strict';

  /* ── Config ──────────────────────────── */
  const COLS = 25, ROWS = 25;
  const SPEEDS = { easy: 120, normal: 80, hard: 50 }; // ms per tick
  const COLORS = {
    snake_head: '#00ff88',
    snake_body: '#00cc66',
    food:       '#ff00aa',
    food2:      '#ff6600',
  };

  /* ── State ───────────────────────────── */
  let difficulty = 'normal';
  let snake, dir, nextDir, food, score, hiScore;
  let running = false, gameOver = false;
  let lastTick = 0, accum = 0;
  let rafId = null;

  /* ── DOM ─────────────────────────────── */
  const canvas        = document.getElementById('c');
  const ctx           = canvas.getContext('2d');
  const startOverlay  = document.getElementById('start-overlay');
  const goOverlay     = document.getElementById('gameover-overlay');
  const scoreDisp     = document.getElementById('score-disp');
  const hiDisp        = document.getElementById('hi-disp');
  const goScore       = document.getElementById('go-score');
  const goBest        = document.getElementById('go-best');
  const diffBadge     = document.getElementById('difficulty-badge');

  /* ── Canvas resize ───────────────────── */
  function resizeCanvas() {
    const wrap = document.getElementById('canvas-wrap');
    const size = wrap.clientWidth;
    canvas.width  = size;
    canvas.height = size;
    if (!running && !gameOver) drawIdle();
  }

  /* ── High score ──────────────────────── */
  function loadHiScore() {
    return parseInt(localStorage.getItem(`neonsnake_hi_${difficulty}`) || '0', 10);
  }
  function saveHiScore(s) {
    localStorage.setItem(`neonsnake_hi_${difficulty}`, s);
  }
  function updateHUD() {
    scoreDisp.textContent = score;
    hiDisp.textContent    = hiScore;
  }

  /* ── Difficulty UI ───────────────────── */
  function applyDiffUI(container) {
    container.querySelectorAll('.diff-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.d === difficulty);
    });
    diffBadge.className = `badge-${difficulty}`;
    diffBadge.textContent = difficulty.toUpperCase();
  }

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      difficulty = btn.dataset.d;
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll(`[data-d="${difficulty}"]`).forEach(b => b.classList.add('active'));
      applyDiffUI(document.body);
      hiScore = loadHiScore();
      updateHUD();
    });
  });

  /* ── Game init ───────────────────────── */
  function initGame() {
    const mx = Math.floor(COLS / 2);
    const my = Math.floor(ROWS / 2);
    snake = [
      { x: mx,     y: my },
      { x: mx - 1, y: my },
      { x: mx - 2, y: my },
    ];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    hiScore = loadHiScore();
    spawnFood();
    updateHUD();
  }

  function spawnFood() {
    const empties = [];
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        if (!snake.some(s => s.x === x && s.y === y)) {
          empties.push({ x, y });
        }
      }
    }
    food = empties[Math.floor(Math.random() * empties.length)];
  }

  /* ── Game loop ───────────────────────── */
  function startGame() {
    if (rafId) cancelAnimationFrame(rafId);
    initGame();
    running  = true;
    gameOver = false;
    accum    = 0;
    lastTick = performance.now();
    startOverlay.classList.add('hidden');
    goOverlay.classList.add('hidden');
    rafId = requestAnimationFrame(loop);
  }

  function loop(ts) {
    if (!running) return;
    const delta = ts - lastTick;
    lastTick = ts;
    accum += delta;

    const speed = SPEEDS[difficulty];
    while (accum >= speed) {
      accum -= speed;
      tick();
      if (gameOver) return;
    }

    draw(accum / speed); // fractional for smooth interpolation
    rafId = requestAnimationFrame(loop);
  }

  function tick() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame(); return;
    }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(); return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      if (score > hiScore) { hiScore = score; saveHiScore(hiScore); }
      updateHUD();
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function endGame() {
    running  = false;
    gameOver = true;
    goScore.textContent = score;
    goBest.textContent  = hiScore;
    applyDiffUI(goOverlay);
    setTimeout(() => goOverlay.classList.remove('hidden'), 300);
    draw(0);
  }

  /* ── Drawing ─────────────────────────── */
  const CELL = () => canvas.width / COLS;

  function clearCanvas() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawGrid() {
    const cell = CELL();
    ctx.strokeStyle = 'rgba(0,255,136,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * cell, 0);
      ctx.lineTo(x * cell, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * cell);
      ctx.lineTo(canvas.width, y * cell);
      ctx.stroke();
    }
  }

  function drawFood(t) {
    const cell = CELL();
    const pulse = 0.85 + 0.15 * Math.sin(t * Math.PI * 2);
    const fx = food.x * cell + cell / 2;
    const fy = food.y * cell + cell / 2;
    const r  = (cell / 2 - 2) * pulse;

    ctx.save();
    ctx.shadowColor = COLORS.food;
    ctx.shadowBlur  = 20 * pulse;
    ctx.fillStyle   = COLORS.food;
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright core
    const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, COLORS.food);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawSnake(frac) {
    const cell = CELL();
    const pad  = 2;
    const r    = cell / 2 - pad;

    snake.forEach((seg, i) => {
      const isHead = i === 0;
      const color  = isHead ? COLORS.snake_head : COLORS.snake_body;
      const glow   = isHead ? 25 : 10;

      // Smooth head interpolation
      let drawX = seg.x, drawY = seg.y;
      if (isHead && running) {
        drawX = seg.x - dir.x * (1 - frac);
        drawY = seg.y - dir.y * (1 - frac);
      }

      const cx = drawX * cell + cell / 2;
      const cy = drawY * cell + cell / 2;
      const segR = r - (i === 0 ? 0 : i * 0.02);

      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur  = glow;

      // Body fill
      const alpha = Math.max(0.3, 1 - i * 0.03);
      ctx.fillStyle = isHead ? color : `rgba(0,204,102,${alpha})`;
      ctx.beginPath();
      ctx.roundRect(
        drawX * cell + pad,
        seg.y * cell + pad,
        cell - pad * 2,
        cell - pad * 2,
        4
      );
      ctx.fill();

      // Head highlight
      if (isHead) {
        const hg = ctx.createRadialGradient(cx - 2, cy - 2, 0, cx, cy, cell / 2);
        hg.addColorStop(0, 'rgba(255,255,255,0.5)');
        hg.addColorStop(1, 'transparent');
        ctx.fillStyle = hg;
        ctx.beginPath();
        ctx.roundRect(
          drawX * cell + pad,
          seg.y * cell + pad,
          cell - pad * 2,
          cell - pad * 2,
          4
        );
        ctx.fill();

        // Eyes
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000';
        const eyeOffset = cell * 0.2;
        const eyeR = Math.max(2, cell * 0.08);
        const [ex1, ey1, ex2, ey2] = (() => {
          if (dir.x === 1)  return [cx + 3, cy - eyeOffset, cx + 3, cy + eyeOffset];
          if (dir.x === -1) return [cx - 3, cy - eyeOffset, cx - 3, cy + eyeOffset];
          if (dir.y === -1) return [cx - eyeOffset, cy - 3, cx + eyeOffset, cy - 3];
          return                   [cx - eyeOffset, cy + 3, cx + eyeOffset, cy + 3];
        })();
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    });
  }

  function drawIdle() {
    clearCanvas();
    drawGrid();
  }

  let foodAnim = 0;
  function draw(frac) {
    foodAnim = (foodAnim + 0.016) % 1;
    clearCanvas();
    drawGrid();
    if (food) drawFood(foodAnim);
    if (snake) drawSnake(frac);
  }

  /* ── Controls ────────────────────────── */
  const DIRS = {
    ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 },
    ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 },
    ArrowLeft:  { x:-1, y:  0 }, a: { x:-1, y:  0 },
    ArrowRight: { x: 1, y:  0 }, d: { x: 1, y:  0 },
  };

  document.addEventListener('keydown', e => {
    const k = e.key === e.key.toLowerCase() ? e.key : e.key;
    const d = DIRS[k] || DIRS[k.toLowerCase()];
    if (!d) return;
    e.preventDefault();
    if (!running) return;
    // Prevent reversing
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
  });

  /* Touch / Swipe */
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  canvas.addEventListener('touchend', e => {
    if (!running) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    let d;
    if (Math.abs(dx) > Math.abs(dy)) {
      d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
    } else {
      d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
    }
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
  }, { passive: true });

  /* ── Buttons ─────────────────────────── */
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);

  /* ── Init ────────────────────────────── */
  hiScore = loadHiScore();
  updateHUD();
  applyDiffUI(startOverlay);
  applyDiffUI(goOverlay);
  applyDiffUI(document.body);

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  drawIdle();
})();
</script>
</body>
</html>
