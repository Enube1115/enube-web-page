<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AIに聞く">
<title>AIに聞く</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  background: #f5f5f0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ヘッダー */
#header {
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 56px;
  flex-shrink: 0;
  gap: 12px;
}

#menu-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex-shrink: 0;
}
#menu-btn span {
  display: block;
  width: 22px;
  height: 2px;
  background: #333;
  border-radius: 2px;
  transition: all 0.2s;
}

#chat-title {
  flex: 1;
  font-size: 17px;
  font-weight: bold;
  color: #333;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#new-btn {
  background: #0071c2;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 15px;
  cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
}
#new-btn:active { opacity: 0.8; }

/* サイドバーオーバーレイ */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 10;
}
#overlay.open { display: block; }

/* サイドバー */
#sidebar {
  position: fixed;
  top: 0;
  left: -280px;
  width: 280px;
  height: 100%;
  background: #fff;
  z-index: 20;
  transition: left 0.25s ease;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e0e0e0;
}
#sidebar.open { left: 0; }

#sidebar-header {
  padding: 18px 16px 14px;
  font-size: 16px;
  font-weight: bold;
  color: #333;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#close-btn {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: #666;
  padding: 4px 8px;
}

#chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.chat-item {
  padding: 14px 16px;
  font-size: 16px;
  color: #333;
  cursor: pointer;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.chat-item:active { background: #f5f5f0; }
.chat-item.active { background: #e8f0fb; color: #0071c2; font-weight: bold; }

.chat-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.delete-btn {
  background: none;
  border: none;
  font-size: 18px;
  color: #bbb;
  cursor: pointer;
  padding: 2px 6px;
  flex-shrink: 0;
}
.delete-btn:active { color: #e74c3c; }

#sidebar-new-btn {
  margin: 12px 16px;
  padding: 14px;
  background: #0071c2;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
}
#sidebar-new-btn:active { opacity: 0.8; }

/* メッセージ */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  -webkit-overflow-scrolling: touch;
}

.bubble {
  max-width: 86%;
  padding: 14px 16px;
  border-radius: 20px;
  font-size: 19px;
  line-height: 1.8;
  word-break: break-word;
  white-space: pre-wrap;
}
.bubble.user {
  align-self: flex-end;
  background: #0071c2;
  color: #fff;
  border-bottom-right-radius: 5px;
}
.bubble.ai {
  align-self: flex-start;
  background: #fff;
  color: #222;
  border: 1px solid #e0e0e0;
  border-bottom-left-radius: 5px;
}
.bubble.thinking { color: #888; font-style: italic; }

/* 入力エリア */
#inputarea {
  background: #fff;
  border-top: 1px solid #e0e0e0;
  padding: 14px 16px 20px;
  flex-shrink: 0;
}

#status {
  font-size: 15px;
  color: #888;
  text-align: center;
  min-height: 22px;
  margin-bottom: 10px;
}

#micbtn {
  display: block;
  width: 100%;
  padding: 18px;
  font-size: 20px;
  font-weight: bold;
  background: #0071c2;
  color: #fff;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  margin-bottom: 12px;
  letter-spacing: 0.05em;
  transition: background 0.15s, transform 0.1s;
  font-family: inherit;
}
#micbtn:active { transform: scale(0.97); }
#micbtn.recording {
  background: #c0392b;
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.75; }
}

#textrow {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

#textinput {
  flex: 1;
  font-size: 18px;
  padding: 12px 14px;
  border: 1.5px solid #ccc;
  border-radius: 12px;
  font-family: inherit;
  color: #222;
  background: #fafafa;
  outline: none;
  resize: none;
  min-height: 48px;
  max-height: 120px;
  overflow-y: auto;
  line-height: 1.5;
}
#textinput:focus { border-color: #0071c2; }

#sendbtn {
  padding: 12px 20px;
  font-size: 18px;
  font-weight: bold;
  background: #0071c2;
  color: #fff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  flex-shrink: 0;
}
#sendbtn:active { opacity: 0.8; }
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <span>チャット履歴</span>
    <button id="close-btn" onclick="closeSidebar()">✕</button>
  </div>
  <div id="chat-list"></div>
  <button id="sidebar-new-btn" onclick="newChat(); closeSidebar();">＋ 新しい会話</button>
</div>

<div id="header">
  <button id="menu-btn" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <div id="chat-title">AIに聞く</div>
  <button id="new-btn" onclick="newChat()">＋ 新規</button>
</div>

<div id="messages"></div>

<div id="inputarea">
  <div id="status"></div>
  <button id="micbtn" onclick="toggleMic()">🎤 話す</button>
  <div id="textrow">
    <textarea id="textinput" placeholder="文字で入力する場合はこちら" rows="1"></textarea>
    <button id="sendbtn" onclick="sendFromText()">送信</button>
  </div>
</div>

<script>
const WORKER_URL = 'https://winter-breeze-1119.ytrstr1007.workers.dev';
const CHATS_KEY = 'family_ai_chats';
const CURRENT_KEY = 'family_ai_current';

// --- データ構造 ---
// chats: { id: { id, title, messages: [{role, content}] } }
let chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}');
let currentId = localStorage.getItem(CURRENT_KEY) || null;
let recognition = null;
let isRecording = false;

const msgsEl = document.getElementById('messages');
const statusEl = document.getElementById('status');
const micbtn = document.getElementById('micbtn');
const textinput = document.getElementById('textinput');
const chatTitleEl = document.getElementById('chat-title');
const chatListEl = document.getElementById('chat-list');

function saveChats() {
  localStorage.setItem(CHATS_KEY, JSON.stringify(chats));
}

function getCurrentChat() {
  return currentId && chats[currentId] ? chats[currentId] : null;
}

function newChat() {
  const id = Date.now().toString();
  chats[id] = { id, title: '新しい会話', messages: [] };
  currentId = id;
  localStorage.setItem(CURRENT_KEY, currentId);
  saveChats();
  renderMessages();
  renderSidebar();
}

function loadChat(id) {
  currentId = id;
  localStorage.setItem(CURRENT_KEY, currentId);
  renderMessages();
  renderSidebar();
}

function deleteChat(id) {
  delete chats[id];
  if (currentId === id) {
    const ids = Object.keys(chats);
    currentId = ids.length > 0 ? ids[ids.length - 1] : null;
    localStorage.setItem(CURRENT_KEY, currentId || '');
  }
  saveChats();
  renderMessages();
  renderSidebar();
}

function renderMessages() {
  msgsEl.innerHTML = '';
  const chat = getCurrentChat();
  if (!chat) {
    chatTitleEl.textContent = 'AIに聞く';
    addBubble('ai', 'こんにちは。何でも気軽に聞いてください。\n下の「話す」ボタンを押してから話しかけると、声で入力できますよ。');
    return;
  }
  chatTitleEl.textContent = chat.title;
  if (chat.messages.length === 0) {
    addBubble('ai', 'こんにちは。何でも気軽に聞いてください。\n下の「話す」ボタンを押してから話しかけると、声で入力できますよ。');
  } else {
    chat.messages.forEach(m => addBubble(m.role === 'user' ? 'user' : 'ai', m.content));
  }
}

function renderSidebar() {
  chatListEl.innerHTML = '';
  const ids = Object.keys(chats).reverse();
  if (ids.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:20px 16px; color:#aaa; font-size:15px;';
    empty.textContent = 'まだ会話がありません';
    chatListEl.appendChild(empty);
    return;
  }
  ids.forEach(id => {
    const chat = chats[id];
    const item = document.createElement('div');
    item.className = 'chat-item' + (id === currentId ? ' active' : '');

    const title = document.createElement('div');
    title.className = 'chat-item-title';
    title.textContent = chat.title;
    title.onclick = () => { loadChat(id); closeSidebar(); };

    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.textContent = '🗑';
    del.onclick = (e) => { e.stopPropagation(); if (confirm('この会話を削除しますか？')) deleteChat(id); };

    item.appendChild(title);
    item.appendChild(del);
    chatListEl.appendChild(item);
  });
}

function addBubble(role, text, cls) {
  const d = document.createElement('div');
  d.className = 'bubble ' + role + (cls ? ' ' + cls : '');
  d.textContent = text;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}

// --- サイドバー開閉 ---
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// --- API送信 ---
async function send(text) {
  text = text.trim();
  if (!text) return;
  textinput.value = '';
  textinput.style.height = 'auto';

  if (!getCurrentChat()) newChat();
  const chat = getCurrentChat();

  addBubble('user', text);
  chat.messages.push({ role: 'user', content: text });

  if (chat.messages.length === 1) {
    chat.title = text.length > 20 ? text.slice(0, 20) + '…' : text;
    chatTitleEl.textContent = chat.title;
    renderSidebar();
  }

  const thinking = addBubble('ai', '考えています…', 'thinking');
  statusEl.textContent = '';

  try {
    const messages = [
      { role: 'system', content: 'あなたは高齢者の家族のための、やさしいAIアシスタントです。難しい言葉は使わず、短くわかりやすく答えてください。スマホの使い方やWi-Fiの質問にも丁寧に答えてください。専門用語は使わず、やさしい日本語で話してください。' },
      ...chat.messages.map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }))
    ];
    const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
    const data = await res.json();
    const reply = data.reply || '（うまく聞き取れませんでした）';
    thinking.textContent = reply;
    thinking.classList.remove('thinking');
    chat.messages.push({ role: 'assistant', content: reply });
    if (chat.messages.length > 40) chat.messages = chat.messages.slice(-40);
    saveChats();
  } catch {
    thinking.textContent = 'エラーが起きました。もう一度お試しください。';
    thinking.classList.remove('thinking');
  }
}

function sendFromText() { send(textinput.value); }

textinput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromText(); }
});
textinput.addEventListener('input', () => {
  textinput.style.height = 'auto';
  textinput.style.height = Math.min(textinput.scrollHeight, 120) + 'px';
});

// --- 音声入力 ---
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  micbtn.textContent = '音声入力は非対応のブラウザです';
  micbtn.style.background = '#999';
  micbtn.onclick = null;
} else {
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onresult = e => {
    let interim = '', final = '';
    for (const r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    statusEl.textContent = '「' + (final || interim) + '」';
  };

  recognition.onend = () => {
    const captured = statusEl.textContent.replace(/^「|」$/g, '');
    isRecording = false;
    micbtn.classList.remove('recording');
    micbtn.textContent = '🎤 話す';
    if (captured) send(captured);
    else statusEl.textContent = '';
  };

  recognition.onerror = e => {
    isRecording = false;
    micbtn.classList.remove('recording');
    micbtn.textContent = '🎤 話す';
    statusEl.textContent = e.error === 'not-allowed' ? 'マイクの使用を許可してください' : 'もう一度試してください';
  };
}

function toggleMic() {
  if (!recognition) return;
  if (isRecording) { recognition.stop(); }
  else {
    isRecording = true;
    micbtn.classList.add('recording');
    micbtn.textContent = '⏹ 止める';
    statusEl.textContent = '話してください…';
    recognition.start();
  }
}

// --- 初期化 ---
if (currentId && chats[currentId]) {
  renderMessages();
} else if (Object.keys(chats).length > 0) {
  currentId = Object.keys(chats).slice(-1)[0];
  localStorage.setItem(CURRENT_KEY, currentId);
  renderMessages();
} else {
  renderMessages();
}
renderSidebar();
</script>
</body>
</html>
