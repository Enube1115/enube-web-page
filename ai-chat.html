<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AIに聞く">
<title>AIに聞く</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background: #f5f5f0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    background: #fff;
    padding: 14px 20px 12px;
    border-bottom: 1px solid #e0e0e0;
    font-size: 17px;
    font-weight: bold;
    color: #333;
    flex-shrink: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }

  .bubble {
    max-width: 86%;
    padding: 14px 16px;
    border-radius: 20px;
    font-size: 19px;
    line-height: 1.8;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .bubble.user {
    align-self: flex-end;
    background: #0071c2;
    color: #fff;
    border-bottom-right-radius: 5px;
  }

  .bubble.ai {
    align-self: flex-start;
    background: #fff;
    color: #222;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 5px;
  }

  .bubble.thinking {
    color: #888;
    font-style: italic;
  }

  #inputarea {
    background: #fff;
    border-top: 1px solid #e0e0e0;
    padding: 14px 16px 20px;
    flex-shrink: 0;
  }

  #status {
    font-size: 15px;
    color: #888;
    text-align: center;
    min-height: 22px;
    margin-bottom: 10px;
  }

  #micbtn {
    display: block;
    width: 100%;
    padding: 18px;
    font-size: 20px;
    font-weight: bold;
    background: #0071c2;
    color: #fff;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }

  #micbtn:active { transform: scale(0.97); }

  #micbtn.recording {
    background: #c0392b;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.75; }
  }

  #textrow {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #textinput {
    flex: 1;
    font-size: 18px;
    padding: 12px 14px;
    border: 1.5px solid #ccc;
    border-radius: 12px;
    font-family: inherit;
    color: #222;
    background: #fafafa;
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.5;
  }

  #textinput:focus { border-color: #0071c2; }

  #sendbtn {
    padding: 12px 20px;
    font-size: 18px;
    font-weight: bold;
    background: #0071c2;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #sendbtn:active { opacity: 0.8; }

  #apikey-screen {
    position: fixed;
    inset: 0;
    background: #f5f5f0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px 24px;
    gap: 20px;
    z-index: 100;
  }

  #apikey-screen h2 {
    font-size: 22px;
    color: #333;
    text-align: center;
  }

  #apikey-screen p {
    font-size: 16px;
    color: #666;
    text-align: center;
    line-height: 1.7;
  }

  #apikey-input {
    width: 100%;
    font-size: 16px;
    padding: 14px;
    border: 1.5px solid #ccc;
    border-radius: 12px;
    font-family: monospace;
    outline: none;
  }

  #apikey-save {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    background: #0071c2;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<!-- APIキー設定画面（初回のみ） -->
<div id="apikey-screen">
  <h2>最初に一度だけ設定が必要です</h2>
  <p>Anthropic APIキーを入力してください。<br>入力後はこの画面は出ません。</p>
  <input id="apikey-input" type="password" placeholder="sk-ant-..." autocomplete="off">
  <button id="apikey-save" onclick="saveApiKey()">保存して始める</button>
</div>

<!-- メイン画面 -->
<div id="header">AIに聞く</div>

<div id="messages">
  <div class="bubble ai">こんにちは。何でも気軽に聞いてください。<br>下の「話す」ボタンを押してから話しかけると、声で入力できますよ。</div>
</div>

<div id="inputarea">
  <div id="status"></div>
  <button id="micbtn" onclick="toggleMic()">🎤 話す</button>
  <div id="textrow">
    <textarea id="textinput" placeholder="文字で入力する場合はこちら" rows="1"></textarea>
    <button id="sendbtn" onclick="sendFromText()">送信</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'family_ai_apikey';
let history = [];
let recognition = null;
let isRecording = false;

// --- APIキー管理 ---
function getApiKey() {
  return localStorage.getItem(STORAGE_KEY) || '';
}

function saveApiKey() {
  const key = document.getElementById('apikey-input').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('APIキーは「sk-ant-」から始まる文字列です。確認してください。');
    return;
  }
  localStorage.setItem(STORAGE_KEY, key);
  document.getElementById('apikey-screen').style.display = 'none';
}

if (getApiKey()) {
  document.getElementById('apikey-screen').style.display = 'none';
}

// --- メッセージ表示 ---
const msgsEl = document.getElementById('messages');
const statusEl = document.getElementById('status');
const micbtn = document.getElementById('micbtn');
const textinput = document.getElementById('textinput');

function addBubble(role, text, cls) {
  const d = document.createElement('div');
  d.className = 'bubble ' + role + (cls ? ' ' + cls : '');
  d.textContent = text;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}

// --- API送信 ---
async function send(text) {
  text = text.trim();
  if (!text) return;
  textinput.value = '';
  textinput.style.height = 'auto';
  addBubble('user', text);
  history.push({ role: 'user', content: text });
  const thinking = addBubble('ai', '考えています…', 'thinking');
  statusEl.textContent = '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'あなたは高齢者の家族のための、やさしいAIアシスタントです。難しい言葉は使わず、短くわかりやすく答えてください。スマホの使い方やWi-Fiの質問にも丁寧に答えてください。専門用語は使わず、やさしい日本語で話してください。',
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || '（うまく聞き取れませんでした）';
    thinking.textContent = reply;
    thinking.classList.remove('thinking');
    history.push({ role: 'assistant', content: reply });
    if (history.length > 20) history = history.slice(-20);
  } catch {
    thinking.textContent = 'エラーが起きました。もう一度お試しください。';
    thinking.classList.remove('thinking');
  }
}

function sendFromText() {
  send(textinput.value);
}

textinput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromText(); }
});
textinput.addEventListener('input', () => {
  textinput.style.height = 'auto';
  textinput.style.height = Math.min(textinput.scrollHeight, 120) + 'px';
});

// --- 音声入力 ---
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  micbtn.textContent = '音声入力は非対応のブラウザです';
  micbtn.style.background = '#999';
  micbtn.onclick = null;
} else {
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onresult = e => {
    let interim = '', final = '';
    for (const r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    statusEl.textContent = '「' + (final || interim) + '」';
  };

  recognition.onend = () => {
    const captured = statusEl.textContent.replace(/^「|」$/g, '');
    isRecording = false;
    micbtn.classList.remove('recording');
    micbtn.textContent = '🎤 話す';
    if (captured) send(captured);
    else statusEl.textContent = '';
  };

  recognition.onerror = e => {
    isRecording = false;
    micbtn.classList.remove('recording');
    micbtn.textContent = '🎤 話す';
    if (e.error === 'not-allowed') {
      statusEl.textContent = 'マイクの使用を許可してください';
    } else {
      statusEl.textContent = 'もう一度試してください';
    }
  };
}

function toggleMic() {
  if (!recognition) return;
  if (isRecording) {
    recognition.stop();
  } else {
    isRecording = true;
    micbtn.classList.add('recording');
    micbtn.textContent = '⏹ 止める';
    statusEl.textContent = '話してください…';
    recognition.start();
  }
}
</script>
</body>
</html>
