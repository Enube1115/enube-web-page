<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ビジュアルゲームエンジン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1e1e2e;color:#cdd6f4;height:100vh;overflow:hidden}
#app{display:flex;height:100vh}

#palette{width:195px;background:#181825;overflow-y:auto;padding:0 6px 8px;flex-shrink:0;border-right:2px solid #313244}
#palette-header{position:sticky;top:0;background:#181825;z-index:10;padding-bottom:2px}
.diff-tabs{display:flex;gap:4px;padding:8px 0 5px}
.diff-tab{flex:1;padding:6px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:800;border-radius:8px;border:2px solid #313244;color:#888;transition:all .15s}
.diff-tab:hover{color:#cdd6f4;border-color:#585b70}
#tab-easy.active{border-color:#a6e3a1;color:#a6e3a1;background:rgba(166,227,161,.13)}
#tab-normal.active{border-color:#cba6f7;color:#cba6f7;background:rgba(203,166,247,.12)}
.mode-tabs{display:flex;flex-direction:column;gap:4px;padding:0 0 8px}
.mode-tab{width:100%;padding:8px 11px;text-align:left;cursor:pointer;font-size:12.5px;font-weight:700;border-radius:8px;border:2px solid #313244;color:#6c7086;transition:all .15s;display:flex;align-items:center;gap:7px;letter-spacing:.2px}
.mode-tab:hover{color:#cdd6f4;border-color:#585b70;background:rgba(255,255,255,.05)}
#tab-action.active{border-color:#4c97ff;color:#4c97ff;background:rgba(76,151,255,.13)}
#tab-shoot.active{border-color:#f07cc0;color:#f07cc0;background:rgba(240,124,192,.12)}
#tab-puzzle.active{border-color:#26c6a6;color:#26c6a6;background:rgba(38,198,166,.12)}
.cat-label{font-size:10px;font-weight:700;padding:5px 8px;margin:8px 0 3px;border-radius:4px;text-transform:uppercase;letter-spacing:1px;opacity:.85}
.pb{padding:7px 9px;margin:2px 0;border-radius:6px;cursor:grab;font-size:12px;user-select:none;border:none;display:block;width:100%;text-align:left;color:#fff}
.pb:active{cursor:grabbing;opacity:.6}
.pb:hover{filter:brightness(1.18)}

#ewrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#etoolbar{background:#181825;padding:8px 10px;display:flex;gap:8px;align-items:center;border-bottom:2px solid #313244;flex-shrink:0}
#etoolbar button{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700}
#btn-run{background:#a6e3a1;color:#1e1e2e}
#btn-stop{background:#f38ba8;color:#1e1e2e}
#btn-clr{background:#fab387;color:#1e1e2e}
#btn-sample{background:#89dceb;color:#1e1e2e}
#editor{flex:1;overflow:auto;background:#1e1e2e;padding:14px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:10px}
.drop-hint{border:2px dashed #45475a;border-radius:10px;padding:20px;color:#585b70;font-size:13px;text-align:center;width:100%;margin:8px 0}

.sg{background:rgba(255,255,255,.04);border:1px solid #313244;border-radius:10px;padding:8px 8px 4px;display:inline-flex;flex-direction:column;gap:0;min-width:200px;position:relative;align-self:flex-start}
.sg-del{position:absolute;top:4px;right:6px;cursor:pointer;opacity:.3;font-size:11px;color:#f38ba8}
.sg-del:hover{opacity:1}
.drop-zone{height:14px;border-radius:4px;transition:all .15s;flex-shrink:0}
.drop-zone.highlight{height:20px;background:rgba(203,166,247,.1);border:2px dashed rgba(203,166,247,.35);animation:dz-pulse 1.2s ease-in-out infinite}
.drop-zone.over{height:36px;background:rgba(203,166,247,.3);border:2px dashed #cba6f7;box-shadow:0 0 10px rgba(203,166,247,.5);animation:none}
@keyframes dz-pulse{0%,100%{background:rgba(203,166,247,.1)}50%{background:rgba(203,166,247,.2)}}

.block{border-radius:8px;padding:7px 10px;cursor:grab;font-size:12px;user-select:none;display:flex;align-items:center;flex-wrap:wrap;gap:5px;position:relative;border:2px solid transparent;margin:0}
.block.hat{border-radius:14px 14px 6px 6px}
.block:active{cursor:grabbing}
.block.dragging{opacity:.4}
.bdel{cursor:pointer;opacity:.3;font-size:11px;margin-left:auto;padding-left:6px;color:#fff}
.bdel:hover{opacity:1}
.block input[type=number]{width:48px;padding:2px 4px;border-radius:4px;border:none;background:rgba(255,255,255,.22);color:#fff;font-size:12px;text-align:center}
.block input[type=color]{width:38px;height:22px;padding:0;border:none;border-radius:4px;cursor:pointer;background:none}
.block input[type=text]{width:72px;padding:2px 4px;border-radius:4px;border:none;background:rgba(255,255,255,.22);color:#fff;font-size:12px}
.block select{padding:2px 4px;border-radius:4px;border:none;background:rgba(0,0,0,.4);color:#fff;font-size:11px;cursor:pointer;max-width:92px}
.inner-wrap{margin-top:4px;margin-left:14px;border-left:3px solid rgba(255,255,255,.2);padding-left:6px;display:flex;flex-direction:column;gap:0;min-height:28px}
.inner-drop{min-height:28px;border-radius:6px;transition:all .15s}
.inner-drop.highlight{background:rgba(255,255,255,.07);border:2px dashed rgba(255,255,255,.28);animation:idz-pulse 1.2s ease-in-out infinite}
.inner-drop.over{background:rgba(255,255,255,.16);border:2px dashed rgba(255,255,255,.6);box-shadow:0 0 8px rgba(255,255,255,.2);animation:none}
@keyframes idz-pulse{0%,100%{background:rgba(255,255,255,.07)}50%{background:rgba(255,255,255,.13)}}

.event{background:#e6821e}.move{background:#4c97ff}.look{background:#9966ff}
.control{background:#e6a817;color:#1e1e2e!important}
.control .bdel,.control select{color:#1e1e2e}
.control select{background:rgba(255,255,255,.4)}
.collision{background:#43a047}.shoot{background:#e91e8c}.puzzle{background:#00897b}

#pwrap{width:430px;background:#11111b;display:flex;flex-direction:column;flex-shrink:0;border-left:2px solid #313244}
#ptoolbar{padding:7px 10px;font-size:11px;color:#6c7086;border-bottom:1px solid #313244;display:flex;justify-content:space-between;align-items:center}
#game-canvas{background:#000;display:block}
#clog{flex:1;overflow-y:auto;padding:8px 10px;font-size:11px;font-family:monospace;color:#a6e3a1;background:#0b0b14;border-top:1px solid #313244;min-height:60px}

/* ── Tutorial overlay ── */
#tutorial-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.78);
  display:none;align-items:center;justify-content:center;
  z-index:2000;backdrop-filter:blur(5px)
}
#tutorial-modal{
  background:#1e1e2e;border:2px solid #cba6f7;border-radius:18px;
  padding:30px 28px 26px;max-width:610px;width:94%;text-align:center;
  box-shadow:0 12px 48px rgba(0,0,0,.7);animation:tut-in .25s ease
}
@keyframes tut-in{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.tut-title{font-size:21px;font-weight:800;color:#cdd6f4;letter-spacing:.5px;margin-bottom:22px}
.tut-steps{display:flex;align-items:flex-start;justify-content:center;gap:8px;margin-bottom:24px}
.tut-step{display:flex;flex-direction:column;align-items:center;gap:9px;flex:1;min-width:130px;max-width:160px}
.tut-arr{font-size:18px;color:#45475a;flex-shrink:0;margin-top:44px}
/* illustration box */
.tut-illust{
  width:116px;height:96px;background:#11111b;border-radius:12px;
  border:1px solid #313244;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  position:relative;overflow:hidden
}
.tut-num{font-size:22px;font-weight:900;color:#cba6f7}
.tut-label{font-size:12px;line-height:1.65;color:#a6adc8;text-align:center}
/* step-1 illustration */
.ti-mini-palette{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
.ti-mini-block{width:62px;height:13px;border-radius:4px}
.ti-hand{position:absolute;bottom:5px;right:9px;font-size:22px;
  animation:hand-bob .8s ease-in-out infinite alternate}
@keyframes hand-bob{from{transform:translate(0,0)}to{transform:translate(-3px,-4px)}}
/* step-2 illustration */
.ti-falling-block{
  width:62px;height:13px;border-radius:4px;background:#4c97ff;
  animation:fall-blk .9s ease-in-out infinite alternate}
@keyframes fall-blk{from{transform:translateY(-8px);opacity:.6}to{transform:translateY(0);opacity:1}}
.ti-dz{
  width:70px;height:16px;border-radius:5px;
  border:2px dashed rgba(203,166,247,.5);
  animation:dz-glow2 .9s ease-in-out infinite alternate}
@keyframes dz-glow2{
  from{border-color:rgba(203,166,247,.3);background:rgba(203,166,247,.05)}
  to  {border-color:#cba6f7;background:rgba(203,166,247,.22)}}
/* step-3 illustration */
.ti-run-btn{
  background:#a6e3a1;color:#1e1e2e;padding:9px 16px;
  border-radius:7px;font-weight:800;font-size:13px;letter-spacing:.3px;
  box-shadow:0 0 0 4px rgba(166,227,161,.2);
  animation:run-pulse .9s ease-in-out infinite alternate}
@keyframes run-pulse{
  from{box-shadow:0 0 0 4px rgba(166,227,161,.15)}
  to  {box-shadow:0 0 0 8px rgba(166,227,161,.35)}}
/* start button */
#tut-start{
  background:linear-gradient(135deg,#a6e3a1 0%,#6ec96b 100%);
  color:#1a2e1a;border:none;padding:13px 44px;border-radius:50px;
  font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px;
  transition:all .15s;box-shadow:0 4px 18px rgba(166,227,161,.35)
}
#tut-start:hover{transform:scale(1.06);box-shadow:0 6px 26px rgba(166,227,161,.55)}
#tut-start:active{transform:scale(.98)}
/* re-open button */
#btn-help{
  background:#45475a;color:#cdd6f4;border:none;border-radius:6px;
  padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;
  transition:all .15s
}
#btn-help:hover{background:#585b70}

/* ── Tooltip ── */
#tooltip{
  position:fixed;z-index:1999;pointer-events:none;display:none;
  background:rgba(17,17,27,.97);border:1px solid #45475a;border-radius:8px;
  padding:7px 11px;font-size:11px;color:#cdd6f4;max-width:190px;
  line-height:1.6;box-shadow:0 4px 18px rgba(0,0,0,.55)
}
</style>
</head>
<body>
<div id="app">

<div id="palette">
  <div id="palette-header">
    <div class="diff-tabs">
      <div class="diff-tab active" id="tab-easy"   onclick="switchDifficulty('easy')">⭐ かんたん</div>
      <div class="diff-tab"        id="tab-normal" onclick="switchDifficulty('normal')">🔧 ふつう</div>
    </div>
    <div class="mode-tabs">
      <div class="mode-tab active" id="tab-action" onclick="switchMode('action')"><span>🏃</span><span>アクション</span></div>
      <div class="mode-tab" id="tab-shoot" onclick="switchMode('shoot')"><span>🚀</span><span>シューティング</span></div>
      <div class="mode-tab" id="tab-puzzle" onclick="switchMode('puzzle')"><span>🧩</span><span>パズル</span></div>
    </div>
  </div>
  <div id="palette-blocks"></div>
</div>

<div id="ewrap">
  <div id="etoolbar">
    <button id="btn-run" onclick="runGame()">▶ 実行</button>
    <button id="btn-stop" onclick="stopGame()">■ 停止</button>
    <button id="btn-clr" onclick="clearEditor()">🗑 クリア</button>
    <button id="btn-sample" onclick="loadSample()">📋 サンプル</button>
    <button id="btn-help"   onclick="showTutorial()">？ あそびかた</button>
    <span id="mode-label" style="color:#cba6f7;font-size:11px;font-weight:700;margin-left:4px">横スクロールアクション</span>
  </div>
  <div id="editor" ondragover="event.preventDefault()" ondrop="onEditorDrop(event)">
    <div class="drop-hint" id="drop-hint">パレットからブロックをここへドラッグ<br><small style="opacity:.6">または「サンプル」ボタンで開始</small></div>
  </div>
</div>

<div id="pwrap">
  <div id="ptoolbar">
    <span id="preview-title">🏃 横スクロールアクション</span>
    <span id="fps-counter">--fps</span>
  </div>
  <canvas id="game-canvas" width="430" height="290"></canvas>
  <div id="clog"></div>
</div>
</div>

<!-- ═══ Tutorial overlay ═══ -->
<div id="tutorial-overlay">
  <div id="tutorial-modal">
    <div class="tut-title">🎮 あそびかた</div>
    <div class="tut-steps">

      <!-- Step 1 -->
      <div class="tut-step">
        <div class="tut-illust">
          <div class="ti-mini-palette">
            <div class="ti-mini-block" style="background:#e6821e"></div>
            <div class="ti-mini-block" style="background:#4c97ff"></div>
            <div class="ti-mini-block" style="background:#9966ff"></div>
          </div>
          <div class="ti-hand">👆</div>
        </div>
        <div class="tut-num">①</div>
        <div class="tut-label">左のパネルから<br>ブロックを<br>つかむ</div>
      </div>

      <div class="tut-arr">▶</div>

      <!-- Step 2 -->
      <div class="tut-step">
        <div class="tut-illust">
          <div class="ti-falling-block"></div>
          <div class="ti-dz"></div>
        </div>
        <div class="tut-num">②</div>
        <div class="tut-label">まん中のエリアへ<br>ドロップする</div>
      </div>

      <div class="tut-arr">▶</div>

      <!-- Step 3 -->
      <div class="tut-step">
        <div class="tut-illust">
          <div class="ti-run-btn">▶ 実行</div>
        </div>
        <div class="tut-num">③</div>
        <div class="tut-label">▶ 実行ボタンを<br>おす</div>
      </div>

    </div>
    <button id="tut-start" onclick="closeTutorial()">はじめる！</button>
  </div>
</div>

<!-- ═══ Tooltip ═══ -->
<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS & DEFINITIONS
// ═══════════════════════════════════════════════════════
const DEFS = {
  ev_start:  {label:'🚀 はじめに',             cat:'event',   shape:'hat'},
  ev_key:    {label:'🔑 キーをおしたとき',     cat:'event',   shape:'hat', params:[{n:'key',t:'key',d:'ArrowRight'}]},
  ev_always: {label:'🔄 ずっと',               cat:'event',   shape:'hat'},
  ev_timer:  {label:'⏰ おきに1回',            cat:'event',   shape:'hat', params:[{n:'n',t:'num',d:60}]},

  mv_right:  {label:'→ みぎへ動く',            cat:'move', shape:'stack', params:[{n:'spd',t:'num',d:4}]},
  mv_left:   {label:'← ひだりへ動く',          cat:'move', shape:'stack', params:[{n:'spd',t:'num',d:4}]},
  mv_up:     {label:'↑ うえへ動く',            cat:'move', shape:'stack', params:[{n:'spd',t:'num',d:4}]},
  mv_down:   {label:'↓ したへ動く',            cat:'move', shape:'stack', params:[{n:'spd',t:'num',d:4}]},
  mv_jump:   {label:'↑ ジャンプ！',            cat:'move', shape:'stack', params:[{n:'pow',t:'num',d:13}]},
  mv_setx:   {label:'📍 よこの場所',           cat:'move', shape:'stack', params:[{n:'x',t:'num',d:60}]},
  mv_sety:   {label:'📍 たての場所',           cat:'move', shape:'stack', params:[{n:'y',t:'num',d:220}]},
  mv_setvx:  {label:'💨 よこに動く',           cat:'move', shape:'stack', params:[{n:'vx',t:'num',d:0}]},
  mv_setvy:  {label:'💨 たてに動く',           cat:'move', shape:'stack', params:[{n:'vy',t:'num',d:0}]},
  mv_stop:   {label:'⏹ 止まる',               cat:'move', shape:'stack'},

  lk_color:  {label:'🎨 いろを変える',         cat:'look', shape:'stack', params:[{n:'c',t:'color',d:'#4c97ff'}]},
  lk_say:    {label:'💬 しゃべる',             cat:'look', shape:'stack', params:[{n:'msg',t:'text',d:'Hello!'}]},
  lk_hide:   {label:'👻 かくれる',             cat:'look', shape:'stack'},
  lk_show:   {label:'👁 あらわれる',           cat:'look', shape:'stack'},

  ct_if:     {label:'🔀 もし〜なら',           cat:'control', shape:'cframe',  params:[{n:'cond',t:'cond',d:'onGround'}]},
  ct_ifelse: {label:'↕ もし/そうでなければ',   cat:'control', shape:'cframe2', params:[{n:'cond',t:'cond',d:'onGround'}]},
  ct_repeat: {label:'🔁 くりかえす',           cat:'control', shape:'cframe',  params:[{n:'n',t:'num',d:3}]},
  ct_wait:   {label:'⏱ まつ(秒)',              cat:'control', shape:'stack',   params:[{n:'s',t:'num',d:0.5}]},

  co_ground: {label:'🏔 地面にいる',           cat:'collision', shape:'bool'},
  co_enemy:  {label:'👾 てきにぶつかった',     cat:'collision', shape:'bool'},
  co_goal:   {label:'🏆 ゴールにとどいた',     cat:'collision', shape:'bool'},
  co_wall:   {label:'🧱 かべにぶつかった',     cat:'collision', shape:'bool'},

  sh_shoot:  {label:'🔫 たまを撃つ', cat:'shoot', shape:'stack',
               params:[{n:'dir',t:'sdir',d:'up'},{n:'spd',t:'num',d:10},{n:'c',t:'color',d:'#00ffff'}]},
  sh_spawn:  {label:'👾 てきを出す', cat:'shoot', shape:'stack',
               params:[{n:'type',t:'etype',d:'straight'},{n:'spd',t:'num',d:2}]},
  sh_wrap:   {label:'↩ はしでおりかえす', cat:'shoot', shape:'stack'},
  sh_clamp:  {label:'🛑 はしで止まる',    cat:'shoot', shape:'stack'},

  pz_place:  {label:'📦 ブロックを置く',     cat:'puzzle', shape:'stack', params:[{n:'x',t:'num',d:4},{n:'y',t:'num',d:18},{n:'c',t:'color',d:'#ff6b6b'}]},
  pz_erase:  {label:'🗑 ブロックを消す',     cat:'puzzle', shape:'stack', params:[{n:'x',t:'num',d:4},{n:'y',t:'num',d:18}]},
  pz_check:  {label:'🔗 つながりを確認する', cat:'puzzle', shape:'stack'},
  pz_gravon: {label:'⬇ 重力をオンにする',   cat:'puzzle', shape:'stack'},
  pz_gravoff:{label:'⏸ 重力をオフにする',   cat:'puzzle', shape:'stack'},
};

const KEY_OPTS=[
  {v:'ArrowRight',l:'→ 右'},{v:'ArrowLeft',l:'← 左'},
  {v:'ArrowUp',l:'↑ 上'},{v:'ArrowDown',l:'↓ 下'},
  {v:' ',l:'スペース'},{v:'z',l:'Z'},{v:'x',l:'X'},
];
const COND_ACTION=[
  {v:'onGround',l:'地面に触れている'},{v:'hitEnemy',l:'敵に当たった'},
  {v:'hitGoal',l:'ゴールに触れた'},{v:'hitWall',l:'壁に触れた'},
  {v:'keyRight',l:'右キー押中'},{v:'keyLeft',l:'左キー押中'},
  {v:'keyUp',l:'上キー押中'},{v:'keySpace',l:'スペース押中'},
];
const COND_SHOOT=[
  {v:'playerHit',l:'被弾した'},{v:'noEnemies',l:'敵が全滅'},
  {v:'atEdge',l:'画面端に触れた'},{v:'keyRight',l:'右キー押中'},
  {v:'keyLeft',l:'左キー押中'},{v:'keyUp',l:'上キー押中'},
  {v:'keySpace',l:'スペース押中'},{v:'keyZ',l:'Zキー押中'},
];
const SDIR_OPTS=[
  {v:'up',l:'↑ 上'},{v:'down',l:'↓ 下'},
  {v:'left',l:'← 左'},{v:'right',l:'→ 右'},
  {v:'spread',l:'拡散3way'},{v:'all',l:'全方位8way'},
];
const ETYPE_OPTS=[
  {v:'straight',l:'まっすぐ'},{v:'zigzag',l:'ジグザグ'},
  {v:'chase',l:'追いかける'},{v:'boss',l:'ボス'},
];

const PALETTE_DATA = {
  action: [
    {cat:'event',label:'⚡ イベント',blocks:[
      {t:'ev_start',l:'🚀 はじめに'},{t:'ev_key',l:'🔑 キーをおしたとき'},{t:'ev_always',l:'🔄 ずっと'},
    ]},
    {cat:'move',label:'🏃 動き',blocks:[
      {t:'mv_right',l:'→ みぎへ動く'},{t:'mv_left',l:'← ひだりへ動く'},{t:'mv_jump',l:'↑ ジャンプ！'},
      {t:'mv_setx',l:'📍 よこの場所'},{t:'mv_sety',l:'📍 たての場所'},
      {t:'mv_setvx',l:'💨 よこに動く'},{t:'mv_stop',l:'⏹ 止まる'},
    ]},
    {cat:'look',label:'✨ 見た目',blocks:[
      {t:'lk_color',l:'🎨 いろを変える'},{t:'lk_say',l:'💬 しゃべる'},{t:'lk_hide',l:'👻 かくれる'},{t:'lk_show',l:'👁 あらわれる'},
    ]},
    {cat:'control',label:'🔀 制御',blocks:[
      {t:'ct_if',l:'🔀 もし〜なら'},{t:'ct_ifelse',l:'↕ もし/そうでなければ'},{t:'ct_repeat',l:'🔁 くりかえす'},{t:'ct_wait',l:'⏱ まつ'},
    ]},
    {cat:'collision',label:'💥 当たり判定',blocks:[
      {t:'co_ground',l:'🏔 地面にいる'},{t:'co_enemy',l:'👾 てきにぶつかった'},{t:'co_goal',l:'🏆 ゴールにとどいた'},{t:'co_wall',l:'🧱 かべにぶつかった'},
    ]},
  ],

function makePaletteBtn(bi, cat) {
  const btn = document.createElement('button');
  btn.className = `pb ${cat}`;
  btn.dataset.t = bi.t;
  btn.textContent = bi.l;
  btn.draggable = true;
  btn.ondragstart = e => { hideTip(); dragPaletteType = bi.t; dragBlockInfo = null; e.dataTransfer.effectAllowed = 'copy'; };
  const tip = BLOCK_TIPS[bi.t];
  if (tip) {
    btn.addEventListener('mouseenter', e => showTip(e, tip));
    btn.addEventListener('mousemove',  e => _posTip(e));
    btn.addEventListener('mouseleave', hideTip);
  }
  return btn;
}

function renderPalette() {
  const container = document.getElementById('palette-blocks');
  container.innerHTML = '';

  if (difficultyMode === 'easy') {
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.style.cssText = 'color:#a6e3a1;margin-top:10px';
    lbl.textContent = '✨ つかえるブロック';
    container.appendChild(lbl);
    (EASY_BLOCKS[gameMode] || EASY_BLOCKS.action).forEach(bi => {
      const def = DEFS[bi.t]; if (!def) return;
      container.appendChild(makePaletteBtn(bi, def.cat));
    });
    return;
  }

  PALETTE_DATA[gameMode].forEach(section => {
    const lbl = document.createElement('div');
    lbl.className = `cat-label ${section.cat}`;
    lbl.textContent = section.label;
    container.appendChild(lbl);
    section.blocks.forEach(bi => container.appendChild(makePaletteBtn(bi, section.cat)));
  });
}

// ═══════════════════════════════════════════════════════
// EDITOR RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const ed = document.getElementById('editor');
  ed.querySelectorAll('.sg').forEach(e => e.remove());
  document.getElementById('drop-hint').style.display = scripts.length ? 'none' : '';
  scripts.forEach(sg => ed.appendChild(makeSG(sg)));
}

function makeSG(sg) {
  const div = document.createElement('div');
  div.className = 'sg';
  div.dataset.sgid = sg.id;
  const gdel = document.createElement('span');
  gdel.className = 'sg-del'; gdel.textContent = '✕';
  gdel.onclick = () => { scripts = scripts.filter(s => s.id !== sg.id); render(); };
  div.appendChild(gdel);
  div.appendChild(makeDZ(sg.id, 0));
  sg.blocks.forEach((b, i) => {
    div.appendChild(makeBlockEl(b, sg.id, i));
    div.appendChild(makeDZ(sg.id, i + 1));
  });
  return div;
}

function makeDZ(sgId, insertIdx) {
  const dz = document.createElement('div');
  dz.className = 'drop-zone';
  dz.ondragover = e => { e.preventDefault(); e.stopPropagation(); dz.classList.add('over'); };
  dz.ondragleave = () => dz.classList.remove('over');
  dz.ondrop = e => { e.preventDefault(); e.stopPropagation(); dz.classList.remove('over'); addBlockAt(sgId, insertIdx); };
  return dz;
}

function addBlockAt(sgId, idx) {
  const sg = scripts.find(s => s.id === sgId);
  if (!sg) return;
  if (dragPaletteType) {
    const def = DEFS[dragPaletteType]; if (!def) return;
    sg.blocks.splice(idx, 0, makeBlock(dragPaletteType));
    dragPaletteType = null;
  } else if (dragBlockInfo) {
    const srcSG = scripts.find(s => s.id === dragBlockInfo.sgId); if (!srcSG) return;
    const bi = srcSG.blocks.findIndex(b => b.id === dragBlockInfo.blockId); if (bi === -1) return;
    const [moved] = srcSG.blocks.splice(bi, 1);
    const adj = (sgId === srcSG.id && idx > bi) ? idx - 1 : idx;
    const tgt = scripts.find(s => s.id === sgId); if (!tgt) return;
    tgt.blocks.splice(Math.max(0, adj), 0, moved);
    if (srcSG.blocks.length === 0 && srcSG.id !== sgId) scripts = scripts.filter(s => s.id !== srcSG.id);
    dragBlockInfo = null;
  }
  render();
}

function makeBlock(type) {
  const def = DEFS[type];
  const b = { id: gid(), type, params: {}, inner: [], inner2: [] };
  if (def.params) def.params.forEach(p => { b.params[p.n] = p.d; });
  return b;
}

function getCondOpts() { return gameMode === 'shoot' ? COND_SHOOT : COND_ACTION; }

function makeBlockEl(b, sgId, idx) {
  const def = DEFS[b.type];
  const div = document.createElement('div');
  div.className = `block ${def.cat}${def.shape === 'hat' ? ' hat' : ''}`;
  div.draggable = true;
  div.ondragstart = e => {
    dragPaletteType = null; dragBlockInfo = { sgId, blockId: b.id };
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => div.classList.add('dragging'), 0); e.stopPropagation();
  };
  div.ondragend = () => div.classList.remove('dragging');

  const lbl = document.createElement('span'); lbl.textContent = def.label; div.appendChild(lbl);

  (def.params || []).forEach(p => {
    const stop = e => e.stopPropagation();
    if (p.t === 'num') {
      const inp = document.createElement('input'); inp.type = 'number'; inp.value = b.params[p.n];
      inp.onclick = stop; inp.oninput = () => { b.params[p.n] = parseFloat(inp.value) || 0; };
      div.appendChild(inp);
    } else if (p.t === 'color') {
      const inp = document.createElement('input'); inp.type = 'color'; inp.value = b.params[p.n];
      inp.onclick = stop; inp.oninput = () => { b.params[p.n] = inp.value; };
      div.appendChild(inp);
    } else if (p.t === 'text') {
      const inp = document.createElement('input'); inp.type = 'text'; inp.value = b.params[p.n]; inp.style.width = '72px';
      inp.onclick = stop; inp.oninput = () => { b.params[p.n] = inp.value; };
      div.appendChild(inp);
    } else if (p.t === 'key') {
      const sel = mkSel(KEY_OPTS, b.params[p.n], v => { b.params[p.n] = v; }); div.appendChild(sel);
    } else if (p.t === 'cond') {
      const sel = mkSel(getCondOpts(), b.params[p.n], v => { b.params[p.n] = v; }); div.appendChild(sel);
    } else if (p.t === 'sdir') {
      const sel = mkSel(SDIR_OPTS, b.params[p.n], v => { b.params[p.n] = v; }); div.appendChild(sel);
    } else if (p.t === 'etype') {
      const sel = mkSel(ETYPE_OPTS, b.params[p.n], v => { b.params[p.n] = v; }); div.appendChild(sel);
    }
  });

  const bdel = document.createElement('span'); bdel.className = 'bdel'; bdel.textContent = '✕';
  bdel.onclick = e => { e.stopPropagation(); const sg = scripts.find(s => s.id === sgId); if (sg) { sg.blocks.splice(idx, 1); render(); } };
  div.appendChild(bdel);

  if (def.shape === 'cframe' || def.shape === 'cframe2') {
    div.appendChild(makeInnerArea(b, 'inner', sgId));
    if (def.shape === 'cframe2') {
      const el = document.createElement('div');
      el.style.cssText = 'font-size:11px;padding:4px 6px;opacity:.7;margin-top:4px'; el.textContent = '↕ そうでなければ';
      div.appendChild(el);
      div.appendChild(makeInnerArea(b, 'inner2', sgId));
    }
  }
  return div;
}

function mkSel(opts, cur, onChange) {
  const sel = document.createElement('select');
  opts.forEach(o => { const op = document.createElement('option'); op.value = o.v; op.textContent = o.l; if (cur === o.v) op.selected = true; sel.appendChild(op); });
  sel.onclick = e => e.stopPropagation(); sel.onchange = () => onChange(sel.value);
  return sel;
}

function makeInnerArea(b, field, sgId) {
  const iw = document.createElement('div'); iw.className = 'inner-wrap';
  const idz = document.createElement('div'); idz.className = 'inner-drop';
  idz.ondragover = e => { e.preventDefault(); e.stopPropagation(); idz.classList.add('over'); };
  idz.ondragleave = () => idz.classList.remove('over');
  idz.ondrop = e => {
    e.preventDefault(); e.stopPropagation(); idz.classList.remove('over');
    if (dragPaletteType && DEFS[dragPaletteType]) { b[field].push(makeBlock(dragPaletteType)); dragPaletteType = null; render(); }
  };
  (b[field] || []).forEach((ib, ii) => {
    const ibel = makeBlockEl(ib, sgId, ii);
    ibel.querySelector('.bdel').onclick = e => { e.stopPropagation(); b[field].splice(ii, 1); render(); };
    idz.appendChild(ibel);
  });
  iw.appendChild(idz); return iw;
}

function onEditorDrop(e) {
  e.preventDefault(); if (!dragPaletteType || !DEFS[dragPaletteType]) return;
  scripts.push({ id: gid(), blocks: [makeBlock(dragPaletteType)] });
  dragPaletteType = null; render();
}
function clearEditor() { scripts = []; render(); }

// ═══════════════════════════════════════════════════════
// PUZZLE GAME ENGINE
// ═══════════════════════════════════════════════════════
function initPuzzle() {
  pGrid = Array.from({length:PROWS}, () => Array(PCOLS).fill(null));
  pGravity = false; pGravTimer = 0; pGameOver = false;
  pLines = 0; pLevel = 1; pKeyQ = [];
  pPlayer = { vx:0, vy:0, color:'#4c97ff', visible:true };
  pNextType = PKEYS[Math.floor(Math.random()*PKEYS.length)];
  pSpawnPiece();
}

function pCollides(cells, px, py) {
  for (const [cx, cy] of cells) {
    const col = px+cx, row = py+cy;
    if (col < 0 || col >= PCOLS || row >= PROWS) return true;
    if (row >= 0 && pGrid[row][col]) return true;
  }
  return false;
}

function pSpawnPiece() {
  const type = pNextType;
  pNextType = PKEYS[Math.floor(Math.random()*PKEYS.length)];
  pPiece = { type, cells:PIECES[type].cells.map(c=>[...c]), x:3, y:-1, color:PIECES[type].color };
  if (pCollides(pPiece.cells, pPiece.x, pPiece.y+1)) {
    pGameOver = true; msg = '💀 ゲームオーバー！'; msgTimer = 400; stopGame();
  }
}

function pRotate(cw) {
  if (!pPiece) return;
  const c = pPiece.cells;
  let rot;
  if (cw) { const my=Math.max(...c.map(([,y])=>y)); rot=c.map(([x,y])=>[my-y,x]); }
  else     { const mx=Math.max(...c.map(([x])=>x));  rot=c.map(([x,y])=>[y,mx-x]); }
  for (const [dx,dy] of [[0,0],[1,0],[-1,0],[2,0],[-2,0],[0,-1]]) {
    if (!pCollides(rot, pPiece.x+dx, pPiece.y+dy)) {
      pPiece.cells=rot; pPiece.x+=dx; pPiece.y+=dy; return;
    }
  }
}

function pLand() {
  if (!pPiece) return;
  pPiece.cells.forEach(([cx,cy]) => {
    const col=pPiece.x+cx, row=pPiece.y+cy;
    if (row>=0 && row<PROWS && col>=0 && col<PCOLS) pGrid[row][col]=pPiece.color;
  });
  pPiece = null; pCheckLines(); pSpawnPiece();
}

function pCheckLines() {
  let cleared = 0;
  for (let r=PROWS-1; r>=0; r--) {
    if (pGrid[r].every(c=>c!==null)) {
      pGrid.splice(r,1); pGrid.unshift(Array(PCOLS).fill(null)); r++; cleared++;
    }
  }
  if (cleared > 0) {
    const pts=[0,100,300,500,800][Math.min(cleared,4)]*pLevel;
    score+=pts; pLines+=cleared; pLevel=Math.floor(pLines/10)+1;
    glog(`✨ ${cleared}ライン消去！ +${pts}`);
  }
}

function physicsPuzzle() {
  if (!pGrid) return;
  if (pGameOver || !pPiece) return;
  // キーキュー処理（1フレームに1アクション）
  if (pKeyQ.length > 0) {
    const k = pKeyQ.shift();
    if      (k==='ArrowLeft'  && !pCollides(pPiece.cells, pPiece.x-1, pPiece.y)) pPiece.x--;
    else if (k==='ArrowRight' && !pCollides(pPiece.cells, pPiece.x+1, pPiece.y)) pPiece.x++;
    else if (k==='ArrowDown') {
      if (!pCollides(pPiece.cells, pPiece.x, pPiece.y+1)) { pPiece.y++; score++; }
      else pLand();
    }
    else if (k==='ArrowUp'||k==='z') pRotate(true);
    else if (k==='x') pRotate(false);
    else if (k===' ') {
      while (!pCollides(pPiece.cells, pPiece.x, pPiece.y+1)) { pPiece.y++; score+=2; }
      pLand();
    }
  }
  // スクリプト制御（mv_right / mv_left / mv_down）
  if (pPiece) {
    if (pPlayer.vx > 0 && !pCollides(pPiece.cells, pPiece.x+1, pPiece.y)) pPiece.x++;
    if (pPlayer.vx < 0 && !pCollides(pPiece.cells, pPiece.x-1, pPiece.y)) pPiece.x--;
    if (pPlayer.vy > 0 && !pCollides(pPiece.cells, pPiece.x, pPiece.y+1)) pPiece.y++;
  }
  pPlayer.vx = 0; pPlayer.vy = 0;
  // 重力
  if (pGravity && pPiece) {
    pGravTimer++;
    const interval = Math.max(6, 50-(pLevel-1)*4);
    if (pGravTimer >= interval) {
      pGravTimer = 0;
      if (!pCollides(pPiece.cells, pPiece.x, pPiece.y+1)) pPiece.y++;
      else pLand();
    }
  }
}

// ═══════════════════════════════════════════════════════
// SCRIPT EXECUTION
// ═══════════════════════════════════════════════════════
function getPlayer() {
  if (gameMode === 'shoot') return ship;
  if (gameMode === 'puzzle') return pPlayer;
  return player;
}

function evalCond(cond) {
  const pl = getPlayer();
  if (gameMode === 'action') {
    switch(cond) {
      case 'onGround': return player.onGround;
      case 'hitEnemy': return aEnemies.some(e => e.alive && overlap(player, e));
      case 'hitGoal':  return overlap(player, goal);
      case 'hitWall':  return player.hitWall;
      case 'keyRight': return !!keys['ArrowRight'];
      case 'keyLeft':  return !!keys['ArrowLeft'];
      case 'keyUp':    return !!keys['ArrowUp'];
      case 'keySpace': return !!keys[' '];
    }
  } else {
    switch(cond) {
      case 'playerHit': return invTimer > 115;
      case 'noEnemies': return sEnemies.filter(e => e.alive).length === 0;
      case 'atEdge':    return pl.x <= 0 || pl.x >= W-pl.w || pl.y <= 26 || pl.y >= H-pl.h;
      case 'keyRight':  return !!keys['ArrowRight'];
      case 'keyLeft':   return !!keys['ArrowLeft'];
      case 'keyUp':     return !!keys['ArrowUp'];
      case 'keySpace':  return !!keys[' '];
      case 'keyZ':      return !!keys['z'];
    }
  }
  return false;
}

function execList(blocks) { for (const b of blocks) execBlock(b); }

function execBlock(b) {
  const pl = getPlayer();
  const p = b.params || {};
  switch(b.type) {
    case 'mv_right':  pl.vx = +(p.spd||4); break;
    case 'mv_left':   pl.vx = -(+p.spd||4); break;
    case 'mv_up':     pl.vy = -(+p.spd||4); break;
    case 'mv_down':   pl.vy = +(+p.spd||4); break;
    case 'mv_jump':
      if (gameMode === 'action' && player.onGround) { player.vy = -(+p.pow||13); player.onGround = false; }
      break;
    case 'mv_setx':  pl.x = +p.x||0; break;
    case 'mv_sety':  pl.y = +p.y||0; break;
    case 'mv_setvx': pl.vx = +p.vx||0; break;
    case 'mv_setvy': pl.vy = +p.vy||0; break;
    case 'mv_stop':  pl.vx = 0; break;
    case 'lk_color': pl.color = p.c||'#4c97ff'; break;
    case 'lk_say':   msg = p.msg||''; msgTimer = 120; break;
    case 'lk_hide':  pl.visible = false; break;
    case 'lk_show':  pl.visible = true; break;
    case 'ct_if':
      if (evalCond(p.cond)) execList(b.inner||[]); break;
    case 'ct_ifelse':
      if (evalCond(p.cond)) execList(b.inner||[]); else execList(b.inner2||[]); break;
    case 'ct_repeat':
      for (let i=0; i<(parseInt(p.n)||3); i++) execList(b.inner||[]); break;
    case 'ct_wait': break; // frame-based wait requires a coroutine system; treated as no-op
    case 'sh_clamp':
      if (gameMode === 'shoot') {
        ship.x = Math.max(0, Math.min(W-ship.w, ship.x));
        ship.y = Math.max(26, Math.min(H-ship.h, ship.y));
      } break;
    case 'sh_wrap':
      if (gameMode === 'shoot') {
        if (ship.x < -ship.w) ship.x = W; if (ship.x > W) ship.x = -ship.w;
        if (ship.y < 26) ship.y = H-ship.h; if (ship.y > H) ship.y = 26;
      } break;
    case 'sh_shoot':
      if (gameMode !== 'shoot' || shootCd > 0) break;
      shootCd = 7;
      fireShot(p.dir||'up', +(p.spd||10), p.c||'#00ffff');
      break;
    case 'sh_spawn':
      if (gameMode !== 'shoot') break;
      spawnEnemy(p.type||'straight', +(p.spd||2));
      break;
    case 'pz_place':
      if (gameMode==='puzzle') {
        const col=Math.round(+p.x||0), row=Math.round(+p.y||0);
        if (row>=0&&row<PROWS&&col>=0&&col<PCOLS) pGrid[row][col]=p.c||'#ff6b6b';
      } break;
    case 'pz_erase':
      if (gameMode==='puzzle') {
        const col=Math.round(+p.x||0), row=Math.round(+p.y||0);
        if (row>=0&&row<PROWS&&col>=0&&col<PCOLS) pGrid[row][col]=null;
      } break;
    case 'pz_check':  if (gameMode==='puzzle') pCheckLines(); break;
    case 'pz_gravon': if (gameMode==='puzzle') pGravity=true;  break;
    case 'pz_gravoff':if (gameMode==='puzzle') pGravity=false; break;
  }
}

function fireShot(dir, spd, color) {
  const cx = ship.x + ship.w/2, cy = ship.y;
  const mk = (vx, vy) => sBullets.push({x:cx, y:cy, vx, vy, r:5, color, alive:true});
  const dirs = {
    up:     () => { mk(0,-spd); if (multiShot>=2){mk(-spd*.28,-spd*.96);mk(spd*.28,-spd*.96);} if (multiShot>=3){mk(-spd*.56,-spd*.83);mk(spd*.56,-spd*.83);} },
    down:   () => mk(0,spd),
    left:   () => mk(-spd,0),
    right:  () => mk(spd,0),
    spread: () => { mk(0,-spd); mk(-spd*.5,-spd*.866); mk(spd*.5,-spd*.866); },
    all:    () => { for(let i=0;i<8;i++) mk(spd*Math.cos(i*Math.PI/4), spd*Math.sin(i*Math.PI/4)); },
  };
  (dirs[dir]||dirs.up)();
}

function spawnEnemy(type, spd) {
  const waveBonus = (wave - 1) * 0.4;
  const speed = spd + waveBonus;
  if (type === 'boss') {
    sEnemies.push({x:W/2-35,y:-80,w:70,h:54,type:'boss',spd:Math.min(speed,4),hp:20,maxHp:20,alive:true,vx:1.5,timer:0});
    glog('⚠️ ボス登場！'); return;
  }
  const x = Math.random()*(W-36)+18;
  const sz = type==='zigzag'?28:24;
  sEnemies.push({x:x-sz/2,y:-sz,w:sz,h:sz,type,spd:Math.min(speed,6),hp:1,maxHp:1,alive:true,timer:0,phaseX:Math.random()*Math.PI*2});
}

function spawnParticles(x, y, color, n) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*3+1, life=Math.floor(Math.random()*18+8);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*3+1,color,life,maxLife:life});
  }
}

function runScripts(evType) {
  scripts.forEach(sg => {
    if (!sg.blocks.length) return;
    const hat = sg.blocks[0]; const def = DEFS[hat.type];
    if (!def || def.shape !== 'hat') return;
    let ok = false;
    if (hat.type==='ev_start'  && evType==='start') ok=true;
    if (hat.type==='ev_always' && evType==='frame')  ok=true;
    if (hat.type==='ev_key'    && evType==='frame')  ok=!!keys[hat.params.key||'ArrowRight'];
    if (hat.type==='ev_timer'  && evType==='frame')  { const n=parseInt(hat.params.n)||60; ok=(gt%n===0 && gt>0); }
    if (ok) execList(sg.blocks.slice(1));
  });
}

// ═══════════════════════════════════════════════════════
// ACTION PHYSICS
// ═══════════════════════════════════════════════════════
function overlap(a, b) { return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

function physicsAction() {
  player.vy += 0.65;
  player.x += player.vx; player.y += player.vy;
  player.onGround = false; player.hitWall = false;

  platforms.forEach(pl => {
    if (!overlap(player,pl)) return;
    const dB=(player.y+player.h)-pl.y, dT=(pl.y+pl.h)-player.y;
    const dL=(player.x+player.w)-pl.x, dR=(pl.x+pl.w)-player.x;
    const mn=Math.min(dB,dT,dL,dR);
    if (mn===dB&&player.vy>=0){ player.y=pl.y-player.h; player.vy=0; player.onGround=true; }
    else if (mn===dT&&player.vy<0){ player.y=pl.y+pl.h; player.vy=0; }
    else if (mn===dL){ player.x=pl.x-player.w; player.vx=0; player.hitWall=true; }
    else if (mn===dR){ player.x=pl.x+pl.w; player.vx=0; player.hitWall=true; }
  });

  if (!player.onGround) player.vx *= 0.96;

  aEnemies.forEach(en => {
    if (!en.alive) return;
    en.x += en.vx*en.dir;
    const onPl = platforms.find(pl => en.y+en.h>=pl.y-2 && en.y+en.h<=pl.y+pl.h+4 && en.x>pl.x-10 && en.x+en.w<pl.x+pl.w+10);
    if (!onPl||en.x<0) en.dir*=-1;
    if (overlap(player,en)) {
      if (player.vy>0 && player.y+player.h < en.y+en.h*0.6) {
        en.alive=false; player.vy=-9; score+=100; glog('💀 踏んだ！+100');
      } else { player.x=60; player.y=220; player.vx=0; player.vy=0; glog('😵 ダメージ！'); }
    }
  });

  coins.forEach(c => {
    if (!c.alive) return;
    if (overlap(player,{x:c.x-8,y:c.y-8,w:16,h:16})) { c.alive=false; score+=50; glog('⭐ コイン！+50'); }
  });

  if (player.y>H+100) { player.x=60; player.y=220; player.vx=0; player.vy=0; glog('💦 落下！'); }
  if (player.x<0) { player.x=0; player.vx=0; }
  if (overlap(player,goal)) {
    msg=`🏆 クリア！スコア:${score}`; msgTimer=300;
    player.x=60; player.y=220; player.vx=0; player.vy=0;
    coins.forEach(c=>c.alive=true); aEnemies.forEach(e=>e.alive=true); score=0; glog('🏆 ゴール！');
  }
  camera.x = Math.max(0, player.x - W*0.35);
}

// ═══════════════════════════════════════════════════════
// SHOOTING PHYSICS
// ═══════════════════════════════════════════════════════
function physicsShoot() {
  bgY = (bgY + 1.5) % H;
  wave = Math.floor(gt/600)+1;

  ship.x += ship.vx; ship.y += ship.vy;
  // Hard clamp (safety)
  ship.x = Math.max(0, Math.min(W-ship.w, ship.x));
  ship.y = Math.max(26, Math.min(H-ship.h, ship.y));

  if (shootCd > 0) shootCd--;

  // Player bullets
  sBullets.forEach(b => { b.x+=b.vx; b.y+=b.vy; });
  sBullets = sBullets.filter(b => b.alive && b.y>-20 && b.y<H+20 && b.x>-20 && b.x<W+20);

  // Enemies
  sEnemies.forEach(e => {
    if (!e.alive) return;
    e.timer++;
    if (e.type==='straight') { e.y+=e.spd; }
    else if (e.type==='zigzag') { e.y+=e.spd; e.x+=Math.sin(e.timer*0.06+e.phaseX)*2.2; }
    else if (e.type==='chase') { e.x+=(ship.x+ship.w/2-e.x-e.w/2)*0.025; e.y+=e.spd; }
    else if (e.type==='boss') {
      e.x+=e.vx; if (e.x<20||e.x>W-e.w-20) e.vx*=-1;
      e.y = Math.min(e.y + 0.4, 40);
      if (e.timer%80===0) {
        const cx=e.x+e.w/2, cy=e.y+e.h;
        const dx=ship.x+ship.w/2-cx, dy=ship.y-cy;
        const len=Math.hypot(dx,dy)||1;
        eBullets.push({x:cx,y:cy,vx:dx/len*3,vy:dy/len*3,r:5,alive:true});
      }
    }
  });
  sEnemies = sEnemies.filter(e => e.alive && e.y < H+60);

  // Enemy bullets
  eBullets.forEach(b => { b.x+=b.vx; b.y+=b.vy; });
  eBullets = eBullets.filter(b => b.alive && b.y<H+10 && b.y>-10 && b.x>-10 && b.x<W+10);

  // Particles
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.93; p.vy*=0.93; p.life--; });
  particles = particles.filter(p => p.life>0);

  // Powerups
  powerups.forEach(pu => {
    if (!pu.alive) return; pu.y+=1.2;
    if (overlap({x:pu.x-10,y:pu.y-10,w:20,h:20}, ship)) {
      pu.alive=false; multiShot=Math.min(3,multiShot+1);
      setTimeout(()=>{multiShot=Math.max(1,multiShot-1);},8000);
      glog('⚡ マルチショット！');
    }
  });
  powerups = powerups.filter(pu => pu.alive && pu.y<H+20);

  // Bullet-enemy collision
  sBullets.forEach(bl => {
    if (!bl.alive) return;
    const br = {x:bl.x-bl.r, y:bl.y-bl.r, w:bl.r*2, h:bl.r*2};
    sEnemies.forEach(e => {
      if (!e.alive || !overlap(br,e)) return;
      bl.alive = false;
      e.hp--;
      spawnParticles(bl.x, bl.y, '#f39c12', 4);
      if (e.hp<=0) {
        e.alive=false;
        const pts=e.type==='boss'?1000:e.type==='zigzag'?200:100;
        score+=pts; spawnParticles(e.x+e.w/2,e.y+e.h/2,'#ff6b6b',14);
        glog(`💥 撃墜！+${pts}`);
        if (Math.random()<0.18) powerups.push({x:e.x+e.w/2,y:e.y,alive:true});
      }
    });
  });

  // Enemy/bullet hits player
  if (invTimer<=0) {
    const sr={x:ship.x+4,y:ship.y+4,w:ship.w-8,h:ship.h-8};
    const hitE = sEnemies.some(e=>e.alive&&overlap(sr,e));
    const hitB = eBullets.some(b=>b.alive&&overlap(sr,{x:b.x-b.r,y:b.y-b.r,w:b.r*2,h:b.r*2}));
    if (hitE||hitB) {
      lives--; invTimer=130; spawnParticles(ship.x+ship.w/2,ship.y+ship.h/2,'#ff6b6b',20);
      glog(`😵 被弾！残機:${lives}`);
      if (lives<=0) { msg='💀 GAME OVER'; msgTimer=400; stopGame(); }
    }
  } else { invTimer--; }
}

// ═══════════════════════════════════════════════════════
// ACTION DRAW
// ═══════════════════════════════════════════════════════
function drawAction() {
  ctx.clearRect(0,0,W,H);
  const sk=ctx.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,'#0d0d2b'); sk.addColorStop(1,'#1a2a4a');
  ctx.fillStyle=sk; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<40;i++){
    const sx=((i*173+23)%2000-camera.x*.15)%W;
    const sy=(i*67+5)%(H*.8);
    ctx.fillRect((sx+W)%W,sy,i%3===0?1.5:1,i%3===0?1.5:1);
  }
  ctx.fillStyle='#1e3a5f';
  for(let i=0;i<5;i++){
    const hx=(i*400-camera.x*.3)%(W+300)-50, hy=H-60-i*20;
    ctx.beginPath(); ctx.arc(hx,hy,120+i*20,0,Math.PI); ctx.fill();
  }

  ctx.save(); ctx.translate(-camera.x,0);

  platforms.forEach(pl=>{
    ctx.fillStyle='#3d6b35'; ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle='#5a9e4a'; ctx.fillRect(pl.x,pl.y,pl.w,7);
  });

  ctx.font='22px sans-serif';
  ctx.fillText('🏆',goal.x+3,goal.y+26);

  coins.forEach(c=>{
    if(!c.alive) return;
    const pulse=0.85+0.15*Math.sin(gt*.1+c.x);
    ctx.save(); ctx.translate(c.x,c.y); ctx.scale(pulse,pulse);
    ctx.fillStyle='#f1c40f'; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffeaa7'; ctx.beginPath(); ctx.arc(-2,-2,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  aEnemies.forEach(en=>{
    if(!en.alive) return;
    ctx.save();
    if(en.dir<0){ctx.translate(en.x+en.w,en.y);ctx.scale(-1,1);}else ctx.translate(en.x,en.y);
    ctx.fillStyle='#c0392b'; ctx.fillRect(0,0,en.w,en.h);
    ctx.fillStyle='#e74c3c'; ctx.fillRect(2,2,en.w-4,en.h*.6);
    ctx.fillStyle='#fff'; ctx.fillRect(5,5,6,6); ctx.fillRect(15,5,6,6);
    ctx.fillStyle='#000'; ctx.fillRect(7,7,3,3); ctx.fillRect(17,7,3,3);
    ctx.restore();
  });

  if(player.visible){
    ctx.save(); ctx.translate(player.x,player.y);
    ctx.fillStyle=player.color; ctx.fillRect(0,0,player.w,player.h);
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(3,3,player.w-6,player.h*.45);
    const blink=gt%90<5;
    ctx.fillStyle='#fff';
    if(!blink){
      ctx.fillRect(5,8,7,7); ctx.fillRect(16,8,7,7);
      ctx.fillStyle='#1a1a3e'; ctx.fillRect(7,10,3,3); ctx.fillRect(18,10,3,3);
    } else { ctx.fillRect(5,12,7,2); ctx.fillRect(16,12,7,2); }
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(8,20,12,3);
    const step=player.onGround?Math.sin(gt*.25*Math.abs(player.vx)*.3)*4:0;
    ctx.fillStyle=player.color;
    ctx.fillRect(4,player.h-8+step,8,8); ctx.fillRect(16,player.h-8-step,8,8);
    ctx.restore();
  }
  ctx.restore();

  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,26);
  ctx.fillStyle='#cdd6f4'; ctx.font='12px monospace';
  ctx.fillText(`⭐${score}  X:${Math.round(player.x)} Y:${Math.round(player.y)}  ${player.onGround?'⬇地面':'🌊空中'}  ${fps}fps`,8,17);
  drawMsgOverlay();
  if(!running) drawStartOverlay('▶ 実行でゲーム開始','矢印で移動・スペースでジャンプ');
}

// ═══════════════════════════════════════════════════════
// SHOOTING DRAW
// ═══════════════════════════════════════════════════════
function drawShoot() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#020218'; ctx.fillRect(0,0,W,H);

  // Scrolling stars (two layers)
  [[80,0.8,1,.5],[35,1.8,2,.9]].forEach(([n,sp,sz,al])=>{
    ctx.fillStyle=`rgba(255,255,255,${al})`;
    for(let i=0;i<n;i++){
      const sx=(i*137+i*43)%W;
      const sy=((i*97+bgY*sp)%H+H)%H;
      ctx.fillRect(sx,sy,sz,sz);
    }
  });

  // Nebula
  ctx.fillStyle='rgba(80,0,140,0.05)';
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.arc((i*190+bgY*.15)%W,(i*120+30)%H,90+i*25,0,Math.PI*2); ctx.fill();
  }

  // Enemy bullets
  eBullets.forEach(b=>{
    ctx.save(); ctx.translate(b.x,b.y);
    ctx.fillStyle='rgba(255,80,80,0.35)'; ctx.beginPath(); ctx.arc(0,0,b.r*2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff5050'; ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Player bullets
  sBullets.forEach(b=>{
    if(!b.alive) return;
    ctx.save(); ctx.translate(b.x,b.y);
    const ang=Math.atan2(b.vy,b.vx)+Math.PI/2; ctx.rotate(ang);
    // Glow
    ctx.fillStyle=b.color+'44'; ctx.beginPath(); ctx.ellipse(0,0,b.r*1.2,b.r*3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=b.color; ctx.beginPath(); ctx.ellipse(0,0,b.r*.5,b.r*2,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Powerups
  powerups.forEach(pu=>{
    if(!pu.alive) return;
    ctx.save(); ctx.translate(pu.x,pu.y);
    const sc=0.9+0.1*Math.sin(gt*.2); ctx.scale(sc,sc);
    ctx.fillStyle='#a8ff00';
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a1=i*Math.PI*.4-Math.PI/2, a2=a1+Math.PI*.2;
      if(i===0) ctx.moveTo(Math.cos(a1)*12,Math.sin(a1)*12);
      else ctx.lineTo(Math.cos(a1)*12,Math.sin(a1)*12);
      ctx.lineTo(Math.cos(a2)*5,Math.sin(a2)*5);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  // Enemies
  sEnemies.forEach(e=>{
    if(!e.alive) return;
    ctx.save(); ctx.translate(e.x+e.w/2, e.y+e.h/2);
    if(e.type==='boss'){
      const rot=Math.sin(gt*.04)*.06;
      ctx.rotate(rot);
      ctx.fillStyle='#6a1fa3';
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3;if(i===0)ctx.moveTo(Math.cos(a)*e.w/2,Math.sin(a)*e.h/2);else ctx.lineTo(Math.cos(a)*e.w/2,Math.sin(a)*e.h/2);}
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='#9b59b6';
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3+.3;if(i===0)ctx.moveTo(Math.cos(a)*e.w*.38,Math.sin(a)*e.h*.38);else ctx.lineTo(Math.cos(a)*e.w*.38,Math.sin(a)*e.h*.38);}
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(-12,-6,6,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(12,-6,6,0,Math.PI*2); ctx.fill();
      // HP bar
      const hpW=e.w*1.1, hpX=-hpW/2;
      ctx.fillStyle='#333'; ctx.fillRect(hpX,-e.h/2-12,hpW,7);
      ctx.fillStyle=`hsl(${(e.hp/e.maxHp)*120},90%,50%)`; ctx.fillRect(hpX,-e.h/2-12,hpW*(e.hp/e.maxHp),7);
    } else if(e.type==='zigzag'){
      ctx.rotate(gt*.04);
      ctx.fillStyle='#e67e22';
      ctx.beginPath(); ctx.moveTo(0,-e.h/2); ctx.lineTo(e.w/2,0); ctx.lineTo(0,e.h/2); ctx.lineTo(-e.w/2,0); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#f39c12';
      ctx.beginPath(); ctx.moveTo(0,-e.h/3); ctx.lineTo(e.w/3,0); ctx.lineTo(0,e.h/3); ctx.lineTo(-e.w/3,0); ctx.closePath(); ctx.fill();
    } else if(e.type==='chase'){
      ctx.fillStyle='#1a8a40';
      ctx.beginPath(); ctx.moveTo(0,e.h/2); ctx.lineTo(-e.w/2,-e.h/2); ctx.lineTo(e.w/2,-e.h/2); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#2ecc71';
      ctx.beginPath(); ctx.moveTo(0,e.h/3); ctx.lineTo(-e.w/3,-e.h/3); ctx.lineTo(e.w/3,-e.h/3); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(0,-e.h/5,4,0,Math.PI*2); ctx.fill();
    } else {
      // UFO
      ctx.fillStyle='#a93226'; ctx.beginPath(); ctx.ellipse(0,5,e.w/2,8,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.ellipse(0,0,e.w/3,e.h/2.2,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.8)'; ctx.beginPath(); ctx.arc(0,-3,5,0,Math.PI*2); ctx.fill();
      // Lights
      const lc=['#f39c12','#3498db','#e74c3c'];
      for(let i=0;i<3;i++){const a=i*Math.PI*2/3+gt*.08;ctx.fillStyle=lc[i];ctx.beginPath();ctx.arc(Math.cos(a)*(e.w/2-.5),5+Math.sin(a)*2,2.5,0,Math.PI*2);ctx.fill();}
    }
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    const al=p.life/p.maxLife;
    ctx.globalAlpha=al*.9;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*al,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Player ship
  if(ship.visible){
    const blink=invTimer>0&&gt%8<4;
    if(!blink){
      ctx.save(); ctx.translate(ship.x+ship.w/2, ship.y+ship.h/2);
      // Engine glow
      const eg=0.5+0.5*Math.sin(gt*.4);
      ctx.fillStyle=`rgba(255,140,0,${.4*eg})`;
      ctx.beginPath(); ctx.ellipse(0,ship.h/2+4,7,10*eg,0,0,Math.PI*2); ctx.fill();
      // Wings
      ctx.fillStyle=ship.color;
      ctx.beginPath();
      ctx.moveTo(0,-ship.h/2);
      ctx.lineTo(-ship.w/2,ship.h/2);
      ctx.lineTo(-ship.w/4,ship.h/4);
      ctx.lineTo(0,ship.h/3);
      ctx.lineTo(ship.w/4,ship.h/4);
      ctx.lineTo(ship.w/2,ship.h/2);
      ctx.closePath(); ctx.fill();
      // Highlight
      ctx.fillStyle='rgba(255,255,255,.25)';
      ctx.beginPath(); ctx.moveTo(0,-ship.h/2); ctx.lineTo(-ship.w/5,0); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
      // Cockpit
      ctx.fillStyle='#74b9ff'; ctx.beginPath(); ctx.ellipse(0,-ship.h/6,4,6,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // HUD
  ctx.fillStyle='rgba(0,0,10,.7)'; ctx.fillRect(0,0,W,26);
  ctx.fillStyle='#cdd6f4'; ctx.font='12px monospace';
  const hrt='❤'.repeat(Math.max(0,lives));
  ctx.fillText(`${hrt}  ⭐${score}  WAVE${wave}  ${fps}fps`,8,17);
  if(multiShot>1){ ctx.fillStyle='#a8ff00'; ctx.fillText(`⚡×${multiShot}`,W-50,17); }

  drawMsgOverlay();
  if(!running) drawStartOverlay('▶ 実行でゲーム開始','矢印で移動・Zで射撃');
}

// ═══════════════════════════════════════════════════════
// PUZZLE DRAW
// ═══════════════════════════════════════════════════════
function drawCell(x, y, color) {
  const s = PCELL-1;
  ctx.fillStyle=color; ctx.fillRect(x,y,s,s);
  ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fillRect(x,y,s,2); ctx.fillRect(x,y,2,s);
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fillRect(x,y+s-2,s,2); ctx.fillRect(x+s-2,y,2,s);
}

function drawPuzzle() {
  if (!pGrid) { initPuzzle(); }
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#070712'; ctx.fillRect(0,0,W,H);

  const gx=PGX, gy=PGY;
  // グリッド背景
  ctx.fillStyle='#0d0d20'; ctx.fillRect(gx,gy,PCOLS*PCELL,PROWS*PCELL);
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=.5;
  for(let r=0;r<=PROWS;r++){ctx.beginPath();ctx.moveTo(gx,gy+r*PCELL);ctx.lineTo(gx+PCOLS*PCELL,gy+r*PCELL);ctx.stroke();}
  for(let c=0;c<=PCOLS;c++){ctx.beginPath();ctx.moveTo(gx+c*PCELL,gy);ctx.lineTo(gx+c*PCELL,gy+PROWS*PCELL);ctx.stroke();}

  // 配置済みブロック
  for(let r=0;r<PROWS;r++) for(let c=0;c<PCOLS;c++) if(pGrid[r][c]) drawCell(gx+c*PCELL, gy+r*PCELL, pGrid[r][c]);

  // 現在のピース（ゴースト＋本体）
  if(pPiece){
    let ghostR=pPiece.y;
    while(!pCollides(pPiece.cells, pPiece.x, ghostR+1)) ghostR++;
    if(ghostR>pPiece.y){
      ctx.globalAlpha=.2;
      pPiece.cells.forEach(([cx,cy])=>{
        const px=gx+(pPiece.x+cx)*PCELL, py=gy+(ghostR+cy)*PCELL;
        if(py>=gy){ctx.fillStyle=pPiece.color; ctx.fillRect(px,py,PCELL-1,PCELL-1);}
      });
      ctx.globalAlpha=1;
    }
    pPiece.cells.forEach(([cx,cy])=>{
      const px=gx+(pPiece.x+cx)*PCELL, py=gy+(pPiece.y+cy)*PCELL;
      if(py>=gy) drawCell(px,py,pPiece.color);
    });
  }

  // グリッド枠
  ctx.strokeStyle='#45475a'; ctx.lineWidth=2;
  ctx.strokeRect(gx-1,gy-1,PCOLS*PCELL+2,PROWS*PCELL+2);

  // ── 右パネル ──
  const rx=gx+PCOLS*PCELL+14;
  const lbl=(t,y,val,col)=>{
    ctx.fillStyle='#585b70'; ctx.font='bold 10px monospace'; ctx.fillText(t,rx,gy+y);
    ctx.fillStyle=col; ctx.font='bold 14px monospace'; ctx.fillText(val,rx,gy+y+16);
  };
  lbl('SCORE',10,score,'#f9e2af');
  lbl('LEVEL',46,pLevel,'#cba6f7');
  lbl('LINES',82,pLines,'#a6e3a1');

  // NEXT ピース
  ctx.fillStyle='#585b70'; ctx.font='bold 10px monospace'; ctx.fillText('NEXT',rx,gy+116);
  const nx=rx, ny=gy+120;
  ctx.fillStyle='#0d0d20'; ctx.fillRect(nx-2,ny-2,PCELL*5,PCELL*4); ctx.strokeStyle='#45475a'; ctx.lineWidth=1; ctx.strokeRect(nx-2,ny-2,PCELL*5,PCELL*4);
  if(pNextType) PIECES[pNextType].cells.forEach(([cx,cy])=>drawCell(nx+cx*PCELL, ny+cy*PCELL, PIECES[pNextType].color));

  // 操作ヒント
  ctx.font='9px sans-serif';
  [['←→','移動'],['↑ Z','回転'],['↓','ソフト落下'],['スペース','一気に落とす']].forEach(([k,v],i)=>{
    ctx.fillStyle='#74c7ec'; ctx.fillText(k,rx,gy+184+i*16);
    ctx.fillStyle='#45475a'; ctx.fillText(v,rx+30,gy+184+i*16);
  });

  // HUD
  ctx.fillStyle='rgba(0,0,10,.75)'; ctx.fillRect(0,0,W,26);
  ctx.fillStyle='#cdd6f4'; ctx.font='12px monospace';
  ctx.fillText(`🧩 パズル  ⭐${score}  Lv.${pLevel}  ${pLines}lines  ${fps}fps`,8,17);
  drawMsgOverlay();
  if(!running) drawStartOverlay('▶ 実行でゲーム開始','←→移動  ↑/Z回転  スペース:一気に落とす');
}

function drawMsgOverlay() {
  if(msgTimer<=0||!msg) return;
  const al=Math.min(1,msgTimer/20);
  ctx.font='bold 17px sans-serif'; ctx.textAlign='center';
  const tw=ctx.measureText(msg).width;
  ctx.fillStyle=`rgba(0,0,0,${.75*al})`; ctx.fillRect(W/2-tw/2-18,H/2-22,tw+36,44);
  ctx.fillStyle=`rgba(255,215,0,${al})`; ctx.fillText(msg,W/2,H/2+7);
  ctx.textAlign='left';
}

function drawStartOverlay(line1, line2) {
  ctx.fillStyle='rgba(0,0,0,.68)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#cdd6f4'; ctx.font='bold 17px sans-serif'; ctx.textAlign='center';
  ctx.fillText(line1,W/2,H/2-12);
  ctx.font='12px sans-serif'; ctx.fillStyle='#888';
  ctx.fillText(line2,W/2,H/2+14);
  ctx.textAlign='left';
}

function draw() {
  if(gameMode==='action') drawAction();
  else if(gameMode==='shoot') drawShoot();
  else drawPuzzle();
}

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
let logLines = [];
function glog(s) {
  logLines.push(`[${gt}] ${s}`);
  if(logLines.length>30) logLines.shift();
  const el=document.getElementById('clog');
  el.textContent=logLines.join('\n'); el.scrollTop=9999;
}

function loop(ts) {
  if(!running) return;
  gt++; fpsCount++;
  if(ts-lastFpsTime>=1000){ fps=fpsCount; fpsCount=0; lastFpsTime=ts; document.getElementById('fps-counter').textContent=fps+'fps'; }

  if(gameMode==='action'){
    runScripts('frame');
    physicsAction();
  } else if(gameMode==='shoot'){
    physicsShoot();
    runScripts('frame');
  } else {
    runScripts('frame');
    physicsPuzzle();
  }

  draw();
  if(msgTimer>0) msgTimer--;
  raf=requestAnimationFrame(loop);
}

function runGame() {
  if(running) return;
  running=true; logLines=[];
  initGame();
  runScripts('start');
  glog('▶ 開始！');
  raf=requestAnimationFrame(loop);
}

function stopGame() {
  running=false;
  if(raf){ cancelAnimationFrame(raf); raf=null; }
  draw(); glog('■ 停止');
}

document.addEventListener('keydown', e => {
  keys[e.key]=true;
  if(running&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if(running && gameMode==='puzzle' && pKeyQ) {
    if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' ','z','x'].includes(e.key))
      pKeyQ.push(e.key);
  }
});
document.addEventListener('keyup', e => { delete keys[e.key]; });

const _tipEl = document.getElementById('tooltip');
function showTip(e, text) {
  _tipEl.textContent = text; _tipEl.style.display = 'block'; _posTip(e);
}
function _posTip(e) {
  const x = e.clientX + 14, y = e.clientY + 14;
  const w = _tipEl.offsetWidth, h = _tipEl.offsetHeight;
  _tipEl.style.left = (x + w > window.innerWidth  ? e.clientX - w - 8 : x) + 'px';
  _tipEl.style.top  = (y + h > window.innerHeight ? e.clientY - h - 8 : y) + 'px';
}
function hideTip() { _tipEl.style.display = 'none'; }

function showTutorial() {
  const modal = document.getElementById('tutorial-modal');
  modal.style.animation = 'none';
  modal.offsetWidth; // force reflow so animation restarts
  modal.style.animation = '';
  document.getElementById('tutorial-overlay').style.display = 'flex';
}
function closeTutorial() {
  document.getElementById('tutorial-overlay').style.display = 'none';
  localStorage.setItem('ge_tut_done', '1');
}

// DROP-ZONE HIGHLIGHT
// ═══════════════════════════════════════════════════════
function highlightDropZones(on) {
  document.querySelectorAll('.drop-zone, .inner-drop').forEach(el => {
    el.classList.toggle('highlight', on);
  });
}
document.addEventListener('dragstart', () => { setTimeout(() => highlightDropZones(true), 0); });
document.addEventListener('dragend',   () => highlightDropZones(false));
document.addEventListener('drop',      () => highlightDropZones(false));
