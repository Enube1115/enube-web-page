<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ビジュアルゲームエンジン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1e1e2e;color:#cdd6f4;height:100vh;overflow:hidden}
#app{display:flex;height:100vh}

/* Palette */
#palette{width:195px;background:#181825;overflow-y:auto;padding:8px 6px;flex-shrink:0;border-right:2px solid #313244}
#palette h2{font-size:13px;font-weight:700;padding:6px 4px 10px;color:#cba6f7;letter-spacing:1px}
.cat-label{font-size:10px;font-weight:700;padding:5px 8px;margin:8px 0 3px;border-radius:4px;text-transform:uppercase;letter-spacing:1px;opacity:.85}
.pb{padding:7px 9px;margin:2px 0;border-radius:6px;cursor:grab;font-size:12px;user-select:none;border:none;display:block;width:100%;text-align:left;color:#fff}
.pb:active{cursor:grabbing;opacity:.6}
.pb:hover{filter:brightness(1.18)}

/* Editor */
#ewrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#etoolbar{background:#181825;padding:8px 10px;display:flex;gap:8px;align-items:center;border-bottom:2px solid #313244;flex-shrink:0}
#etoolbar button{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700}
#btn-run{background:#a6e3a1;color:#1e1e2e}
#btn-stop{background:#f38ba8;color:#1e1e2e}
#btn-clr{background:#fab387;color:#1e1e2e}
#btn-sample{background:#89dceb;color:#1e1e2e}
#editor{flex:1;overflow:auto;background:#1e1e2e;padding:14px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:10px}
.drop-hint{border:2px dashed #45475a;border-radius:10px;padding:20px;color:#585b70;font-size:13px;text-align:center;width:100%;margin:8px 0}

/* Script group */
.sg{background:rgba(255,255,255,.04);border:1px solid #313244;border-radius:10px;padding:8px 8px 4px;display:inline-flex;flex-direction:column;gap:0;min-width:200px;position:relative;align-self:flex-start}
.sg-del{position:absolute;top:4px;right:6px;cursor:pointer;opacity:.3;font-size:11px;color:#f38ba8}
.sg-del:hover{opacity:1}
.drop-zone{height:14px;border-radius:4px;transition:all .12s;flex-shrink:0}
.drop-zone.over{height:36px;background:rgba(203,166,247,.2);border:2px dashed #cba6f7}

/* Blocks */
.block{border-radius:8px;padding:7px 10px 7px 10px;cursor:grab;font-size:12px;user-select:none;display:flex;align-items:center;flex-wrap:wrap;gap:5px;position:relative;border:2px solid transparent;margin:0}
.block.hat{border-radius:14px 14px 6px 6px}
.block:active{cursor:grabbing}
.block.dragging{opacity:.4}
.bdel{cursor:pointer;opacity:.3;font-size:11px;margin-left:auto;padding-left:6px;color:#fff}
.bdel:hover{opacity:1}
.block input[type=number]{width:48px;padding:2px 4px;border-radius:4px;border:none;background:rgba(255,255,255,.22);color:#fff;font-size:12px;text-align:center}
.block input[type=color]{width:38px;height:22px;padding:0;border:none;border-radius:4px;cursor:pointer;background:none}
.block input[type=text]{width:72px;padding:2px 4px;border-radius:4px;border:none;background:rgba(255,255,255,.22);color:#fff;font-size:12px}
.block select{padding:2px 4px;border-radius:4px;border:none;background:rgba(0,0,0,.35);color:#fff;font-size:11px;cursor:pointer;max-width:90px}
.inner-wrap{margin-top:4px;margin-left:14px;border-left:3px solid rgba(255,255,255,.2);padding-left:6px;display:flex;flex-direction:column;gap:0;min-height:28px;border-radius:0 0 6px 6px}
.inner-drop{min-height:28px;border-radius:6px;transition:all .12s}
.inner-drop.over{background:rgba(255,255,255,.12);border:2px dashed rgba(255,255,255,.4)}

/* Category colors */
.event{background:#e6821e}
.move{background:#4c97ff}
.look{background:#9966ff}
.control{background:#e6a817;color:#1e1e2e!important}
.control .bdel{color:#1e1e2e}
.control select{color:#1e1e2e;background:rgba(255,255,255,.4)}
.collision{background:#43a047}

/* Preview */
#pwrap{width:430px;background:#11111b;display:flex;flex-direction:column;flex-shrink:0;border-left:2px solid #313244}
#ptoolbar{padding:7px 10px;font-size:11px;color:#6c7086;border-bottom:1px solid #313244;display:flex;justify-content:space-between;align-items:center}
#game-canvas{background:#000;display:block}
#clog{flex:1;overflow-y:auto;padding:8px 10px;font-size:11px;font-family:monospace;color:#a6e3a1;background:#0b0b14;border-top:1px solid #313244;min-height:60px}
</style>
</head>
<body>
<div id="app">

<!-- PALETTE -->
<div id="palette">
  <h2>🎮 ブロック</h2>
  <div class="cat-label event">⚡ イベント</div>
  <button class="pb event" data-t="ev_start">🚀 ゲーム開始時</button>
  <button class="pb event" data-t="ev_key">🔑 キー押されたとき</button>
  <button class="pb event" data-t="ev_always">🔄 毎フレーム</button>

  <div class="cat-label move">🏃 動き</div>
  <button class="pb move" data-t="mv_right">→ 右に移動</button>
  <button class="pb move" data-t="mv_left">← 左に移動</button>
  <button class="pb move" data-t="mv_jump">↑ ジャンプ</button>
  <button class="pb move" data-t="mv_setx">📍 X位置を設定</button>
  <button class="pb move" data-t="mv_sety">📍 Y位置を設定</button>
  <button class="pb move" data-t="mv_setvx">💨 X速度を設定</button>
  <button class="pb move" data-t="mv_stop">⏹ 移動を止める</button>

  <div class="cat-label look">✨ 見た目</div>
  <button class="pb look" data-t="lk_color">🎨 色を変える</button>
  <button class="pb look" data-t="lk_say">💬 メッセージ</button>
  <button class="pb look" data-t="lk_hide">👻 非表示</button>
  <button class="pb look" data-t="lk_show">👁 表示</button>

  <div class="cat-label control">🔀 制御</div>
  <button class="pb control" data-t="ct_if">🔀 もし〜なら</button>
  <button class="pb control" data-t="ct_ifelse">↕ もし〜でなければ</button>
  <button class="pb control" data-t="ct_repeat">🔁 N回繰り返す</button>
  <button class="pb control" data-t="ct_wait">⏱ 待つ</button>

  <div class="cat-label collision">💥 当たり判定</div>
  <button class="pb collision" data-t="co_ground">🏔 地面触れてる</button>
  <button class="pb collision" data-t="co_enemy">👾 敵に当たった</button>
  <button class="pb collision" data-t="co_goal">🏆 ゴール触れた</button>
  <button class="pb collision" data-t="co_wall">🧱 壁に触れた</button>
</div>

<!-- EDITOR -->
<div id="ewrap">
  <div id="etoolbar">
    <button id="btn-run" onclick="runGame()">▶ 実行</button>
    <button id="btn-stop" onclick="stopGame()">■ 停止</button>
    <button id="btn-clr" onclick="clearEditor()">🗑 クリア</button>
    <button id="btn-sample" onclick="loadSample()">📋 サンプル</button>
    <span style="color:#585b70;font-size:11px;margin-left:4px">← ブロックをドラッグ&ドロップ</span>
  </div>
  <div id="editor" ondragover="event.preventDefault()" ondrop="onEditorDrop(event)">
    <div class="drop-hint" id="drop-hint">パレットからブロックをここへドラッグ<br><small style="opacity:.6">または「サンプル」ボタンで開始</small></div>
  </div>
</div>

<!-- PREVIEW -->
<div id="pwrap">
  <div id="ptoolbar">
    <span>🎮 プレビュー</span>
    <span id="fps-counter">--fps</span>
  </div>
  <canvas id="game-canvas" width="430" height="290"></canvas>
  <div id="clog"></div>
</div>
</div>

<script>
// ─── Block definitions ────────────────────────────────────────────────────────
const DEFS = {
  ev_start: {label:'🚀 ゲーム開始時',   cat:'event',   shape:'hat'},
  ev_key:   {label:'🔑 キー',           cat:'event',   shape:'hat', params:[{n:'key',t:'key',d:'ArrowRight'}]},
  ev_always:{label:'🔄 毎フレーム',     cat:'event',   shape:'hat'},

  mv_right: {label:'→ 右に移動 速度',   cat:'move',    shape:'stack', params:[{n:'spd',t:'num',d:4}]},
  mv_left:  {label:'← 左に移動 速度',   cat:'move',    shape:'stack', params:[{n:'spd',t:'num',d:4}]},
  mv_jump:  {label:'↑ ジャンプ 力',     cat:'move',    shape:'stack', params:[{n:'pow',t:'num',d:13}]},
  mv_setx:  {label:'📍 X =',            cat:'move',    shape:'stack', params:[{n:'x',t:'num',d:60}]},
  mv_sety:  {label:'📍 Y =',            cat:'move',    shape:'stack', params:[{n:'y',t:'num',d:220}]},
  mv_setvx: {label:'💨 X速度 =',        cat:'move',    shape:'stack', params:[{n:'vx',t:'num',d:0}]},
  mv_stop:  {label:'⏹ 移動を止める',   cat:'move',    shape:'stack'},

  lk_color: {label:'🎨 色',             cat:'look',    shape:'stack', params:[{n:'c',t:'color',d:'#4c97ff'}]},
  lk_say:   {label:'💬',               cat:'look',    shape:'stack', params:[{n:'msg',t:'text',d:'Hello!'}]},
  lk_hide:  {label:'👻 非表示',         cat:'look',    shape:'stack'},
  lk_show:  {label:'👁 表示',           cat:'look',    shape:'stack'},

  ct_if:    {label:'🔀 もし',           cat:'control', shape:'cframe', params:[{n:'cond',t:'cond',d:'onGround'}]},
  ct_ifelse:{label:'↕ もし/でなければ', cat:'control', shape:'cframe2',params:[{n:'cond',t:'cond',d:'onGround'}]},
  ct_repeat:{label:'🔁 繰り返す',       cat:'control', shape:'cframe', params:[{n:'n',t:'num',d:3}]},
  ct_wait:  {label:'⏱ 待つ(秒)',        cat:'control', shape:'stack',  params:[{n:'s',t:'num',d:0.5}]},

  co_ground:{label:'🏔 地面に触れている', cat:'collision',shape:'bool'},
  co_enemy: {label:'👾 敵に当たった',   cat:'collision',shape:'bool'},
  co_goal:  {label:'🏆 ゴールに触れた', cat:'collision',shape:'bool'},
  co_wall:  {label:'🧱 壁に触れた',    cat:'collision',shape:'bool'},
};

const KEY_OPTS=[
  {v:'ArrowRight',l:'→ 右'},
  {v:'ArrowLeft', l:'← 左'},
  {v:'ArrowUp',   l:'↑ 上'},
  {v:'ArrowDown', l:'↓ 下'},
  {v:' ',         l:'スペース'},
  {v:'z',l:'Z'},{v:'x',l:'X'},
];
const COND_OPTS=[
  {v:'onGround',l:'地面に触れている'},
  {v:'hitEnemy',l:'敵に当たった'},
  {v:'hitGoal', l:'ゴールに触れた'},
  {v:'hitWall', l:'壁に触れた'},
  {v:'keyRight',l:'右キー押中'},
  {v:'keyLeft', l:'左キー押中'},
  {v:'keyUp',   l:'上キー押中'},
  {v:'keySpace',l:'スペース押中'},
];

// ─── Editor state ─────────────────────────────────────────────────────────────
let scripts = [];
let uid = 1;
const gid = () => uid++;

let dragPaletteType = null; // dragging from palette
let dragBlockInfo = null;   // {sgId, blockId}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const ed = document.getElementById('editor');
  ed.querySelectorAll('.sg').forEach(e => e.remove());
  document.getElementById('drop-hint').style.display = scripts.length ? 'none' : '';

  scripts.forEach(sg => {
    const el = makeSG(sg);
    ed.appendChild(el);
  });
}

function makeSG(sg) {
  const div = document.createElement('div');
  div.className = 'sg';
  div.dataset.sgid = sg.id;

  // Group delete
  const gdel = document.createElement('span');
  gdel.className = 'sg-del';
  gdel.textContent = '✕';
  gdel.onclick = () => { scripts = scripts.filter(s => s.id !== sg.id); render(); };
  div.appendChild(gdel);

  // Drop zone at top
  div.appendChild(makeDZ(sg.id, 0));

  sg.blocks.forEach((b, i) => {
    div.appendChild(makeBlockEl(b, sg.id, i));
    div.appendChild(makeDZ(sg.id, i + 1));
  });

  return div;
}

function makeDZ(sgId, insertIdx) {
  const dz = document.createElement('div');
  dz.className = 'drop-zone';
  dz.ondragover = e => { e.preventDefault(); e.stopPropagation(); dz.classList.add('over'); };
  dz.ondragleave = () => dz.classList.remove('over');
  dz.ondrop = e => {
    e.preventDefault(); e.stopPropagation();
    dz.classList.remove('over');
    addBlockAt(sgId, insertIdx, e);
  };
  return dz;
}

function addBlockAt(sgId, idx, e) {
  const sg = scripts.find(s => s.id === sgId);
  if (!sg) return;

  if (dragPaletteType) {
    const def = DEFS[dragPaletteType];
    if (!def) return;
    const nb = makeBlock(dragPaletteType);
    sg.blocks.splice(idx, 0, nb);
    dragPaletteType = null;
  } else if (dragBlockInfo) {
    // Move block within editor (same or different group)
    const srcSG = scripts.find(s => s.id === dragBlockInfo.sgId);
    if (!srcSG) return;
    const bi = srcSG.blocks.findIndex(b => b.id === dragBlockInfo.blockId);
    if (bi === -1) return;
    const [moved] = srcSG.blocks.splice(bi, 1);
    // Recalculate insert index after removal if same group
    const adjustedIdx = (sgId === srcSG.id && idx > bi) ? idx - 1 : idx;
    const targetSG = scripts.find(s => s.id === sgId);
    if (!targetSG) return;
    targetSG.blocks.splice(Math.max(0, adjustedIdx), 0, moved);
    // Remove empty groups (except if it was the source of a move)
    if (srcSG.blocks.length === 0 && srcSG.id !== sgId) {
      scripts = scripts.filter(s => s.id !== srcSG.id);
    }
    dragBlockInfo = null;
  }
  render();
}

function makeBlock(type) {
  const def = DEFS[type];
  const b = { id: gid(), type, params: {}, inner: [], inner2: [] };
  if (def.params) def.params.forEach(p => { b.params[p.n] = p.d; });
  return b;
}

function makeBlockEl(b, sgId, idx) {
  const def = DEFS[b.type];
  const div = document.createElement('div');
  div.className = `block ${def.cat}${def.shape === 'hat' ? ' hat' : ''}`;
  div.draggable = true;
  div.dataset.bid = b.id;

  div.ondragstart = e => {
    dragPaletteType = null;
    dragBlockInfo = { sgId, blockId: b.id };
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => div.classList.add('dragging'), 0);
    e.stopPropagation();
  };
  div.ondragend = () => div.classList.remove('dragging');

  // Label
  const lbl = document.createElement('span');
  lbl.textContent = def.label;
  div.appendChild(lbl);

  // Params
  (def.params || []).forEach(p => {
    if (p.t === 'num') {
      const inp = document.createElement('input');
      inp.type = 'number'; inp.value = b.params[p.n];
      inp.onclick = e => e.stopPropagation();
      inp.oninput = () => { b.params[p.n] = parseFloat(inp.value) || 0; };
      div.appendChild(inp);
    } else if (p.t === 'color') {
      const inp = document.createElement('input');
      inp.type = 'color'; inp.value = b.params[p.n];
      inp.onclick = e => e.stopPropagation();
      inp.oninput = () => { b.params[p.n] = inp.value; };
      div.appendChild(inp);
    } else if (p.t === 'text') {
      const inp = document.createElement('input');
      inp.type = 'text'; inp.value = b.params[p.n];
      inp.style.width = '80px';
      inp.onclick = e => e.stopPropagation();
      inp.oninput = () => { b.params[p.n] = inp.value; };
      div.appendChild(inp);
    } else if (p.t === 'key') {
      const sel = document.createElement('select');
      KEY_OPTS.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.v; opt.textContent = o.l;
        if (b.params[p.n] === o.v) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.onclick = e => e.stopPropagation();
      sel.onchange = () => { b.params[p.n] = sel.value; };
      div.appendChild(sel);
    } else if (p.t === 'cond') {
      const sel = document.createElement('select');
      COND_OPTS.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.v; opt.textContent = o.l;
        if (b.params[p.n] === o.v) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.onclick = e => e.stopPropagation();
      sel.onchange = () => { b.params[p.n] = sel.value; };
      div.appendChild(sel);
    }
  });

  // Delete
  const bdel = document.createElement('span');
  bdel.className = 'bdel'; bdel.textContent = '✕';
  bdel.onclick = e => {
    e.stopPropagation();
    const sg = scripts.find(s => s.id === sgId);
    if (sg) { sg.blocks.splice(idx, 1); render(); }
  };
  div.appendChild(bdel);

  // C-frame inner area
  if (def.shape === 'cframe' || def.shape === 'cframe2') {
    const iw = document.createElement('div');
    iw.className = 'inner-wrap';

    const idz = document.createElement('div');
    idz.className = 'inner-drop';
    if (b.inner.length === 0) idz.style.minHeight = '28px';
    idz.ondragover = e => { e.preventDefault(); e.stopPropagation(); idz.classList.add('over'); };
    idz.ondragleave = () => idz.classList.remove('over');
    idz.ondrop = e => {
      e.preventDefault(); e.stopPropagation();
      idz.classList.remove('over');
      if (dragPaletteType) {
        const def2 = DEFS[dragPaletteType];
        if (def2) { b.inner.push(makeBlock(dragPaletteType)); dragPaletteType = null; render(); }
      }
    };

    b.inner.forEach((ib, ii) => {
      const ibel = makeBlockEl(ib, sgId, ii);
      // Override delete for inner
      ibel.querySelector('.bdel').onclick = e => {
        e.stopPropagation();
        b.inner.splice(ii, 1);
        render();
      };
      idz.appendChild(ibel);
    });

    iw.appendChild(idz);
    div.appendChild(iw);

    if (def.shape === 'cframe2') {
      const elselbl = document.createElement('div');
      elselbl.style.cssText = 'font-size:11px;padding:4px 6px;opacity:.7;margin-top:4px';
      elselbl.textContent = '↕ でなければ';
      div.appendChild(elselbl);

      const iw2 = document.createElement('div');
      iw2.className = 'inner-wrap';
      const idz2 = document.createElement('div');
      idz2.className = 'inner-drop';
      idz2.ondragover = e => { e.preventDefault(); e.stopPropagation(); idz2.classList.add('over'); };
      idz2.ondragleave = () => idz2.classList.remove('over');
      idz2.ondrop = e => {
        e.preventDefault(); e.stopPropagation();
        idz2.classList.remove('over');
        if (dragPaletteType) {
          const def2 = DEFS[dragPaletteType];
          if (def2) { b.inner2.push(makeBlock(dragPaletteType)); dragPaletteType = null; render(); }
        }
      };
      b.inner2.forEach((ib, ii) => {
        const ibel = makeBlockEl(ib, sgId, ii);
        ibel.querySelector('.bdel').onclick = e => {
          e.stopPropagation(); b.inner2.splice(ii, 1); render();
        };
        idz2.appendChild(ibel);
      });
      iw2.appendChild(idz2);
      div.appendChild(iw2);
    }
  }

  return div;
}

// Palette drag start
document.querySelectorAll('.pb').forEach(btn => {
  btn.draggable = true;
  btn.ondragstart = e => {
    dragPaletteType = btn.dataset.t;
    dragBlockInfo = null;
    e.dataTransfer.effectAllowed = 'copy';
  };
});

function onEditorDrop(e) {
  e.preventDefault();
  if (!dragPaletteType) return;
  const def = DEFS[dragPaletteType];
  if (!def) return;
  const nb = makeBlock(dragPaletteType);
  scripts.push({ id: gid(), blocks: [nb] });
  dragPaletteType = null;
  render();
}

function clearEditor() { scripts = []; render(); }

// ─── Sample Scripts ───────────────────────────────────────────────────────────
function loadSample() {
  scripts = [];
  uid = 1;

  // On start
  const s0 = { id: gid(), blocks: [
    { id:gid(), type:'ev_start', params:{}, inner:[], inner2:[] },
    { id:gid(), type:'mv_setx', params:{x:60}, inner:[], inner2:[] },
    { id:gid(), type:'mv_sety', params:{y:220}, inner:[], inner2:[] },
    { id:gid(), type:'lk_color', params:{c:'#4c97ff'}, inner:[], inner2:[] },
  ]};

  // Right key
  const s1 = { id: gid(), blocks: [
    { id:gid(), type:'ev_key', params:{key:'ArrowRight'}, inner:[], inner2:[] },
    { id:gid(), type:'mv_right', params:{spd:4}, inner:[], inner2:[] },
  ]};

  // Left key
  const s2 = { id: gid(), blocks: [
    { id:gid(), type:'ev_key', params:{key:'ArrowLeft'}, inner:[], inner2:[] },
    { id:gid(), type:'mv_left', params:{spd:4}, inner:[], inner2:[] },
  ]};

  // Space to jump
  const jumpBlock = { id:gid(), type:'mv_jump', params:{pow:14}, inner:[], inner2:[] };
  const ifBlock = { id:gid(), type:'ct_if', params:{cond:'onGround'},
    inner:[jumpBlock], inner2:[] };
  const s3 = { id: gid(), blocks: [
    { id:gid(), type:'ev_key', params:{key:' '}, inner:[], inner2:[] },
    ifBlock,
  ]};

  // Every frame friction
  const s4 = { id: gid(), blocks: [
    { id:gid(), type:'ev_always', params:{}, inner:[], inner2:[] },
    { id:gid(), type:'mv_setvx', params:{vx:0}, inner:[], inner2:[] },
  ]};

  scripts = [s0, s1, s2, s3, s4];
  render();
}

// ─── Game Engine ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let running = false, raf = null;
let gt = 0, fpsCount = 0, fpsTimer = 0, fps = 0;

let player = {}, camera = {x:0};
let platforms = [], enemies = [], goal = {}, coins = [];
let keys = {}, prevKeys = {};
let msg = '', msgTimer = 0;
let score = 0;
let lastKeySet = new Set();

function initGame() {
  player = { x:60, y:220, w:28, h:36, vx:0, vy:0, color:'#4c97ff',
             visible:true, onGround:false, hitWall:false };
  platforms = [
    {x:0,   y:265, w:220, h:30},
    {x:270, y:235, w:130, h:18},
    {x:460, y:205, w:100, h:18},
    {x:620, y:250, w:180, h:18},
    {x:860, y:220, w:130, h:18},
    {x:1060,y:255, w:260, h:18},
    {x:1380,y:240, w:150, h:18},
    {x:1600,y:260, w:200, h:18},
  ];
  enemies = [
    {x:310, y:210, w:26, h:26, vx:1.2, alive:true, dir:1},
    {x:660, y:224, w:26, h:26, vx:1.5, alive:true, dir:1},
    {x:900, y:195, w:26, h:26, vx:1,   alive:true, dir:1},
    {x:1100,y:230, w:26, h:26, vx:1.2, alive:true, dir:1},
    {x:1420,y:215, w:26, h:26, vx:1,   alive:true, dir:1},
  ];
  coins = [
    {x:320,y:200,alive:true},{x:480,y:170,alive:true},{x:650,y:220,alive:true},
    {x:890,y:190,alive:true},{x:1120,y:220,alive:true},{x:1450,y:200,alive:true},
  ];
  goal = { x:1700, y:220, w:30, h:40 };
  camera = { x:0 };
  score = 0; gt = 0; msg = ''; msgTimer = 0; keys = {}; prevKeys = {};
}

function evalCond(cond) {
  switch(cond) {
    case 'onGround': return player.onGround;
    case 'hitEnemy': return enemies.some(e => e.alive && overlap(player, e));
    case 'hitGoal':  return overlap(player, goal);
    case 'hitWall':  return player.hitWall;
    case 'keyRight': return !!keys['ArrowRight'];
    case 'keyLeft':  return !!keys['ArrowLeft'];
    case 'keyUp':    return !!keys['ArrowUp'];
    case 'keySpace': return !!keys[' '];
    default: return false;
  }
}

function execList(blocks) {
  for (const b of blocks) execBlock(b);
}

function execBlock(b) {
  const p = b.params || {};
  switch(b.type) {
    case 'mv_right':  player.vx = +(p.spd||4); break;
    case 'mv_left':   player.vx = -(+p.spd||4); break;
    case 'mv_jump':
      if (player.onGround) { player.vy = -(+p.pow||13); player.onGround = false; }
      break;
    case 'mv_setx':  player.x = +p.x||0; break;
    case 'mv_sety':  player.y = +p.y||0; break;
    case 'mv_setvx': player.vx = +p.vx||0; break;
    case 'mv_stop':  player.vx = 0; break;
    case 'lk_color': player.color = p.c || '#4c97ff'; break;
    case 'lk_say':   msg = p.msg || ''; msgTimer = 120; break;
    case 'lk_hide':  player.visible = false; break;
    case 'lk_show':  player.visible = true; break;
    case 'ct_if':
      if (evalCond(p.cond)) execList(b.inner || []);
      break;
    case 'ct_ifelse':
      if (evalCond(p.cond)) execList(b.inner || []);
      else execList(b.inner2 || []);
      break;
    case 'ct_repeat':
      for (let i = 0; i < (parseInt(p.n)||3); i++) execList(b.inner || []);
      break;
  }
}

function runScripts(evType) {
  scripts.forEach(sg => {
    if (!sg.blocks.length) return;
    const hat = sg.blocks[0];
    const def = DEFS[hat.type];
    if (!def || def.shape !== 'hat') return;
    let ok = false;
    if (hat.type === 'ev_start' && evType === 'start') ok = true;
    if (hat.type === 'ev_always' && evType === 'frame') ok = true;
    if (hat.type === 'ev_key' && evType === 'frame') {
      ok = !!keys[hat.params.key || 'ArrowRight'];
    }
    if (ok) execList(sg.blocks.slice(1));
  });
}

function overlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function physics() {
  player.vy += 0.65; // gravity
  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;
  player.hitWall = false;

  platforms.forEach(pl => {
    if (!overlap(player, pl)) return;
    const dB = (player.y+player.h) - pl.y;
    const dT = (pl.y+pl.h) - player.y;
    const dL = (player.x+player.w) - pl.x;
    const dR = (pl.x+pl.w) - player.x;
    const min = Math.min(dB, dT, dL, dR);
    if (min === dB && player.vy >= 0) {
      player.y = pl.y - player.h; player.vy = 0; player.onGround = true;
    } else if (min === dT && player.vy < 0) {
      player.y = pl.y + pl.h; player.vy = 0;
    } else if (min === dL) {
      player.x = pl.x - player.w; player.vx = 0; player.hitWall = true;
    } else if (min === dR) {
      player.x = pl.x + pl.w; player.vx = 0; player.hitWall = true;
    }
  });

  // Air friction (mild)
  if (!player.onGround) player.vx *= 0.96;

  // Enemies
  enemies.forEach(en => {
    if (!en.alive) return;
    en.x += en.vx * en.dir;
    // Reverse at platform edges
    const onAny = platforms.find(pl =>
      en.y + en.h >= pl.y - 2 && en.y + en.h <= pl.y + pl.h + 4 &&
      en.x > pl.x - 10 && en.x + en.w < pl.x + pl.w + 10
    );
    if (!onAny || en.x < 0) en.dir *= -1;

    // Player stomps enemy
    if (overlap(player, en)) {
      if (player.vy > 0 && player.y + player.h < en.y + en.h * 0.6) {
        en.alive = false; player.vy = -9; score += 100;
        glog('💀 踏んだ！ +100');
      } else {
        // Player hit by enemy → respawn
        player.x = 60; player.y = 220; player.vx = 0; player.vy = 0;
        glog('😵 ダメージ！');
      }
    }
  });

  // Coins
  coins.forEach(c => {
    if (!c.alive) return;
    const cr = {x:c.x-8,y:c.y-8,w:16,h:16};
    if (overlap(player, cr)) { c.alive = false; score += 50; glog('⭐ コイン！ +50'); }
  });

  // Fall off
  if (player.y > H + 100) {
    player.x = 60; player.y = 220; player.vx = 0; player.vy = 0;
    glog('💦 落下！');
  }

  // Goal
  if (overlap(player, goal)) {
    msg = `🏆 クリア！ スコア: ${score}`; msgTimer = 300;
    player.x = 60; player.y = 220; player.vx = 0; player.vy = 0;
    coins.forEach(c => c.alive = true);
    enemies.forEach(e => e.alive = true);
    score = 0;
    glog('🏆 ゴール！');
  }

  // Keep player left bound
  if (player.x < 0) { player.x = 0; player.vx = 0; }

  // Camera
  camera.x = Math.max(0, player.x - W * 0.35);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Sky
  const sk = ctx.createLinearGradient(0, 0, 0, H);
  sk.addColorStop(0, '#0d0d2b'); sk.addColorStop(1, '#1a2a4a');
  ctx.fillStyle = sk; ctx.fillRect(0, 0, W, H);

  // Parallax stars
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 173 + 23) % 2000 - camera.x * 0.15) % W;
    const sy = (i * 67 + 5) % (H * 0.8);
    const r = i % 3 === 0 ? 1.5 : 1;
    ctx.fillRect((sx + W) % W, sy, r, r);
  }

  // Background hills
  ctx.fillStyle = '#1e3a5f';
  for (let i = 0; i < 5; i++) {
    const hx = (i * 400 - camera.x * 0.3) % (W + 300) - 50;
    const hy = H - 60 - i * 20;
    ctx.beginPath();
    ctx.arc(hx, hy, 120 + i * 20, 0, Math.PI);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(-camera.x, 0);

  // Platforms
  platforms.forEach(pl => {
    ctx.fillStyle = '#3d6b35';
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    ctx.fillStyle = '#5a9e4a';
    ctx.fillRect(pl.x, pl.y, pl.w, 7);
    ctx.fillStyle = '#4a7a3c';
    ctx.fillRect(pl.x + 4, pl.y + 7, pl.w - 8, 3);
  });

  // Goal flag
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
  ctx.fillStyle = '#fff';
  ctx.font = '22px sans-serif';
  ctx.fillText('🏆', goal.x + 3, goal.y + 26);
  ctx.fillStyle = '#ffd70088';
  ctx.fillRect(goal.x - 4, goal.y + goal.h, goal.w + 8, 4);

  // Coins
  coins.forEach(c => {
    if (!c.alive) return;
    const pulse = 0.85 + 0.15 * Math.sin(gt * 0.1 + c.x);
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f39c12';
    ctx.beginPath(); ctx.arc(-1, -1, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffeaa7';
    ctx.beginPath(); ctx.arc(-2, -2, 5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });

  // Enemies
  enemies.forEach(en => {
    if (!en.alive) return;
    ctx.save();
    if (en.dir < 0) { ctx.translate(en.x + en.w, en.y); ctx.scale(-1, 1); }
    else ctx.translate(en.x, en.y);
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(0, 0, en.w, en.h);
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(2, 2, en.w - 4, en.h * 0.6);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(5, 5, 6, 6); ctx.fillRect(15, 5, 6, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(7, 7, 3, 3); ctx.fillRect(17, 7, 3, 3);
    // Feet
    const ft = Math.sin(gt * 0.3) * 2;
    ctx.fillStyle = '#922b21';
    ctx.fillRect(3, en.h - 6 + ft, 8, 6);
    ctx.fillRect(15, en.h - 6 - ft, 8, 6);
    ctx.restore();
  });

  // Player
  if (player.visible) {
    ctx.save();
    ctx.translate(player.x, player.y);
    // Body
    ctx.fillStyle = player.color;
    ctx.fillRect(0, 0, player.w, player.h);
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.fillRect(3, 3, player.w - 6, player.h * 0.45);
    // Eyes
    const blink = gt % 90 < 5;
    ctx.fillStyle = '#fff';
    if (!blink) {
      ctx.fillRect(5, 8, 7, 7); ctx.fillRect(16, 8, 7, 7);
      ctx.fillStyle = '#1a1a3e';
      ctx.fillRect(7, 10, 3, 3); ctx.fillRect(18, 10, 3, 3);
    } else {
      ctx.fillRect(5, 12, 7, 2); ctx.fillRect(16, 12, 7, 2);
    }
    // Mouth
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.fillRect(8, 20, 12, 3);
    // Legs
    const step = player.onGround ? Math.sin(gt * 0.25 * Math.abs(player.vx) * 0.3) * 4 : 0;
    ctx.fillStyle = player.color;
    ctx.fillRect(4,  player.h - 8 + step, 8, 8);
    ctx.fillRect(16, player.h - 8 - step, 8, 8);
    ctx.restore();
  }

  ctx.restore();

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.fillRect(0, 0, W, 26);
  ctx.fillStyle = '#cdd6f4';
  ctx.font = '12px monospace';
  ctx.fillText(
    `⭐${score}  X:${Math.round(player.x)} Y:${Math.round(player.y)}` +
    `  ${player.onGround ? '⬇地面' : '🌊空中'}  ${fps}fps`,
    8, 17
  );

  // Message overlay
  if (msgTimer > 0) {
    const alpha = Math.min(1, msgTimer / 20);
    ctx.fillStyle = `rgba(0,0,0,${0.7 * alpha})`;
    const tw = ctx.measureText(msg).width;
    ctx.fillRect(W/2 - tw/2 - 16, H/2 - 20, tw + 32, 40);
    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(msg, W/2, H/2 + 6);
    ctx.textAlign = 'left';
    msgTimer--;
  }

  // Stopped overlay
  if (!running) {
    ctx.fillStyle = 'rgba(0,0,0,.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#cdd6f4';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('▶ 実行ボタンでゲーム開始', W/2, H/2 - 10);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText('ブロックをカスタマイズしてプログラム！', W/2, H/2 + 18);
    ctx.textAlign = 'left';
  }
}

let logLines = [];
function glog(s) {
  logLines.push(`[${gt}] ${s}`);
  if (logLines.length > 30) logLines.shift();
  document.getElementById('clog').textContent = logLines.join('\n');
  document.getElementById('clog').scrollTop = 9999;
}

let lastFpsTime = 0;
function loop(ts) {
  if (!running) return;
  gt++;
  fpsCount++;
  if (ts - lastFpsTime >= 1000) {
    fps = fpsCount; fpsCount = 0; lastFpsTime = ts;
    document.getElementById('fps-counter').textContent = fps + 'fps';
  }
  prevKeys = { ...keys };
  runScripts('frame');
  physics();
  draw();
  if (msgTimer > 0) msgTimer--;
  raf = requestAnimationFrame(loop);
}

function runGame() {
  if (running) return;
  running = true;
  initGame();
  runScripts('start');
  glog('▶ 開始！');
  raf = requestAnimationFrame(loop);
}

function stopGame() {
  running = false;
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  draw();
  glog('■ 停止');
}

// Key handling
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (running && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))
    e.preventDefault();
});
document.addEventListener('keyup', e => { delete keys[e.key]; });

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadSample();
draw();
</script>
