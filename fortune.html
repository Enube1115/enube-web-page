<html lang="ja">
<head>
  <meta charset="UTF-8">

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0533 0%, #0d1b4b 50%, #1a0533 100%);

      color: #f0e6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    /* ─── ヘッダー ─── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header .sparkle { font-size: 2.4rem; display: block; margin-bottom: 6px; }
    .header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f9d976, #f39f86, #f9d976);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .1em;
    }
    .header p { margin-top: 6px; font-size: .85rem; color: #c0aee0; }

    /* ─── 入力カード ─── */
    .card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 28px 28px 24px;
      backdrop-filter: blur(12px);
    }

    .input-label {
      display: block;
      font-size: .82rem;
      color: #c0aee0;
      margin-bottom: 8px;
      letter-spacing: .05em;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    input[type="date"] {
      flex: 1;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      color: #f0e6ff;
      font-size: 1.05rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
      color-scheme: dark;
    }
    input[type="date"]:focus { border-color: #b48ef7; }

    .btn {
      background: linear-gradient(135deg, #9b59d0, #6c3cb8);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px 22px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      white-space: nowrap;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.97); }

    .error {
      margin-top: 10px;
      font-size: .83rem;
      color: #f9a8a8;
      min-height: 1.2em;
    }

      text-align: center;
      margin-bottom: 20px;

      font-size: .82rem;
      color: #c0aee0;
    }

      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .fortune-card {
      border-radius: 16px;
      padding: 18px 16px 16px;
      position: relative;
      overflow: hidden;
    }
    .fortune-card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .13;
      border-radius: inherit;
    }

    .fc-love     { background: linear-gradient(135deg, #80204a, #601030); border: 1px solid #c85080; }
    .fc-work     { background: linear-gradient(135deg, #1a4060, #0a2840); border: 1px solid #4090c8; }
    .fc-money    { background: linear-gradient(135deg, #405020, #283010); border: 1px solid #90b840; }

    .fc-icon { font-size: 1.5rem; margin-bottom: 4px; }
    .fc-title { font-size: .78rem; color: rgba(255,255,255,.65); letter-spacing: .05em; }
    .fc-stars { font-size: 1rem; margin: 6px 0 2px; color: #f9d976; letter-spacing: 1px; }
    .fc-score { font-size: .75rem; color: rgba(255,255,255,.5); margin-bottom: 8px; }
    .fc-bar-wrap { background: rgba(0,0,0,.3); border-radius: 99px; height: 5px; margin-bottom: 10px; }
    .fc-bar {
      height: 5px;
      border-radius: 99px;
      background: linear-gradient(90deg, #f9d976, #f39f86);
      transition: width .8s cubic-bezier(.4,0,.2,1);
      width: 0;
    }
    .fc-comment { font-size: .8rem; line-height: 1.55; color: rgba(255,255,255,.85); }

    /* ─── ラッキー情報 ─── */
    .lucky-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .lucky-item {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
    }
    .lucky-item .li-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .lucky-item .li-label { font-size: .7rem; color: #c0aee0; display: block; margin-bottom: 3px; }
    .lucky-item .li-value { font-size: .92rem; font-weight: 600; }

      background: rgba(249,217,118,.1);

      border-radius: 14px;
      padding: 16px 18px;
      text-align: center;
      font-size: .9rem;
      line-height: 1.6;
      color: #f9e8a0;
      margin-bottom: 4px;

    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      color: #c0aee0;
      font-size: .9rem;
      cursor: pointer;
      transition: background .2s;

    .reset-btn:hover { background: rgba(255,255,255,.13); }

    /* ─── アニメーション ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { animation: fadeUp .5s ease both; }
    .anim-d1 { animation-delay: .05s; }
    .anim-d2 { animation-delay: .15s; }
    .anim-d3 { animation-delay: .25s; }
    .anim-d4 { animation-delay: .35s; }
    .anim-d5 { animation-delay: .45s; }
    .anim-d6 { animation-delay: .55s; }
  </style>
</head>

    c=md5ii(c,d,a,b,m[6],15,-1560198380);  b=md5ii(b,c,d,a,m[13],21,1309151649);
    a=md5ii(a,b,c,d,m[4],6,-145523070);    d=md5ii(d,a,b,c,m[11],10,-1120210379);
    c=md5ii(c,d,a,b,m[2],15,718787259);    b=md5ii(b,c,d,a,m[9],21,-343485551);
    a=safeAdd(a,aa); b=safeAdd(b,bb); c=safeAdd(c,cc); d=safeAdd(d,dd);
  }

  return [a,b,c,d].map(n => {
    let s = "";
    for (let j = 0; j < 4; j++) s += ("0" + ((n >>> (j * 8)) & 0xff).toString(16)).slice(-2);
    return s;
  }).join("");
}

// ─── ハッシュ → BigInt ───────────────────────────────────────────────────

function getSeed(birthISO, todayISO, category) {
  const key = `${birthISO}_${todayISO}_${category}`;
  const hex = md5(key);
  // 先頭12桁（48bit）をBigIntとして使う（JSのNumber精度を超えないよう）
  return BigInt("0x" + hex.slice(0, 12));
}

// ─── スコア計算（Python版と同じ重み付き） ──────────────────────────────

function getScore(seed) {
  const weights = [5, 20, 40, 25, 10];
  const val = Number(seed % 100n);
  let cumulative = 0;
  for (let i = 0; i < weights.length; i++) {
    cumulative += weights[i];
    if (val < cumulative) return i + 1;
  }
  return 5;
}

// ─── 占いロジック ────────────────────────────────────────────────────────

function getFortune(birthISO, todayISO) {
  const categories = ["総合", "恋愛", "仕事", "金運"];
  const results = {};
  for (const cat of categories) {
    const seed = getSeed(birthISO, todayISO, cat);
    const score = getScore(seed);
    const comments = COMMENTS[cat][score];
    const comment = comments[Number(seed % BigInt(comments.length))];
    results[cat] = { score, comment };
  }

  const miscSeed = getSeed(birthISO, todayISO, "misc");
  const luckyItem   = LUCKY_ITEMS[Number(miscSeed % BigInt(LUCKY_ITEMS.length))];
  const luckyColor  = LUCKY_COLORS[Number((miscSeed >> 4n) % BigInt(LUCKY_COLORS.length))];
  const luckyNumber = LUCKY_NUMBERS[Number((miscSeed >> 8n) % BigInt(LUCKY_NUMBERS.length))];
  const overallMsg  = OVERALL_MESSAGES[Number((miscSeed >> 12n) % BigInt(OVERALL_MESSAGES.length))];

  return { results, luckyItem, luckyColor, luckyNumber, overallMsg };
}

// ─── UI ────────────────────────────────────────────────────────────────

function toDateISO(dateStr) {
  // input[type=date] は YYYY-MM-DD を返す
  return dateStr;
}

function formatDate(iso) {
  const [y, m, d] = iso.split("-");
  const days = ["日","月","火","水","木","金","土"];
  const dow = days[new Date(iso).getDay()];
  return `${y}年${m}月${d}日（${dow}）`;
}

function getAge(birthISO, todayISO) {
  const [by, bm, bd] = birthISO.split("-").map(Number);
  const [ty, tm, td] = todayISO.split("-").map(Number);
  let age = ty - by;
  if (tm < bm || (tm === bm && td < bd)) age--;
  return age;
}

function starsHTML(score) {
  return "★".repeat(score) + "☆".repeat(5 - score);
}

function runFortune() {
  const bdayEl = document.getElementById("bday");
  const errEl  = document.getElementById("err");
  const val    = bdayEl.value;
  errEl.textContent = "";

  if (!val) { errEl.textContent = "⚠ 生年月日を入力してください"; return; }

  const today = new Date();
  const todayISO = today.toISOString().slice(0, 10);
  if (val > todayISO) { errEl.textContent = "⚠ 未来の日付は入力できません"; return; }
  if (val.slice(0, 4) < "1900") { errEl.textContent = "⚠ 1900年以降の日付を入力してください"; return; }

  const { results, luckyItem, luckyColor, luckyNumber, overallMsg } =
    getFortune(toDateISO(val), todayISO);

  // メタ情報
  const age = getAge(val, todayISO);
  const [by, bm, bd] = val.split("-");
  document.getElementById("meta-date").textContent  = `占い日：${formatDate(todayISO)}`;
  document.getElementById("meta-birth").textContent = `${by}年${bm}月${bd}日生まれ（${age}歳）`;

  // 各カテゴリ
  const categories = ["総合", "恋愛", "仕事", "金運"];
  for (const cat of categories) {
    const { score, comment } = results[cat];
    document.getElementById(`stars-${cat}`).textContent   = starsHTML(score);
    document.getElementById(`score-${cat}`).textContent   = `${score} / 5`;
    document.getElementById(`comment-${cat}`).textContent = comment;
    // バーを一旦0にリセットしてからアニメーション
    const bar = document.getElementById(`bar-${cat}`);
    bar.style.width = "0";
    setTimeout(() => { bar.style.width = `${score * 20}%`; }, 100);
  }

  // ラッキー情報
  document.getElementById("lucky-item").textContent   = luckyItem;
  document.getElementById("lucky-color").textContent  = luckyColor;
  document.getElementById("lucky-number").textContent = luckyNumber;
  document.getElementById("overall-msg").textContent  = `💬 ${overallMsg}`;

  // 結果表示 & アニメーションリセット
  const resultEl = document.getElementById("result");
  resultEl.style.display = "block";
  resultEl.querySelectorAll(".anim").forEach(el => {
    el.style.animation = "none";
    el.offsetHeight; // reflow
    el.style.animation = "";
  });

  resultEl.scrollIntoView({ behavior: "smooth", block: "start" });
}

function resetForm() {
  document.getElementById("result").style.display = "none";
  document.getElementById("bday").value = "";
  document.getElementById("err").textContent = "";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Enterキーで占える
document.getElementById("bday").addEventListener("keydown", e => {
  if (e.key === "Enter") runFortune();
});

// 日付の上限をtoday に
document.getElementById("bday").max = new Date().toISOString().slice(0, 10);
</script>
