<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUOTOPIA — 名言の世界</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: rgba(255,255,255,0.08);
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --danger: #ef4444;
    --success: #10b981;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  .bg-orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: float linear infinite;
  }
  .orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; animation-duration: 20s; }
  .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-duration: 15s; animation-direction: reverse; }
  .orb3 { width: 300px; height: 300px; background: var(--gold); top: 50%; left: 50%; animation-duration: 25s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem 1rem 1.5rem;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    background: linear-gradient(135deg, #7c3aed, #06b6d4, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  .logo-sub {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 0.25rem;
  }

  /* Streak badge */
  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: linear-gradient(135deg, #f59e0b22, #f59e0b11);
    border: 1px solid #f59e0b44;
    border-radius: 999px;
    padding: 0.3rem 0.9rem;
    font-size: 0.8rem;
    color: var(--gold);
    margin-top: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .streak-badge:hover { background: #f59e0b22; }
  .streak-badge .flame { font-size: 1rem; }

  /* Main layout */
  main {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1rem 4rem;
  }

  /* Category filter */
  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .cat-btn {
    padding: 0.45rem 1rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 20px rgba(124,58,237,0.4);
  }

  /* Quote card */
  .quote-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .quote-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(124,58,237,0.05));
    pointer-events: none;
  }
  .quote-card.animate-in {
    animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 6rem;
    line-height: 1;
    color: var(--accent);
    opacity: 0.3;
    position: absolute;
    top: 1rem;
    left: 1.5rem;
    user-select: none;
  }
  .category-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.2rem 0.7rem;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .quote-text-ja {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight: 300;
    line-height: 1.9;
    color: var(--text);
    margin-bottom: 1.25rem;
    padding-top: 1rem;
  }
  .quote-text-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 1.75rem;
    border-left: 2px solid var(--accent);
    padding-left: 1rem;
  }
  .quote-author {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .author-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .author-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }
  .author-title {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* Mood rating */
  .mood-section {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .mood-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .mood-emojis {
    display: flex;
    gap: 0.5rem;
  }
  .mood-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.4rem 0.7rem;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .mood-btn:hover { transform: scale(1.15); border-color: var(--accent); }
  .mood-btn.selected { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(124,58,237,0.4); }
  .mood-tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e1e2e;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.6rem;
    font-size: 0.7rem;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .mood-btn:hover .mood-tooltip { opacity: 1; }

  /* Action buttons */
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1.25rem;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn:hover { border-color: var(--accent); background: var(--surface2); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9333ea);
    border-color: transparent;
    color: white;
    font-weight: 600;
    padding: 0.75rem 2rem;
    font-size: 0.95rem;
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.5); }
  .btn-fav.active { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.1); }
  .btn-speak.speaking { border-color: var(--accent2); color: var(--accent2); background: rgba(6,182,212,0.1); }

  /* Generate button area */
  .generate-area {
    text-align: center;
    margin-bottom: 2rem;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }
  .tab {
    padding: 0.6rem 1.2rem;
    font-size: 0.85rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Favorites */
  .fav-list {
    display: grid;
    gap: 0.75rem;
  }
  .fav-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    transition: border-color 0.2s;
  }
  .fav-item:hover { border-color: rgba(124,58,237,0.4); }
  .fav-text {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text);
  }
  .fav-author-small {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }
  .fav-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.2rem;
    border-radius: 6px;
    font-size: 1rem;
    transition: color 0.2s;
  }
  .fav-remove:hover { color: var(--danger); }

  /* Timecapsule modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
    position: relative;
    animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 0.5rem;
  }
  .modal p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.25rem; }
  .modal textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    resize: vertical;
    min-height: 100px;
    margin-bottom: 0.75rem;
    outline: none;
  }
  .modal textarea:focus { border-color: var(--accent); }
  .modal input[type=date] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    outline: none;
    cursor: pointer;
  }
  .modal input[type=date]:focus { border-color: var(--accent); }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { color: var(--text); }

  /* Capsule list */
  .capsule-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .capsule-icon { font-size: 1.5rem; }
  .capsule-meta { flex: 1; }
  .capsule-date { font-size: 0.75rem; color: var(--accent2); }
  .capsule-preview { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .capsule-locked { font-size: 0.7rem; color: var(--gold); background: rgba(245,158,11,0.1); padding: 0.2rem 0.5rem; border-radius: 6px; }
  .capsule-open-btn {
    background: linear-gradient(135deg, var(--accent), #9333ea);
    border: none;
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    color: white;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
  }

  /* Canvas download */
  #downloadCanvas { display: none; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    font-size: 0.85rem;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .stat-item { display: flex; align-items: center; gap: 0.4rem; }
  .stat-val { color: var(--text); font-weight: 600; }

  /* Scroll reveal */
  .reveal { opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  canvas { display: none; }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<header>
  <div class="logo">QUOTOPIA</div>
  <div class="logo-sub">名言の宇宙へようこそ</div>
  <div class="streak-badge" onclick="showStreakDetail()">
    <span class="flame">🔥</span>
    <span id="streakCount">0</span>日連続訪問中
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats-bar reveal">
    <div class="stat-item">📚 総名言数 <span class="stat-val" id="totalQuotes">0</span></div>
    <div class="stat-item">⭐ お気に入り <span class="stat-val" id="favCount">0</span></div>
    <div class="stat-item">🌟 閲覧数 <span class="stat-val" id="viewCount">0</span></div>
    <div class="stat-item">💊 カプセル <span class="stat-val" id="capsuleCount">0</span></div>
  </div>

  <!-- Categories -->
  <div class="categories reveal">
    <button class="cat-btn active" onclick="setCategory('all')" data-cat="all">✨ すべて</button>
    <button class="cat-btn" onclick="setCategory('study')" data-cat="study">📚 勉強</button>
    <button class="cat-btn" onclick="setCategory('life')" data-cat="life">🌱 人生</button>
    <button class="cat-btn" onclick="setCategory('challenge')" data-cat="challenge">⚡ 挑戦</button>
    <button class="cat-btn" onclick="setCategory('success')" data-cat="success">🏆 成功</button>
    <button class="cat-btn" onclick="setCategory('love')" data-cat="love">💜 愛・友情</button>
    <button class="cat-btn" onclick="setCategory('mindset')" data-cat="mindset">🧠 マインド</button>
    <button class="cat-btn" onclick="setCategory('creativity')" data-cat="creativity">🎨 創造</button>
  </div>

  <!-- Quote Card -->
  <div class="quote-card reveal" id="quoteCard">
    <div class="quote-mark">"</div>
    <div id="categoryTag" class="category-tag"></div>
    <div class="quote-text-ja" id="quoteJa">ボタンを押して名言を表示しよう。</div>
    <div class="quote-text-en" id="quoteEn">Press the button to reveal a quote.</div>
    <div class="quote-author">
      <div class="author-avatar" id="authorAvatar">💭</div>
      <div>
        <div class="author-name" id="authorName">—</div>
        <div class="author-title" id="authorTitle"></div>
      </div>
    </div>

    <!-- Mood Rating (Unique Feature 1) -->
    <div class="mood-section">
      <div class="mood-label">この名言、どう感じた？</div>
      <div class="mood-emojis">
        <button class="mood-btn" onclick="rateMood('inspired')" data-mood="inspired">
          🚀<div class="mood-tooltip">インスパイア</div>
        </button>
        <button class="mood-btn" onclick="rateMood('calm')" data-mood="calm">
          😌<div class="mood-tooltip">穏やか</div>
        </button>
        <button class="mood-btn" onclick="rateMood('motivated')" data-mood="motivated">
          💪<div class="mood-tooltip">やる気</div>
        </button>
        <button class="mood-btn" onclick="rateMood('thoughtful')" data-mood="thoughtful">
          🤔<div class="mood-tooltip">考えさせられる</div>
        </button>
        <button class="mood-btn" onclick="rateMood('happy')" data-mood="happy">
          😊<div class="mood-tooltip">嬉しい</div>
        </button>
        <button class="mood-btn" onclick="rateMood('moved')" data-mood="moved">
          😭<div class="mood-tooltip">感動</div>
        </button>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions reveal">
    <button class="btn btn-primary" onclick="generateQuote()">
      ✨ 新しい名言
    </button>
    <button class="btn btn-fav" id="favBtn" onclick="toggleFavorite()">
      🤍 お気に入り
    </button>
    <button class="btn" onclick="copyQuote()">
      📋 コピー
    </button>
    <button class="btn" onclick="shareQuote()">
      🔗 シェア
    </button>
    <button class="btn btn-speak" id="speakBtn" onclick="speakQuote()">
      🔊 読み上げ
    </button>
    <button class="btn" onclick="downloadCard()">
      🖼️ 画像DL
    </button>
    <button class="btn" onclick="openTimeCapsule()">
      ⏳ タイムカプセル
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs reveal">
    <button class="tab active" onclick="showTab('favorites')" id="tab-favorites">⭐ お気に入り</button>
    <button class="tab" onclick="showTab('capsules')" id="tab-capsules">⏳ タイムカプセル</button>
    <button class="tab" onclick="showTab('stats')" id="tab-stats">📊 統計</button>
  </div>

  <!-- Favorites Panel -->
  <div id="panel-favorites" class="reveal">
    <div class="fav-list" id="favList">
      <div class="empty-state">
        <div class="empty-icon">⭐</div>
        <div>お気に入りはまだありません</div>
        <div style="font-size:0.8rem;margin-top:0.3rem">気に入った名言を保存しよう</div>
      </div>
    </div>
  </div>

  <!-- Capsules Panel -->
  <div id="panel-capsules" class="reveal" style="display:none">
    <div id="capsuleList">
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <div>タイムカプセルがありません</div>
        <div style="font-size:0.8rem;margin-top:0.3rem">未来の自分へメッセージを送ろう</div>
      </div>
    </div>
  </div>

  <!-- Stats Panel -->
  <div id="panel-stats" class="reveal" style="display:none">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;">
      <h3 style="font-family:'Playfair Display',serif;margin-bottom:1.25rem;font-size:1.2rem;">📊 あなたの名言ライフ</h3>
      <div id="moodStats" style="margin-bottom:1.5rem;"></div>
      <div id="catStats"></div>
    </div>
  </div>
</main>

<!-- Time Capsule Modal -->
<div class="modal-overlay" id="capsuleModal">
  <div class="modal">
    <button class="modal-close" onclick="closeTimeCapsule()">✕</button>
    <h3>⏳ タイムカプセル</h3>
    <p>今の名言と共に、未来の自分へメッセージを残そう。</p>

// ======================== STREAK ========================
function updateStreak() {
  const today = new Date().toDateString();
  const data = JSON.parse(localStorage.getItem('quotopia_streak') || '{"streak":0,"lastVisit":null,"history":[]}');
  const yesterday = new Date(Date.now() - 86400000).toDateString();

  if (data.lastVisit === today) return data;
  if (data.lastVisit === yesterday) {
    data.streak++;
  } else if (data.lastVisit !== today) {
    data.streak = 1;
  }
  data.lastVisit = today;
  if (!data.history) data.history = [];
  data.history.push(today);
  if (data.history.length > 30) data.history.shift();
  localStorage.setItem('quotopia_streak', JSON.stringify(data));
  return data;
}

function showStreakDetail() {
  const data = JSON.parse(localStorage.getItem('quotopia_streak') || '{"streak":0,"lastVisit":null,"history":[]}');
  document.getElementById('streakBig').textContent = data.streak;
  const cal = document.getElementById('streakCal');
  cal.innerHTML = '';
  const days = ['日','月','火','水','木','金','土'];
  days.forEach(d => {
    const el = document.createElement('div');
    el.style.cssText = 'text-align:center;font-size:0.65rem;color:var(--text-muted);padding:2px 0;';
    el.textContent = d;
    cal.appendChild(el);
  });
  for (let i = 29; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const ds = d.toDateString();
    const visited = (data.history || []).includes(ds);
    const el = document.createElement('div');
    el.style.cssText = `width:100%;aspect-ratio:1;border-radius:4px;background:${visited ? 'var(--accent)' : 'var(--surface2)'};opacity:${visited ? 1 : 0.3};`;
    cal.appendChild(el);
  }
  document.getElementById('streakModal').classList.add('open');
}

// ======================== GENERATE ========================
function generateQuote() {
  let pool = currentCategory === 'all' ? quotes : quotes.filter(q => q.cat === currentCategory);
  if (pool.length === 0) return showToast('⚠️', 'この カテゴリに名言がありません');

  let q;
  do { q = pool[Math.floor(Math.random() * pool.length)]; } while (pool.length > 1 && q === currentQuote);
  currentQuote = q;

  viewCount++;
  localStorage.setItem('quotopia_views', viewCount);
  if (!catData[q.cat]) catData[q.cat] = 0;
  catData[q.cat]++;
  localStorage.setItem('quotopia_cats', JSON.stringify(catData));

  document.getElementById('quoteJa').textContent = q.ja;
  document.getElementById('quoteEn').textContent = q.en;
  document.getElementById('authorName').textContent = `— ${q.author}`;
  document.getElementById('authorTitle').textContent = q.title;
  document.getElementById('authorAvatar').textContent = q.avatar;

  const tag = document.getElementById('categoryTag');
  const col = catColors[q.cat];
  tag.style.cssText = `background:${col}22;color:${col};border:1px solid ${col}44;display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.7rem;border-radius:999px;font-size:0.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:1.5rem;`;
  tag.textContent = `${catEmojis[q.cat]} ${catNames[q.cat]}`;

  // Reset mood
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));

  // Fav button state
  const isFav = favorites.some(f => f.ja === q.ja);
  const favBtn = document.getElementById('favBtn');
  favBtn.classList.toggle('active', isFav);
  favBtn.textContent = isFav ? '❤️ お気に入り済' : '🤍 お気に入り';

  // Animate
  const card = document.getElementById('quoteCard');
  card.classList.remove('animate-in');
  void card.offsetWidth;
  card.classList.add('animate-in');

  // Stop speaking
  if (speaking) { speechSynthesis.cancel(); setSpeaking(false); }

  updateStats();
}

// ======================== SPEAK (Unique Feature 1) ========================
function speakQuote() {
  if (!currentQuote) return showToast('⚠️', '先に名言を表示してください');
  if (speaking) {
    speechSynthesis.cancel();
    setSpeaking(false);
    return;
  }
  const utter = new SpeechSynthesisUtterance(currentQuote.ja + '。' + currentQuote.author);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  utter.pitch = 1;
  const voices = speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jpVoice) utter.voice = jpVoice;
  utter.onend = () => setSpeaking(false);
  utter.onerror = () => setSpeaking(false);
  speechSynthesis.speak(utter);
  setSpeaking(true);
}

function setSpeaking(state) {
  speaking = state;
  const btn = document.getElementById('speakBtn');
  btn.classList.toggle('speaking', state);
  btn.textContent = state ? '⏹️ 停止' : '🔊 読み上げ';
}

// ======================== DOWNLOAD CARD (Unique Feature 2) ========================
function downloadCard() {
  if (!currentQuote) return showToast('⚠️', '先に名言を表示してください');
  const canvas = document.getElementById('downloadCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1200, H = 630;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#0a0a0f');
  grad.addColorStop(0.5, '#12121a');
  grad.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Accent orb
  const radGrad = ctx.createRadialGradient(200, 200, 0, 200, 200, 400);
  radGrad.addColorStop(0, 'rgba(124,58,237,0.3)');
  radGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = radGrad;
  ctx.fillRect(0, 0, W, H);

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 2;
  roundRect(ctx, 30, 30, W-60, H-60, 24);
  ctx.stroke();

  // Quote mark
  ctx.fillStyle = 'rgba(124,58,237,0.4)';
  ctx.font = 'bold 120px serif';
  ctx.fillText('"', 80, 180);

  // Japanese quote
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '300 42px "Noto Sans JP", sans-serif';
  wrapText(ctx, currentQuote.ja, 100, 220, W - 200, 60);

  // English quote
  ctx.fillStyle = '#64748b';
  ctx.font = 'italic 28px "Georgia", serif';
  wrapText(ctx, currentQuote.en, 100, 420, W - 200, 40);

  // Author
  ctx.fillStyle = '#7c3aed';
  ctx.font = '600 26px "Inter", sans-serif';
  ctx.fillText(`— ${currentQuote.author}`, 100, 560);

  // Logo
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '22px serif';
  ctx.textAlign = 'right';
  ctx.fillText('QUOTOPIA', W - 60, 560);
  ctx.textAlign = 'left';

  const link = document.createElement('a');
  link.download = `quotopia-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('🖼️', '画像をダウンロードしました！');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const chars = text.split('');
  let line = '';
  let lineY = y;
  for (const c of chars) {
    const test = line + c;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, lineY);
      lineY += lineH;
      line = c;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, lineY);
}

// ======================== TIME CAPSULE (Unique Feature 4) ========================
function openTimeCapsule() {
  if (currentQuote) {
    document.getElementById('currentQuotePreview').textContent = `"${currentQuote.ja}" — ${currentQuote.author}`;
  }
  const minDate = new Date(Date.now() + 86400000).toISOString().split('T')[0];
  document.getElementById('capsuleDate').min = minDate;
  document.getElementById('capsuleDate').value = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];
  document.getElementById('capsuleModal').classList.add('open');
}

function closeTimeCapsule() {
  document.getElementById('capsuleModal').classList.remove('open');
}

function saveCapsule() {
  const msg = document.getElementById('capsuleMessage').value.trim();
  const date = document.getElementById('capsuleDate').value;
  if (!msg) return showToast('⚠️', 'メッセージを入力してください');
  if (!date) return showToast('⚠️', '日付を選択してください');

  const capsule = {
    id: Date.now(),
    quote: currentQuote,
    message: msg,
    openDate: date,
    createdAt: new Date().toISOString()
  };
  timeCapsules.push(capsule);
  localStorage.setItem('quotopia_capsules', JSON.stringify(timeCapsules));
  closeTimeCapsule();
  renderCapsules();
  updateStats();
  showToast('📮', `${date}に届きます！`);
  document.getElementById('capsuleMessage').value = '';
}

function renderCapsules() {
  const list = document.getElementById('capsuleList');
  if (timeCapsules.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div>タイムカプセルがありません</div><div style="font-size:0.8rem;margin-top:0.3rem">未来の自分へメッセージを送ろう</div></div>';
    return;
  }
  const today = new Date().toISOString().split('T')[0];
  list.innerHTML = timeCapsules.map((c, i) => {
    const canOpen = c.openDate <= today;
    return `<div class="capsule-item">
      <div class="capsule-icon">${canOpen ? '📬' : '🔒'}</div>
      <div class="capsule-meta">
        <div class="capsule-date">${canOpen ? '開封可能！' : `開封日: ${c.openDate}`}</div>
        <div class="capsule-preview">${canOpen ? c.message : '••••••••••••••'}</div>
      </div>
      ${canOpen
        ? `<button class="capsule-open-btn" onclick="openCapsule(${i})">開封する</button>`
        : `<span class="capsule-locked">${daysUntil(c.openDate)}日後</span>`
      }
    </div>`;
  }).join('');
}

function openCapsule(i) {
  const c = timeCapsules[i];
  alert(`📬 タイムカプセルが届きました！\n\n${c.createdAt.split('T')[0]}の自分より:\n${c.message}\n\n────\n"${c.quote?.ja}"\n— ${c.quote?.author}`);
}

function daysUntil(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  return Math.ceil((d - now) / 86400000);
}

        return `<div style="margin-bottom:0.6rem">
          <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:0.25rem">
            <span>${emoji} ${getMoodLabel(k)}</span><span style="color:var(--text-muted)">${pct}%</span>
          </div>
          <div style="background:var(--surface2);border-radius:999px;height:6px;overflow:hidden">
            <div style="background:var(--accent);height:100%;width:${pct}%;border-radius:999px;transition:width 0.5s"></div>
          </div>
        </div>`;
      }).join('');
  }

  const totalCats = Object.values(catData).reduce((a,b)=>a+b, 0);
  if (totalCats === 0) {
    catEl.innerHTML = '';
  } else {
    catEl.innerHTML = `<div style="font-size:0.85rem;color:var(--text-muted);margin-top:1.5rem;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:1px;">カテゴリ別閲覧</div>` +
      Object.entries(catData).sort((a,b)=>b[1]-a[1]).map(([k,v]) => {
        const pct = Math.round(v / totalCats * 100);
        const col = catColors[k] || 'var(--accent)';
        return `<div style="margin-bottom:0.6rem">
          <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:0.25rem">
            <span>${catEmojis[k]} ${catNames[k]}</span><span style="color:var(--text-muted)">${v}回</span>
          </div>
          <div style="background:var(--surface2);border-radius:999px;height:6px;overflow:hidden">
            <div style="background:${col};height:100%;width:${pct}%;border-radius:999px;transition:width 0.5s"></div>
          </div>
        </div>`;
      }).join('');
  }
}

function updateStats() {
  document.getElementById('totalQuotes').textContent = quotes.length;
  document.getElementById('favCount').textContent = favorites.length;
  document.getElementById('viewCount').textContent = viewCount;
  document.getElementById('capsuleCount').textContent = timeCapsules.length;
}

// ======================== TOAST ========================
function showToast(icon, msg, duration = 2500) {
  const toast = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

// ======================== SCROLL REVEAL ========================
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// ======================== INIT ========================
function init() {
  const streak = updateStreak();
  document.getElementById('streakCount').textContent = streak.streak;
  speechSynthesis.getVoices();
  generateQuote();
  renderFavorites();
  renderCapsules();
  updateStats();
}

init();
</script>
</body>
</html>
