<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PINBALL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#030309;display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:100vh;
  font-family:'Courier New',monospace;overflow:hidden;
  touch-action:none;-webkit-user-select:none;user-select:none;
}
canvas{display:block}
#tip{color:#1a1a2e;font-size:11px;margin-top:5px;text-align:center;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tip">Z/← 左フリッパー &nbsp;·&nbsp; X/→ 右フリッパー &nbsp;·&nbsp; SPACE 発射 &nbsp;·&nbsp; M ミュート</div>
<script>
'use strict';

/* ── Canvas ────────────────────────────────────────── */
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const W=400,H=700;
canvas.width=W; canvas.height=H;
function resize(){
  const s=Math.min(window.innerWidth/W,(window.innerHeight-28)/H);
  canvas.style.width=(W*s|0)+'px'; canvas.style.height=(H*s|0)+'px';
}
resize(); window.addEventListener('resize',resize);

/* ── Layout constants ──────────────────────────────── */
const LW=24,RW=376,TW=58,BALL_R=9,FLIP_K=0.30;
const LP={x:120,y:638}, RP={x:280,y:638};
const LR=Math.PI*.20, LA=-Math.PI*.20;
const RR=Math.PI-Math.PI*.20, RA=Math.PI+Math.PI*.20;
const GUIDES=[[LW,558,LP.x,LP.y],[RW,558,RP.x,RP.y]];
const SLINGS=[{x1:LW,y1:502,x2:LW+56,y2:444,pts:60},{x1:RW,y1:502,x2:RW-56,y2:444,pts:60}];
const BDEF=[
  {x:200,y:205,r:26,pts:100},{x:132,y:290,r:22,pts:100},{x:268,y:290,r:22,pts:100},
  {x:165,y:370,r:20,pts:150},{x:235,y:370,r:20,pts:150}
];
const TDEF=[
  {x:75, y:155,r:13,pts:300},
  {x:200,y:112,r:15,pts:500,multiball:true}, // MB jackpot target
  {x:325,y:155,r:13,pts:300}
];
const OBS_DEFS=[
  {x:80, y:262,vx:1.2, vy:0,w:56,h:12},
  {x:252,y:438,vx:-1.0,vy:0,w:56,h:12}
];

/* ── Difficulty config ─────────────────────────────── */
const DIFFS={
  easy:  {label:'かんたん',  sub:'ライフ×5 ・ フリッパー大',color:'#00cc66',lives:5,flipLen:92, grav:0.22,launchVY:-11.5,speedCap:17,bKick:3.0},
  normal:{label:'ふつう',    sub:'ライフ×3 ・ 標準設定',   color:'#ffaa00',lives:3,flipLen:82, grav:0.27,launchVY:-13.5,speedCap:22,bKick:4.5},
  hard:  {label:'むずかしい',sub:'ライフ×2 ・ フリッパー小',color:'#ff3344',lives:2,flipLen:65, grav:0.32,launchVY:-15.5,speedCap:27,bKick:5.5}
};
const DIFF_KEYS=['easy','normal','hard'];
const DBTN=[{key:'easy',x:18,y:H/2-8,w:112,h:62},{key:'normal',x:145,y:H/2-8,w:112,h:62},{key:'hard',x:272,y:H/2-8,w:112,h:62}];

let FLIP_LEN=82,CUR_GRAV=0.27,LAUNCH_VY=-13.5,SPEED_CAP=22,BUMPER_KICK=4.5;
let selectedDiff='normal';
function applyDiff(k){
  selectedDiff=k;const d=DIFFS[k];
  FLIP_LEN=d.flipLen;CUR_GRAV=d.grav;LAUNCH_VY=d.launchVY;SPEED_CAP=d.speedCap;BUMPER_KICK=d.bKick;
}

/* ── Options config ────────────────────────────────── */
const OPT={multiball:true,comboSmash:true,obstacles:true};
const OPT_ITEMS=[
  {key:'multiball', label:'マルチボール',   desc:'ターゲット「MB」命中で3個に増殖'},
  {key:'comboSmash',label:'コンボスマッシュ',desc:'5連続ヒットで超高速×3発動'},
  {key:'obstacles', label:'動く障害物',     desc:'ランダムに動くブロックが出現'}
];
const OBTN=OPT_ITEMS.map((o,i)=>({key:o.key,label:o.label,desc:o.desc,x:20,y:258+i*72,w:360,h:62}));

/* ── Audio ─────────────────────────────────────────── */
let AC=null,masterVol=null,bgmVol=null,sfxVol=null,muted=false,bgmRunning=false,bgmTimer=null;
const MBTN={x:358,y:3,w:36,h:22};
function initAudio(){
  if(AC){if(AC.state==='suspended')AC.resume();return;}
  AC=new(window.AudioContext||window.webkitAudioContext)();
  masterVol=AC.createGain();masterVol.gain.value=1;masterVol.connect(AC.destination);
  bgmVol=AC.createGain();bgmVol.gain.value=0.08;bgmVol.connect(masterVol);
  sfxVol=AC.createGain();sfxVol.gain.value=0.38;sfxVol.connect(masterVol);
}
function toggleMute(){muted=!muted;if(masterVol)masterVol.gain.setValueAtTime(muted?0:1,AC.currentTime);}
function mkTone(freq,t,dur,vol,type,dest){
  if(!AC)return;
  const osc=AC.createOscillator(),env=AC.createGain();
  osc.type=type||'square';osc.frequency.value=freq;
  osc.connect(env);env.connect(dest||sfxVol);
  env.gain.setValueAtTime(vol,t);env.gain.exponentialRampToValueAtTime(.0001,t+dur);
  osc.start(t);osc.stop(t+dur+.05);
}
function sfxBumper(){if(!AC)return;const t=AC.currentTime;mkTone(880,t,.03,1,'square');mkTone(550,t+.025,.04,.7,'square');}
function sfxTarget(){if(!AC)return;const t=AC.currentTime;mkTone(880,t,.04,.8,'square');mkTone(1047,t+.04,.07,.8,'square');}
function sfxScore(){if(!AC)return;mkTone(1200,AC.currentTime,.05,.5,'sine');}
function sfxLost(){if(!AC)return;const t=AC.currentTime;mkTone(440,t,.14,1,'sawtooth');mkTone(330,t+.14,.14,1,'sawtooth');mkTone(220,t+.28,.30,1,'sawtooth');}
function sfxAllClear(){if(!AC)return;const t=AC.currentTime;[523,659,784,1047].forEach((f,i)=>mkTone(f,t+i*.08,.12,.9,'square'));}
function sfxMultiBall(){if(!AC)return;const t=AC.currentTime;[523,784,1047,784,1047,1568].forEach((f,i)=>mkTone(f,t+i*.055,.09,.8,'square'));}
function sfxSmashReady(){if(!AC)return;const t=AC.currentTime;mkTone(440,t,.07,.7,'square');mkTone(880,t+.07,.07,.7,'square');mkTone(1760,t+.14,.12,.8,'square');}
function sfxSmash(){if(!AC)return;const t=AC.currentTime;mkTone(200,t,.15,1,'sawtooth');mkTone(400,t,.12,.8,'square');mkTone(1600,t+.05,.1,.6,'square');}

const BGM_MEL =[523.25,659.25,783.99,659.25,523.25,587.33,659.25,587.33,659.25,783.99,880,783.99,659.25,587.33,523.25,587.33];
const BGM_BASS=[130.81,130.81,196,196,130.81,130.81,196,196,130.81,130.81,220,220,196,196,130.81,130.81];
const BGM_BEAT=60/155;
function bgmLoop(s){
  if(!bgmRunning||!AC)return;
  let t=s;const d=BGM_MEL.length*BGM_BEAT;
  for(let i=0;i<BGM_MEL.length;i++){mkTone(BGM_MEL[i],t,BGM_BEAT*.80,1,'square',bgmVol);mkTone(BGM_BASS[i],t,BGM_BEAT*1.55,.5,'triangle',bgmVol);t+=BGM_BEAT;}
  bgmTimer=setTimeout(()=>bgmLoop(s+d),(d-.5)*1000);
}
function startBGM(){if(bgmRunning||!AC)return;bgmRunning=true;bgmVol.gain.setValueAtTime(.08,AC.currentTime);bgmLoop(AC.currentTime+.12);}
function stopBGM(){bgmRunning=false;if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}if(bgmVol&&AC)bgmVol.gain.linearRampToValueAtTime(.0001,AC.currentTime+.4);}

/* ── Game state ────────────────────────────────────── */
let phase,score,lives,hi;
let balls;          // array of ball objects
let la,ra,pla,pra,ld,rd;
let bumpers,targets,tLeft,obstacles;
let floats,slit;
let combo,ctimer,frame;
let smashReady,smashFrames;

hi=+localStorage.getItem('pb_hi')||0;

/* ── Init / Reset ──────────────────────────────────── */
function init(){
  phase='title';score=0;lives=3;
  la=LR;ra=RR;pla=LR;pra=RR;ld=rd=false;
  combo=0;ctimer=0;frame=0;smashReady=false;smashFrames=0;
  slit=[0,0];floats=[];obstacles=[];
  mkBumpers();mkTargets();ballReset();
}
function mkBumpers(){bumpers=BDEF.map(b=>({...b,lit:0}));}
function mkTargets(){targets=TDEF.map(t=>({...t,hit:false}));tLeft=targets.length;}
function ballReset(){balls=[{x:W/2,y:585,vx:0,vy:0}];}
function mkObstacles(){
  if(!OPT.obstacles){obstacles=[];return;}
  obstacles=OBS_DEFS.map(o=>({...o}));
}

function startGame(){
  applyDiff(selectedDiff);
  score=0;lives=DIFFS[selectedDiff].lives;
  combo=0;ctimer=0;smashReady=false;smashFrames=0;
  slit=[0,0];floats=[];
  la=LR;ra=RR;pla=LR;pra=RR;
  mkBumpers();mkTargets();ballReset();mkObstacles();
  phase='ready';startBGM();
}
function doLaunch(){
  if(phase!=='ready')return;
  balls[0].vx=(Math.random()-.5)*2.0;balls[0].vy=LAUNCH_VY;
  phase='play';
}

/* ── Input ─────────────────────────────────────────── */
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();handleAction();return;}
  if(e.code==='KeyM'){initAudio();toggleMute();return;}
  if(phase==='opt'){
    if(e.code==='Digit1'||e.code==='Numpad1'){OPT.multiball=!OPT.multiball;return;}
    if(e.code==='Digit2'||e.code==='Numpad2'){OPT.comboSmash=!OPT.comboSmash;return;}
    if(e.code==='Digit3'||e.code==='Numpad3'){OPT.obstacles=!OPT.obstacles;return;}
  }
  if(phase==='diff'){
    if(e.code==='Digit1'||e.code==='Numpad1'){selectedDiff='easy';startGame();return;}
    if(e.code==='Digit2'||e.code==='Numpad2'){selectedDiff='normal';startGame();return;}
    if(e.code==='Digit3'||e.code==='Numpad3'){selectedDiff='hard';startGame();return;}
    if(e.code==='ArrowLeft'){const i=DIFF_KEYS.indexOf(selectedDiff);if(i>0)selectedDiff=DIFF_KEYS[i-1];return;}
    if(e.code==='ArrowRight'){const i=DIFF_KEYS.indexOf(selectedDiff);if(i<DIFF_KEYS.length-1)selectedDiff=DIFF_KEYS[i+1];return;}
  }
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

let tl=false,tr=false;
function hitTest(p,r){return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h;}
function canvasCoords(e){
  const rect=canvas.getBoundingClientRect(),sx=W/rect.width,sy=H/rect.height;
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-rect.left)*sx,y:(src.clientY-rect.top)*sy};
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  const p=canvasCoords(e);
  if(hitTest(p,MBTN)){toggleMute();return;}
  if(phase==='opt'){for(const b of OBTN){if(hitTest(p,b)){OPT[b.key]=!OPT[b.key];return;}}handleAction();return;}
  if(phase==='diff'){for(const b of DBTN){if(hitTest(p,b)){selectedDiff=b.key;startGame();return;}}}
  syncT(e);handleAction();
},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();syncT(e);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();syncT(e);},{passive:false});
canvas.addEventListener('touchcancel',()=>{tl=tr=false;},{passive:false});
canvas.addEventListener('click',e=>{
  initAudio();const p=canvasCoords(e);
  if(hitTest(p,MBTN)){toggleMute();return;}
  if(phase==='opt'){for(const b of OBTN){if(hitTest(p,b)){OPT[b.key]=!OPT[b.key];return;}}handleAction();return;}
  if(phase==='diff'){for(const b of DBTN){if(hitTest(p,b)){selectedDiff=b.key;startGame();return;}}}
});

function syncT(e){
  tl=tr=false;const rect=canvas.getBoundingClientRect(),sx=W/rect.width;
  for(const t of e.touches){const x=(t.clientX-rect.left)*sx;if(x<W/2)tl=true;else tr=true;}
}
function handleAction(){
  initAudio();
  if(phase==='title')      phase='opt';
  else if(phase==='opt')   phase='diff';
  else if(phase==='diff')  startGame();
  else if(phase==='over')  phase='opt';
  else if(phase==='ready') doLaunch();
}

/* ── Physics helpers ───────────────────────────────── */
function segClose(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(!l2)return[ax,ay];
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return[ax+t*dx,ay+t*dy];
}
// Bounce ball object b off a thick line segment
function bounceSB(b,ax,ay,bx,by,rest=.75){
  const[cx,cy]=segClose(b.x,b.y,ax,ay,bx,by);
  const dx=b.x-cx,dy=b.y-cy,d=Math.hypot(dx,dy),m=BALL_R+5;
  if(d<m&&d>.001){
    const nx=dx/d,ny=dy/d;
    b.x=cx+nx*(m+.5);b.y=cy+ny*(m+.5);
    const dot=b.vx*nx+b.vy*ny;
    if(dot<0){b.vx-=(1+rest)*dot*nx;b.vy-=(1+rest)*dot*ny;}
    return true;
  }
  return false;
}
// Bounce ball off rectangle obstacle
function collideBallObs(b,obs){
  const cx=Math.max(obs.x,Math.min(b.x,obs.x+obs.w));
  const cy=Math.max(obs.y,Math.min(b.y,obs.y+obs.h));
  const dx=b.x-cx,dy=b.y-cy,d=Math.hypot(dx,dy);
  if(d<BALL_R){
    const nx=d<.001?0:dx/d,ny=d<.001?-1:dy/d;
    b.x=cx+nx*(BALL_R+.5);b.y=cy+ny*(BALL_R+.5);
    const dot=b.vx*nx+b.vy*ny;
    if(dot<0){b.vx-=2*dot*nx;b.vy-=2*dot*ny;}
  }
}
function fend(p,a){return{x:p.x+Math.cos(a)*FLIP_LEN,y:p.y+Math.sin(a)*FLIP_LEN};}
function flipColB(b,pivot,angle,prev,active){
  const ep=fend(pivot,angle);
  const[cx,cy]=segClose(b.x,b.y,pivot.x,pivot.y,ep.x,ep.y);
  const dx=b.x-cx,dy=b.y-cy,d=Math.hypot(dx,dy),thick=6;
  if(d<BALL_R+thick&&d>.001){
    const nx=dx/d,ny=dy/d;
    b.x=cx+nx*(BALL_R+thick+.5);b.y=cy+ny*(BALL_R+thick+.5);
    const dot=b.vx*nx+b.vy*ny;
    if(dot<0){
      b.vx-=2*dot*nx;b.vy-=2*dot*ny;
      const da=angle-prev;
      if(active&&Math.abs(da)>.001)b.vy+=da*FLIP_LEN*.22;
      b.vx*=.96;b.vy*=.96;
    }
  }
}

/* ── Scoring ───────────────────────────────────────── */
function earn(pts,x,y,b=null){
  combo++;ctimer=110;
  let smashed=false;
  if(OPT.comboSmash&&smashReady&&b){
    smashReady=false;smashed=true;smashFrames=15;
    const spd=Math.hypot(b.vx,b.vy)||1;
    b.vx=(b.vx/spd)*SPEED_CAP*2.2;
    b.vy=(b.vy/spd)*SPEED_CAP*2.2;
    float_(x,y-28,'⚡ SMASH! ×3','#ffff00');
    sfxSmash();
  }
  const m=smashed?3:(combo>=5?3:combo>=3?2:1);
  const e=pts*m;
  score+=e;
  if(score>hi){hi=score;localStorage.setItem('pb_hi',hi);}
  float_(x,y-8,(m>1||smashed?`×${m} `:'')+e.toLocaleString(),smashed?'#ffff00':m>1?'#f90':'#ff0');
  if(OPT.comboSmash&&!smashReady&&!smashed&&combo%5===0&&combo>=5){
    smashReady=true;
    float_(W/2,265,'⚡ SMASH READY!','#ffff44');
    sfxSmashReady();
  }
}
function float_(x,y,text,color){floats.push({x,y,text,color,life:60,max:60});}

/* ── Spawn extra balls ─────────────────────────────── */
function spawnExtraBalls(x,y){
  const n=Math.min(2,3-balls.length);
  for(let i=0;i<n;i++){
    const sign=i===0?1:-1;
    balls.push({x:x+sign*16,y:y+10,vx:sign*3.5,vy:-8.5,extra:true});
  }
  float_(W/2,280,'★ MULTI-BALL! ★','#ff88ff');
  sfxMultiBall();
}

/* ── Obstacle tick ─────────────────────────────────── */
function tickObstacle(obs){
  obs.x+=obs.vx;obs.y+=obs.vy;
  if(obs.x<LW+4){obs.x=LW+4;obs.vx=Math.abs(obs.vx);}
  if(obs.x+obs.w>RW-4){obs.x=RW-4-obs.w;obs.vx=-Math.abs(obs.vx);}
  if(obs.y<TW+4){obs.y=TW+4;obs.vy=Math.abs(obs.vy);}
  if(obs.y+obs.h>H-100){obs.y=H-100-obs.h;obs.vy=-Math.abs(obs.vy);}
}

/* ── Per-ball physics ──────────────────────────────── */
function tickBall(b){
  b.vy+=CUR_GRAV;b.vx*=.9995;b.x+=b.vx;b.y+=b.vy;
  // Speed cap (raised during smash)
  const cap=smashFrames>0?SPEED_CAP*2.2:SPEED_CAP;
  const sp=Math.hypot(b.vx,b.vy);
  if(sp>cap){const r=cap/sp;b.vx*=r;b.vy*=r;}
  // Walls
  if(b.x-BALL_R<LW){b.x=LW+BALL_R;b.vx=Math.abs(b.vx)*.72+.4;}
  if(b.x+BALL_R>RW){b.x=RW-BALL_R;b.vx=-(Math.abs(b.vx)*.72+.4);}
  if(b.y-BALL_R<TW){b.y=TW+BALL_R;b.vy=Math.abs(b.vy)*.68;}
  // Guides
  for(const[ax,ay,bx,by]of GUIDES)bounceSB(b,ax,ay,bx,by,.55);
  // Slings (do NOT decrement slit here)
  for(let i=0;i<SLINGS.length;i++){
    const s=SLINGS[i];
    if(bounceSB(b,s.x1,s.y1,s.x2,s.y2,1.2)){earn(s.pts,b.x,b.y-18,b);sfxBumper();sfxScore();slit[i]=16;}
  }
  // Bumpers (do NOT decrement lit here)
  for(const bmp of bumpers){
    const dx=b.x-bmp.x,dy=b.y-bmp.y,d=Math.hypot(dx,dy),m=BALL_R+bmp.r;
    if(d<m&&d>.001){
      const nx=dx/d,ny=dy/d;
      b.x=bmp.x+nx*m;b.y=bmp.y+ny*m;
      const dot=b.vx*nx+b.vy*ny;
      b.vx=b.vx-2*dot*nx+nx*BUMPER_KICK;
      b.vy=b.vy-2*dot*ny+ny*BUMPER_KICK;
      const s2=Math.hypot(b.vx,b.vy);
      if(s2>cap){const r=cap/s2;b.vx*=r;b.vy*=r;}
      earn(bmp.pts,bmp.x,bmp.y-bmp.r-8,b);sfxBumper();bmp.lit=16;
    }
  }
  // Targets
  for(const t of targets){
    if(t.hit)continue;
    const dx=b.x-t.x,dy=b.y-t.y,d=Math.hypot(dx,dy);
    if(d<BALL_R+t.r&&d>.001){
      t.hit=true;tLeft--;
      const nx=dx/d,ny=dy/d,dot=b.vx*nx+b.vy*ny;
      if(dot<0){b.vx-=1.5*dot*nx;b.vy-=1.5*dot*ny;}
      earn(t.pts,t.x,t.y-22,b);sfxTarget();
      if(t.multiball&&OPT.multiball&&balls.length<3)spawnExtraBalls(t.x,t.y);
      if(tLeft<=0){
        setTimeout(()=>{
          if(phase!=='play')return;
          mkTargets();earn(1000,W/2,180,null);
          float_(W/2,200,'★ ALL CLEAR ★','#0f8');sfxAllClear();
        },700);
      }
    }
  }
  // Obstacles
  if(OPT.obstacles)for(const obs of obstacles)collideBallObs(b,obs);
  // Flippers
  flipColB(b,LP,la,pla,ld);flipColB(b,RP,ra,pra,rd);
}

/* ── Update ────────────────────────────────────────── */
function update(){
  frame++;
  if(phase!=='play')return;
  ld=keys['KeyZ']||keys['ArrowLeft'] ||tl;
  rd=keys['KeyX']||keys['ArrowRight']||tr;
  pla=la;pra=ra;
  la+=((ld?LA:LR)-la)*FLIP_K;
  ra+=((rd?RA:RR)-ra)*FLIP_K;
  if(OPT.obstacles)for(const obs of obstacles)tickObstacle(obs);
  // Per-ball update (iterate backwards so splice/push is safe)
  for(let bi=balls.length-1;bi>=0;bi--)tickBall(balls[bi]);
  // Drain: remove balls below field, lose life only when all gone
  const prev=balls.length;
  balls=balls.filter(b=>b.y<=H+BALL_R+25);
  if(balls.length===0&&prev>0){
    lives--;sfxLost();
    if(score>hi){hi=score;localStorage.setItem('pb_hi',hi);}
    smashReady=false;smashFrames=0;
    if(lives<=0){phase='over';stopBGM();}
    else{phase='lost';setTimeout(()=>{if(phase==='lost'){ballReset();phase='ready';}},1800);}
  }
  // Decrement timers once per frame (not per-ball)
  for(let i=0;i<slit.length;i++)if(slit[i]>0)slit[i]--;
  for(const b of bumpers)if(b.lit>0)b.lit--;
  // Float texts
  for(const f of floats){f.life--;f.y-=.5;}
  floats=floats.filter(f=>f.life>0);
  // Combo decay
  if(ctimer>0){ctimer--;if(!ctimer){combo=0;smashReady=false;}}
  // Smash countdown
  if(smashFrames>0)smashFrames--;
}

/* ── Draw ──────────────────────────────────────────── */
function draw(){
  ctx.fillStyle='#030309';ctx.fillRect(0,0,W,H);
  const pg=ctx.createLinearGradient(LW,TW,RW,H);
  pg.addColorStop(0,'#05051a');pg.addColorStop(1,'#07071e');
  ctx.fillStyle=pg;ctx.fillRect(LW,TW,RW-LW,H-TW);
  ctx.fillStyle='rgba(60,80,220,.065)';
  for(let gx=LW+15;gx<RW;gx+=22)for(let gy=TW+15;gy<H-5;gy+=22)ctx.fillRect(gx,gy,2,2);

  // Walls
  ctx.save();ctx.shadowColor='#2255cc';ctx.shadowBlur=8;ctx.strokeStyle='#2255aa';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(LW,H+5);ctx.lineTo(LW,TW);ctx.lineTo(RW,TW);ctx.lineTo(RW,H+5);ctx.stroke();ctx.restore();
  // Guides
  ctx.save();ctx.strokeStyle='#1a2255';ctx.lineWidth=3;ctx.lineCap='round';
  for(const[ax,ay,bx,by]of GUIDES){ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();}
  ctx.restore();
  // Slings
  for(let i=0;i<SLINGS.length;i++){
    const s=SLINGS[i],lit=slit[i]>0;
    ctx.save();if(lit){ctx.shadowColor='#ff7700';ctx.shadowBlur=14;}
    ctx.strokeStyle=lit?'#ff8800':'#553311';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.restore();
  }
  // Obstacles
  drawObstacles();
  // Bumpers
  for(const b of bumpers){
    const lit=b.lit>0;
    ctx.save();if(lit){ctx.shadowColor='#ffcc00';ctx.shadowBlur=22;}
    ctx.beginPath();ctx.arc(b.x,b.y,b.r+4,0,Math.PI*2);
    ctx.fillStyle=lit?'rgba(255,180,0,.22)':'rgba(0,20,100,.3)';ctx.fill();
    const g=ctx.createRadialGradient(b.x-4,b.y-5,2,b.x,b.y,b.r);
    if(lit){g.addColorStop(0,'#fff5b0');g.addColorStop(1,'#ff8800');}
    else   {g.addColorStop(0,'#2244dd');g.addColorStop(1,'#0a0a66');}
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle=lit?'#ffee00':'#3355aa';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    ctx.fillStyle=lit?'#330':'#4466aa';ctx.font=`bold ${b.r>22?10:9}px Courier New`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(b.pts,b.x,b.y);
  }
  // Targets
  for(const t of targets){
    if(t.hit){
      ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
      ctx.strokeStyle=t.multiball?'rgba(200,0,255,.15)':'rgba(0,200,80,.12)';ctx.lineWidth=1;ctx.stroke();continue;
    }
    ctx.save();
    if(t.multiball){ctx.shadowColor='#ff44ff';ctx.shadowBlur=12;}
    else           {ctx.shadowColor='#00ff88';ctx.shadowBlur=10;}
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
    ctx.fillStyle=t.multiball?'#770099':'#009933';ctx.fill();
    ctx.strokeStyle=t.multiball?'#ff44ff':'#00ff66';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
    ctx.fillStyle='#fff';ctx.font=`bold ${t.r>13?10:9}px Courier New`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.multiball?(OPT.multiball?'MB':'★'):t.pts,t.x,t.y);
  }
  // Flippers
  drawFlipper(LP,la,ld);drawFlipper(RP,ra,rd);
  // All balls
  if(phase!=='over')for(const b of balls)drawBall(b);
  // Float texts
  ctx.save();ctx.textAlign='center';ctx.textBaseline='bottom';
  for(const f of floats){
    const a=f.life/f.max;
    ctx.globalAlpha=a;ctx.shadowColor=f.color;ctx.shadowBlur=5;
    ctx.fillStyle=f.color;ctx.font='bold 13px Courier New';ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();

  drawHUD();
  if     (phase==='title')drawTitle();
  else if(phase==='opt'  )drawOpt();
  else if(phase==='diff' )drawDiff();
  else if(phase==='ready')drawReady();
  else if(phase==='lost' )drawLost();
  else if(phase==='over' )drawOver();
}

function drawObstacles(){
  if(!OPT.obstacles)return;
  for(const obs of obstacles){
    ctx.save();ctx.shadowColor='#ff3300';ctx.shadowBlur=8;
    const g=ctx.createLinearGradient(obs.x,obs.y,obs.x+obs.w,obs.y+obs.h);
    g.addColorStop(0,'#dd4400');g.addColorStop(1,'#aa1100');
    ctx.fillStyle=g;ctx.fillRect(obs.x,obs.y,obs.w,obs.h);
    ctx.strokeStyle='#ff6633';ctx.lineWidth=1;ctx.strokeRect(obs.x,obs.y,obs.w,obs.h);
    ctx.restore();
  }
}

function drawBall(b){
  const sp=Math.hypot(b.vx,b.vy);
  const isSmash=smashFrames>0;
  if(sp>7){
    ctx.beginPath();ctx.arc(b.x-b.vx*2,b.y-b.vy*2,BALL_R*.5,0,Math.PI*2);
    ctx.fillStyle=isSmash?'rgba(255,255,0,.25)':'rgba(100,130,255,.18)';ctx.fill();
    ctx.beginPath();ctx.arc(b.x-b.vx,b.y-b.vy,BALL_R*.72,0,Math.PI*2);
    ctx.fillStyle=isSmash?'rgba(255,220,0,.3)':'rgba(140,160,255,.22)';ctx.fill();
  }
  if(isSmash){
    ctx.save();ctx.shadowColor='#ffff00';ctx.shadowBlur=18+Math.sin(frame*.3)*8;
    ctx.beginPath();ctx.arc(b.x,b.y,BALL_R+5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,0,.18)';ctx.fill();ctx.restore();
  }
  ctx.save();
  ctx.shadowColor=b.extra?'#ff88ff':isSmash?'#ffff00':'#aabbff';ctx.shadowBlur=10;
  const bg=ctx.createRadialGradient(b.x-3,b.y-3,1,b.x,b.y,BALL_R);
  if(b.extra){bg.addColorStop(0,'#ffccff');bg.addColorStop(.5,'#cc88ff');bg.addColorStop(1,'#6633aa');}
  else if(isSmash){bg.addColorStop(0,'#ffffff');bg.addColorStop(.5,'#ffff88');bg.addColorStop(1,'#cc8800');}
  else{bg.addColorStop(0,'#fff');bg.addColorStop(.5,'#ccd6ff');bg.addColorStop(1,'#7788bb');}
  ctx.beginPath();ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  ctx.restore();
}

function drawFlipper(p,a,active){
  const e=fend(p,a);
  ctx.save();ctx.lineCap='round';ctx.lineWidth=13;
  ctx.strokeStyle=active?'#11eeff':'#0c66aa';
  if(active){ctx.shadowColor='#00ddff';ctx.shadowBlur=14;}
  ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(e.x,e.y);ctx.stroke();ctx.restore();
  ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle='#3399cc';ctx.fill();
}

/* ── HUD ───────────────────────────────────────────── */
function drawHUD(){
  ctx.fillStyle='#02020d';ctx.fillRect(0,0,W,TW);
  ctx.strokeStyle='#112288';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,TW);ctx.lineTo(W,TW);ctx.stroke();
  // Score
  ctx.save();ctx.shadowColor='#ddbb00';ctx.shadowBlur=8;
  ctx.fillStyle='#ffee00';ctx.font='bold 24px Courier New';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(score.toLocaleString(),W/2,TW/2+2);ctx.restore();
  // Hi-score
  ctx.fillStyle='#2d3a7a';ctx.font='10px Courier New';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('HI '+hi.toLocaleString(),8,5);
  // Lives
  for(let i=0;i<lives;i++){
    ctx.save();ctx.shadowColor='#ff2244';ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(W-56-i*18,TW/2+2,6,0,Math.PI*2);ctx.fillStyle='#ff3355';ctx.fill();ctx.restore();
  }
  // Mute button
  const mb=MBTN;
  ctx.fillStyle=muted?'#222':'#0e2a4a';ctx.fillRect(mb.x,mb.y,mb.w,mb.h);
  ctx.strokeStyle=muted?'#444':'#2255aa';ctx.lineWidth=1;ctx.strokeRect(mb.x,mb.y,mb.w,mb.h);
  ctx.fillStyle=muted?'#555':'#66aadd';ctx.font='10px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(muted?'[MUTE]':'[ ♪ ]',mb.x+mb.w/2,mb.y+mb.h/2);
  // Bottom HUD row
  ctx.textBaseline='bottom';
  // Left: difficulty badge
  if(phase==='play'||phase==='ready'||phase==='lost'){
    const d=DIFFS[selectedDiff];
    ctx.fillStyle=d.color+'44';ctx.fillRect(8,TW-16,58,13);
    ctx.fillStyle=d.color;ctx.font='bold 9px Courier New';ctx.textAlign='center';ctx.fillText(d.label,37,TW-3);
  }
  // Center: multi-ball indicator
  if(balls.length>1){
    const pulse=Math.sin(frame*.25)*.3+.7;
    ctx.fillStyle=`rgba(255,136,255,${pulse})`;ctx.font='bold 9px Courier New';
    ctx.textAlign='center';ctx.fillText('★ MULTI-BALL x'+balls.length,W/2,TW-3);
  }
  // Right: smash ready or combo
  ctx.textAlign='right';
  if(OPT.comboSmash&&smashReady){
    const p=Math.sin(frame*.3)*.3+.7;
    ctx.fillStyle=`rgba(255,255,0,${p})`;ctx.font='bold 10px Courier New';
    ctx.fillText('⚡ SMASH!',W-8,TW-3);
  } else if(combo>=2&&ctimer>0){
    ctx.fillStyle='#ff8800';ctx.font='bold 10px Courier New';
    ctx.fillText(`COMBO ×${combo}`,W-8,TW-3);
  }
}

/* ── Overlay helpers ───────────────────────────────── */
function cTxt(text,y,color,size,glow){
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=14;}
  ctx.fillStyle=color;ctx.font=`bold ${size}px Courier New`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,W/2,y);ctx.shadowBlur=0;
}
function blink(text,y,color,size){if((frame>>5)&1)cTxt(text,y,color,size,true);}

/* ── Title ─────────────────────────────────────────── */
function drawTitle(){
  ctx.fillStyle='rgba(2,2,12,.88)';ctx.fillRect(0,0,W,H);
  cTxt('PINBALL',H/2-88,'#ffee00',52,true);
  cTxt('── ARCADE ──',H/2-42,'#4488ff',14);
  cTxt('HI  '+hi.toLocaleString(),H/2+10,'#2d3a7a',12);
  blink('PRESS SPACE  /  TAP',H/2+58,'#00ff88',14);
  cTxt('Z/← 左  ·  X/→ 右  ·  M ミュート',H/2+108,'#1a1a2e',11);
}

/* ── Options screen ────────────────────────────────── */
function drawOpt(){
  ctx.fillStyle='rgba(2,2,12,.92)';ctx.fillRect(0,0,W,H);
  cTxt('オプション',160,'#ffee00',22,true);
  cTxt('タップ / 1・2・3 キーで切り替え',200,'#334',10);

  for(let i=0;i<OBTN.length;i++){
    const b=OBTN[i],on=OPT[b.key];
    ctx.save();
    if(on){ctx.shadowColor='#00cc44';ctx.shadowBlur=6;}
    ctx.fillStyle=on?'rgba(0,80,20,.45)':'rgba(15,15,35,.7)';
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle=on?'#00cc44':'#334466';ctx.lineWidth=1.5;ctx.strokeRect(b.x,b.y,b.w,b.h);
    ctx.restore();
    // Number badge
    ctx.fillStyle=on?'#00cc44':'#334466';ctx.font='bold 11px Courier New';
    ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(i+1,b.x+6,b.y+5);
    // Label
    ctx.fillStyle=on?'#ddeeff':'#778899';ctx.font='bold 13px Courier New';
    ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(b.label,b.x+22,b.y+20);
    // Desc
    ctx.fillStyle=on?'#7799bb':'#3a4a5a';ctx.font='9px Courier New';
    ctx.fillText(b.desc,b.x+22,b.y+42);
    // ON/OFF toggle
    const tx=b.x+b.w-50,ty=b.y+18,tw=40,th=22;
    ctx.fillStyle=on?'#006622':'#1a1a3a';ctx.fillRect(tx,ty,tw,th);
    ctx.strokeStyle=on?'#00cc44':'#334466';ctx.lineWidth=1;ctx.strokeRect(tx,ty,tw,th);
    ctx.fillStyle=on?'#00ff66':'#556677';ctx.font='bold 11px Courier New';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(on?'ON':'OFF',tx+tw/2,ty+th/2);
  }

  blink('SPACE / TAP  →  難易度選択',510,'#00ff88',13);
}

/* ── Difficulty select ─────────────────────────────── */
function drawDiff(){
  ctx.fillStyle='rgba(2,2,12,.92)';ctx.fillRect(0,0,W,H);
  cTxt('難易度を選択',H/2-105,'#ffee00',20,true);
  cTxt('1/2/3キー  ·  ←/→移動  ·  タップで選択',H/2-75,'#334',10);
  for(const b of DBTN){
    const d=DIFFS[b.key],sel=selectedDiff===b.key;
    ctx.save();if(sel){ctx.shadowColor=d.color;ctx.shadowBlur=18;}
    ctx.fillStyle=sel?d.color+'2a':'rgba(8,8,28,.85)';ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle=sel?d.color:'#2244aa';ctx.lineWidth=sel?2.5:1.5;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.restore();
    const idx=DIFF_KEYS.indexOf(b.key)+1;
    ctx.fillStyle=sel?d.color:'#334466';ctx.font='bold 10px Courier New';
    ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(idx,b.x+5,b.y+4);
    ctx.fillStyle=sel?d.color:'#8899bb';ctx.font='bold 13px Courier New';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.label,b.x+b.w/2,b.y+b.h/2-10);
    ctx.fillStyle=sel?d.color+'cc':'#3a4a60';ctx.font='8px Courier New';
    ctx.fillText(d.sub,b.x+b.w/2,b.y+b.h/2+8);
    const dotR=4,spacing=10,totalW=(d.lives-1)*spacing+dotR*2,sx=b.x+b.w/2-totalW/2+dotR;
    for(let i=0;i<d.lives;i++){ctx.beginPath();ctx.arc(sx+i*spacing,b.y+b.h-12,dotR,0,Math.PI*2);ctx.fillStyle=sel?d.color+'99':'#223344';ctx.fill();}
  }
  blink('SPACE / TAP  →  START',H/2+80,'#00ff88',13);
}

/* ── Ready ─────────────────────────────────────────── */
function drawReady(){
  ctx.fillStyle='rgba(2,2,12,.58)';ctx.fillRect(LW,H/2-40,RW-LW,80);
  if((frame>>4)&1)cTxt('SPACE / TAP  →  LAUNCH',H/2,'#00ff88',14,true);
}

/* ── Lost ──────────────────────────────────────────── */
function drawLost(){
  ctx.fillStyle='rgba(2,2,12,.68)';ctx.fillRect(LW,H/2-52,RW-LW,104);
  cTxt('BALL LOST',H/2-8,'#ff3355',26);
  cTxt('Remaining: '+lives,H/2+24,'#444',12);
}

/* ── Game Over ─────────────────────────────────────── */
function drawOver(){
  ctx.fillStyle='rgba(2,2,12,.90)';ctx.fillRect(0,0,W,H);
  cTxt('GAME OVER',H/2-88,'#ff2244',40,true);
  cTxt('SCORE  '+score.toLocaleString(),H/2-34,'#ffee00',18);
  if(score>0&&score>=hi)cTxt('★  NEW HI-SCORE  ★',H/2+12,'#00ff88',14,true);
  else cTxt('HI  '+hi.toLocaleString(),H/2+12,'#2d3a7a',13);
  const d=DIFFS[selectedDiff];
  ctx.fillStyle=d.color+'33';ctx.fillRect(W/2-50,H/2+35,100,22);
  ctx.strokeStyle=d.color;ctx.lineWidth=1;ctx.strokeRect(W/2-50,H/2+35,100,22);
  cTxt(d.label,H/2+46,d.color,11);
  blink('SPACE / TAP  →  オプション',H/2+76,'#00ff88',12);
}

/* ── Game Loop ─────────────────────────────────────── */
init();
(function loop(){update();draw();requestAnimationFrame(loop);})();
</script>
